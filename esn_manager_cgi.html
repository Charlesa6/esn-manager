<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Konsilys</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ Design system modernisé (inspiration Linear / Stripe / Vercel) ═══
   Même palette slate qu'avant (cohérence avec les styles inline) mais exécution
   raffinée : typo Inter, ombres douces en couches, focus rings, transitions. */
:root{
  --bg:#f5f7fa;--surface:#ffffff;--ink:#0f172a;--ink-2:#334155;--muted:#64748b;--subtle:#94a3b8;
  --line:#e6eaf1;--line-2:#eef1f6;--brand:#84CC16;--brand-d:#69a70c;--brand-ink:#16240a;
  --navy:#1B2B3A;
  --r-sm:8px;--r:10px;--r-lg:14px;
  --sh-1:0 1px 2px rgba(16,24,40,.05);
  --sh-2:0 1px 2px rgba(16,24,40,.04),0 6px 16px rgba(16,24,40,.06);
  --sh-3:0 14px 40px rgba(16,24,40,.16),0 4px 10px rgba(16,24,40,.06);
  --ring:0 0 0 3px rgba(132,204,22,.20);
}
/* ═══ Thème sombre : tokens + surcharge des classes à couleurs codées ═══
   (les couleurs inline sont traitées par le moteur JS themify) */
:root[data-theme="dark"]{
  --bg:#0d131b;--surface:#161e29;--ink:#e8eef6;--ink-2:#c2cddb;--muted:#93a1b3;--subtle:#70808f;
  --line:#27323f;--line-2:#1d2631;--navy:#0a0f16;
  --sh-1:0 1px 2px rgba(0,0,0,.4);
  --sh-2:0 1px 2px rgba(0,0,0,.35),0 8px 20px rgba(0,0,0,.45);
  --sh-3:0 18px 48px rgba(0,0,0,.6),0 6px 14px rgba(0,0,0,.4);
}
:root[data-theme="dark"] th{background:#141b25;color:var(--muted)}
:root[data-theme="dark"] tbody tr:hover td,:root[data-theme="dark"] tr[data-act]:hover td{background:#1c2531}
:root[data-theme="dark"] .ic{background:#0f151d;color:var(--ink);border-color:var(--line)}
:root[data-theme="dark"] .ic:hover{border-color:#3a4757}
:root[data-theme="dark"] .ic::placeholder{color:#5d6b7a}
:root[data-theme="dark"] .bg{background:#1a2230;color:var(--ink-2);border-color:var(--line)}
:root[data-theme="dark"] .bg:hover{background:#212b3a;border-color:#3a4757}
:root[data-theme="dark"] .bsec{background:#1a2230;color:var(--ink-2)}
:root[data-theme="dark"] .bsec:hover{background:#212b3a}
:root[data-theme="dark"] .mob,:root[data-theme="dark"] .mbox,:root[data-theme="dark"] .mhd{background:var(--surface)}
:root[data-theme="dark"] .moc:hover,:root[data-theme="dark"] .mcl:hover{background:#212b3a}
:root[data-theme="dark"] .topbar{background:rgba(13,19,27,.82);border-color:var(--line)}
:root[data-theme="dark"] .topsearch{background:#0f151d;border-color:var(--line);color:var(--subtle)}
:root[data-theme="dark"] .topsearch:hover{border-color:#3a4757}
:root[data-theme="dark"] .topsearch .tsk{background:#1a2230;color:var(--muted);border-color:var(--line)}
:root[data-theme="dark"] .cmdk-box{background:var(--surface)}
:root[data-theme="dark"] .cmdk-input{background:var(--surface);color:var(--ink);border-color:var(--line)}
:root[data-theme="dark"] .cmdk-input::placeholder{color:#5d6b7a}
:root[data-theme="dark"] .cmdk-item{color:var(--ink-2)}
:root[data-theme="dark"] .cmdk-foot{color:var(--muted);border-color:var(--line)}
:root[data-theme="dark"] .cmdk-foot kbd{background:#1a2230;color:var(--muted);border-color:var(--line)}
:root[data-theme="dark"] .rec-card{background:#141b25}
:root[data-theme="dark"] .goal-card{background:var(--surface)}
:root[data-theme="dark"] ::-webkit-scrollbar-thumb{background:#2a3644}
:root[data-theme="dark"] ::-webkit-scrollbar-thumb:hover{background:#34424f}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter','Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink-2);font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.006em}
input,select,button,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:210px;background:linear-gradient(180deg,#1f3243 0%,#1B2B3A 100%);display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden;border-right:1px solid rgba(255,255,255,.05)}
#mc{flex:1;overflow-y:auto;background:var(--bg)}
/* Sidebar collapsible */
body.sb-col #sb{width:0}
#sb-open{position:fixed;top:14px;left:14px;z-index:300;width:40px;height:40px;background:rgba(255,255,255,.82);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid rgba(15,23,42,.07);border-radius:13px;cursor:pointer;color:#1B2B3A;display:none;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(2,6,23,.14);transition:transform .12s,box-shadow .12s}
#sb-open:hover{box-shadow:0 8px 22px rgba(2,6,23,.18)}
#sb-open:active{transform:scale(.94)}
#sb-open svg{display:block}
body.sb-col #sb-open{display:flex}
/* Mobile : sidebar en overlay */
@media(max-width:767px){
  #sb{position:fixed;top:0;left:0;bottom:0;z-index:200;width:0}
  body:not(.sb-col) #sb{width:210px;box-shadow:4px 0 24px rgba(0,0,0,.45)}
  #sb-backdrop{display:none;position:fixed;inset:0;background:rgba(2,6,23,.45);backdrop-filter:blur(2px);z-index:199}
  body:not(.sb-col) #sb-backdrop{display:block}
  #mc{overflow-y:auto}
  .inn{padding:18px 16px 32px}
}
.inn{padding:28px 28px 40px;max-width:1240px;margin:0 auto}
/* sidebar */
.sbl{padding:20px 20px 14px}
.sbn{color:#f8fafc;font-weight:800;font-size:14px;letter-spacing:-.01em}
.sbs{color:#64748b;font-size:11px;margin-top:3px}
.syr{padding:0 12px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.syr-lbl{color:#7c8da0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.syr select{width:100%;background:rgba(255,255,255,.05);color:#f8fafc;border:1px solid rgba(255,255,255,.10);border-radius:9px;padding:7px 10px;font-size:12px;outline:none;transition:border-color .14s}
.syr select:focus{border-color:var(--brand)}
.snv{flex:1;padding:6px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nb{width:100%;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:#9fb0c2;font-size:12.5px;font-weight:600;text-align:left;transition:background .14s,color .14s}
.nb:hover{background:rgba(255,255,255,.07);color:#f8fafc}
.nb.act{background:var(--brand);color:var(--brand-ink);font-size:12.5px;font-weight:800;box-shadow:0 3px 10px rgba(132,204,22,.32)}
.nbi{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.nbb{margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:1px 7px;box-shadow:0 1px 3px rgba(239,68,68,.5)}
.sft{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:#5b6b7d}
/* cards */
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--line);box-shadow:var(--sh-1)}
.kc{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--line);padding:20px;box-shadow:var(--sh-1)}
/* forms */
.ic{width:100%;border:1px solid var(--line);border-radius:var(--r);padding:9px 12px;font-size:13px;outline:none;background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.ic:hover{border-color:#cfd7e3}
.ic:focus{border-color:var(--brand);box-shadow:var(--ring)}
.ic::placeholder{color:#aab4c2}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fh{font-size:11px;color:var(--subtle);margin-top:4px}
.fd{margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.cs2{grid-column:1/-1}
/* buttons */
.bp{background:var(--brand);color:var(--brand-ink);border:none;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:700;box-shadow:0 1px 2px rgba(16,24,40,.10);transition:background .14s,box-shadow .14s,transform .06s}
.bp:hover{background:var(--brand-d);box-shadow:0 3px 10px rgba(105,167,12,.35)}
.bp:active{transform:translateY(1px)}
.bp:focus-visible{outline:none;box-shadow:var(--ring)}
.bg{background:#fff;color:#374151;border:1px solid var(--line);padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;box-shadow:var(--sh-1);transition:background .14s,border-color .14s}
.bg:hover{background:#f8fafc;border-color:#cfd7e3}
.br{display:flex;gap:10px;margin-top:20px}
.br .bp,.br .bg{flex:1}
.lb{background:none;border:none;font-size:12px;font-weight:600;color:#2f7d0e;text-decoration:none;padding:0;cursor:pointer;border-bottom:1px solid rgba(47,125,14,.3)}
.lb:hover{border-bottom-color:#2f7d0e}
.lr{background:none;border:none;font-size:12px;font-weight:600;color:#dc2626;text-decoration:none;padding:0;cursor:pointer;border-bottom:1px solid rgba(220,38,38,.3)}
.lr:hover{border-bottom-color:#dc2626}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.bgrn{background:#dcfce7;color:#15803d}
.bamb{background:#fef3c7;color:#b45309}
.bred{background:#fee2e2;color:#b91c1c}
.bblu{background:#dbeafe;color:#1d4ed8}
.bgry{background:#eef1f6;color:#64748b}
/* avatar */
.av{border-radius:50%;background:var(--brand);color:var(--brand-ink);font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
/* tables */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:11px 16px;text-align:left;background:#fafbfc;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--line-2);font-size:13px;color:var(--ink-2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .12s}
tbody tr:hover td{background:#f9fafc}
/* modal */
.mov{position:fixed;inset:0;background:rgba(2,6,23,.42);backdrop-filter:blur(3px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;animation:movin .16s ease}
@keyframes movin{from{opacity:0}to{opacity:1}}
.mob{background:#fff;border-radius:18px;box-shadow:var(--sh-3);width:100%;max-height:90vh;overflow-y:auto;animation:mobin .18s cubic-bezier(.2,.7,.3,1)}
@keyframes mobin{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
.moh{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);flex-shrink:0}
.mot{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.moc{background:none;border:none;font-size:20px;color:var(--subtle);cursor:pointer;padding:4px 8px;line-height:1;border-radius:8px;transition:background .12s}
.moc:hover{background:#f1f5f9}
.mody{padding:22px 24px;overflow-y:auto}
.bsec{background:#f1f5f9;color:#374151;border:none;border-radius:var(--r);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .14s}
.bsec:hover{background:#e7edf3}
.mbox{background:#fff;border-radius:18px;box-shadow:var(--sh-3);width:100%;max-height:90vh;overflow-y:auto;animation:mobin .18s cubic-bezier(.2,.7,.3,1)}
.mn{max-width:460px}
.mw{max-width:680px}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.mhd h3{font-weight:800;font-size:15px;color:var(--ink);letter-spacing:-.01em}
.mcl{background:none;border:none;font-size:22px;color:var(--subtle);line-height:1;padding:4px 8px;border-radius:8px;cursor:pointer;transition:background .12s}
.mcl:hover{background:#f1f5f9}
.mbd{padding:24px}
/* gantt */
.gwp{overflow-x:auto}
.gin{min-width:720px}
.ghd{display:flex;border-bottom:1px solid var(--line-2)}
.glh{width:172px;flex-shrink:0;padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--subtle);background:#fafbfc}
.gms{flex:1;display:flex}
.gm{flex:1;text-align:center;padding:8px 0;font-size:11px;font-weight:600;color:var(--muted);border-left:1px solid var(--line-2)}
.grw{display:flex;align-items:center;border-bottom:1px solid var(--line-2);height:52px}
.glb{width:172px;flex-shrink:0;padding:0 14px;display:flex;align-items:center;gap:8px}
.gtr{flex:1;position:relative;height:100%}
.gbar{position:absolute;top:8px;height:36px;border-radius:8px;display:flex;align-items:center;overflow:hidden;z-index:5;opacity:.92;box-shadow:var(--sh-1)}
.gbar span{color:#fff;font-size:11px;font-weight:600;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* layout */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.ps{font-size:13px;color:var(--muted);margin-top:3px}
.vw{display:flex;flex-direction:column;gap:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gc3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 16px}
.ov{overflow-x:auto}
.emp{text-align:center;color:var(--subtle);padding:44px 0;font-size:13px}
.tr{text-align:right}
.tc{text-align:center}
.ski{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
details summary{cursor:pointer;font-size:12px;color:var(--muted);list-style:none;user-select:none}
details[open] summary{margin-bottom:8px}
details summary::-webkit-details-marker{display:none}
.ac{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--r)}
.acr{background:#fff1f2;border:1px solid #fecdd3}
.acs{background:#fffbeb;border:1px solid #fde68a}
/* param */
.rec-card{background:#f8fafc;border-left:3px solid var(--brand);padding:14px 16px;border-radius:0 8px 8px 0;margin-bottom:10px}
.rec-title{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:5px}
.rec-detail{font-size:12px;color:#475569;line-height:1.65}
.goal-card{background:#fff;border-radius:var(--r-lg);border:1px solid var(--line);padding:24px;margin-bottom:16px;box-shadow:var(--sh-1)}
.goal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.goal-icon{font-size:28px;flex-shrink:0}
.goal-title{font-weight:700;font-size:15px;color:var(--ink)}
.goal-sub{font-size:12px;color:var(--muted);margin-top:2px}
/* top clients */
.cli-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.cli-row:last-child{border-bottom:none}
.cli-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.cli-bar{height:6px;border-radius:3px;margin-top:4px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d4dbe6;border-radius:99px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#c0cad9;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}

/* ═══ Responsive (tablette & mobile) ═══ */
@media(max-width:960px){
  .g4,[style*="grid-template-columns:repeat(4"],[style*="grid-template-columns:repeat(5"],
  [style*="grid-template-columns:repeat(6"],[style*="grid-template-columns:repeat(7"]{grid-template-columns:1fr 1fr !important}
  .g3,.gc3{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .inn{padding:16px 13px 36px}
  .pt{font-size:19px}.ps{font-size:12px}
  .ph{flex-direction:column;align-items:stretch;gap:10px}
  .ph .bp,.ph .bg{width:100%;text-align:center}
  .g2,.g3,.gc,.gc3{grid-template-columns:1fr !important}
  .g4{grid-template-columns:1fr 1fr !important}
  /* tuiles chiffrées : 2 par ligne (voir plus d'un coup, moins de scroll) */
  [style*="grid-template-columns:repeat(4"],[style*="grid-template-columns:repeat(5"],
  [style*="grid-template-columns:repeat(6"],[style*="grid-template-columns:repeat(7"]{grid-template-columns:1fr 1fr !important;gap:8px !important}
  [style*="grid-template-columns:repeat(2"],[style*="grid-template-columns:repeat(3"],
  [style*="grid-template-columns:repeat(auto"]{grid-template-columns:1fr !important}
  /* grilles à colonnes explicites (1fr 1fr…) : on empile */
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
  .vw{gap:14px}
  .card,.kc,.goal-card{border-radius:12px}
  .card{overflow-x:auto}
  details{overflow-x:auto}
  table{min-width:480px}
  th,td{padding:9px 12px;font-size:12.5px}
  /* tuiles KPI (hero) plus compactes → moins de hauteur */
  [style*="background:#1B2B3A"]{padding:14px 13px !important}
  .mov{padding:0;align-items:flex-end}
  .mob,.mbox{max-width:100%;max-height:94vh;border-radius:20px 20px 0 0;animation:sheetin .22s cubic-bezier(.2,.7,.3,1)}
  .moh,.mhd{padding:15px 18px}.mody,.mbd{padding:16px 18px 26px}
  .br{flex-direction:column}
}
@keyframes sheetin{from{transform:translateY(48px)}to{transform:none}}
/* ═══ Cachet : micro-interactions ═══ */
tr[data-act]{cursor:pointer}
tr[data-act]:hover td{background:#f4f7fb}
.nb:active{transform:scale(.985)}
:focus-visible{outline:2px solid rgba(132,204,22,.55);outline-offset:2px}
/* ═══ Effets inspirés de Linear : transition de vue + profondeur + glow ═══ */
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.inn.vin{animation:viewIn .28s cubic-bezier(.22,.61,.36,1)}
.card,.kc,.goal-card{transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .18s,border-color .18s}
.card:hover,.kc:hover,.goal-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(2,6,23,.10);border-color:#dbe3ee}
.nb{transition:background .16s,color .16s,transform .12s,box-shadow .18s}
.nb.act{box-shadow:0 4px 14px rgba(132,204,22,.40),inset 0 0 0 1px rgba(255,255,255,.15)}
.bp,.bg{transition:background .14s,box-shadow .16s,border-color .14s,transform .12s cubic-bezier(.22,.61,.36,1)}
.bp:hover,.bg:hover{transform:translateY(-1px)}
.bp:active,.bg:active{transform:translateY(0)}
.badge{transition:transform .12s}
tr[data-act]{transition:background .12s}
/* Le contenu (#mc) glisse en douceur, la barre latérale reste fixe */
@media(prefers-reduced-motion:reduce){
  .inn.vin{animation:none}
  .card:hover,.kc:hover,.goal-card:hover,.bp:hover,.bg:hover{transform:none}
}
/* ═══ Barre de recherche centrée (top) ═══ */
.topbar{position:sticky;top:0;z-index:50;display:flex;justify-content:center;align-items:center;padding:10px 16px;background:rgba(247,249,251,.82);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.toptheme{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh-1);transition:transform .12s,box-shadow .14s}
.toptheme:hover{box-shadow:0 5px 16px rgba(2,6,23,.12);transform:translateY(-50%) scale(1.06)}
.topsearch{display:flex;align-items:center;gap:9px;width:100%;max-width:480px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 14px;cursor:text;color:#94a3b8;font-size:13px;box-shadow:var(--sh-1);transition:border-color .14s,box-shadow .14s}
.topsearch:hover{border-color:#cfd7e3;box-shadow:0 4px 14px rgba(2,6,23,.07)}
.topsearch .tsp{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topsearch .tsk{background:#f1f5f9;border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;color:#64748b;flex-shrink:0}
@media(max-width:767px){.topbar{padding-left:64px}.topsearch .tsp{font-size:12px}}
/* ═══ Command palette (⌘K / Ctrl+K) — style Linear ═══ */
.cmdk-ov{position:fixed;inset:0;background:rgba(2,6,23,.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:1500;display:flex;align-items:flex-start;justify-content:center;padding:13vh 16px 16px;animation:cmdkFade .12s ease}
@keyframes cmdkFade{from{opacity:0}to{opacity:1}}
.cmdk-box{width:100%;max-width:560px;background:#fff;border-radius:16px;box-shadow:0 28px 64px rgba(2,6,23,.38);overflow:hidden;animation:cmdkIn .18s cubic-bezier(.2,.7,.3,1)}
@keyframes cmdkIn{from{opacity:0;transform:translateY(-8px) scale(.985)}to{opacity:1;transform:none}}
.cmdk-input{width:100%;border:none;border-bottom:1px solid var(--line);padding:16px 18px;font-size:15px;color:var(--ink);outline:none;background:#fff}
.cmdk-input::placeholder{color:#9aa6b6}
.cmdk-list{max-height:52vh;overflow-y:auto;padding:8px}
.cmdk-item{padding:10px 12px;border-radius:9px;font-size:14px;font-weight:600;color:#334155;cursor:pointer;display:flex;align-items:center;gap:9px;transition:background .1s,color .1s}
.cmdk-item.sel{background:var(--brand);color:var(--brand-ink)}
.cmdk-empty{padding:20px;text-align:center;color:#94a3b8;font-size:13px}
.cmdk-foot{display:flex;gap:16px;padding:10px 16px;border-top:1px solid var(--line);font-size:11px;color:#94a3b8}
.cmdk-foot kbd{background:#f1f5f9;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-family:inherit;font-size:10px;color:#64748b}
</style>
