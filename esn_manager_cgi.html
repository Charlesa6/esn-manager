      +'<span style="background:#fee2e2;color:#b91c1c;padding:3px 12px;border-radius:99px;font-size:12px;font-weight:700">Arr\u00eats : '+totAr+'j</span>'

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - PARAMÉTRAGE & PRÉCONISATIONS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tParam(){
  var ks=buildKS();
  var totR=ks.reduce(function(s,x){return s+x.k.rev;},0);
  var totBill=ks.reduce(function(s,x){return s+x.k.bill;},0);
  var _aktWD=ks.reduce(function(s,x){return s+(x.k.tWD||0);},0);
  var avgSr=_aktWD>0?ks.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/_aktWD:0;
  var avgTJMv=totBill>0?totR/totBill:0;
  var _fyTWD=wDays(fyStart(S.year),fyEnd(S.year),H);
  var netC=totR-(_fyTWD>0?ks.reduce(function(s,x){return s+x.c.scr*SCR_FACTOR*(x.k.tWD/_fyTWD);},0):0);

  var context='<div class="card" style="padding:20px;margin-bottom:20px">'
    +'<div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:14px">\uD83D\uDCCC Situation actuelle - '+fyLbl(S.year)+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">'
    +[['Staffing moyen',avgSr.toFixed(1)+'%'],['CA total',fEur(totR)],['TJM moyen',avgTJMv>0?fEur(Math.round(avgTJMv)):'\u2014'],['Contribution nette',fEur(netC)]].map(function(x){
      return '<div style="text-align:center;padding:12px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:16px;font-weight:800;color:#0f172a">'+x[1]+'</div>'
        +'<div style="font-size:11px;color:#64748b;margin-top:2px">'+x[0]+'</div></div>';
    }).join('')+'</div></div>';

  var goals=[
    {id:'ca',  icon:'\uD83D\uDCB6', title:'Augmenter le Chiffre d\'Affaires',       sub:'Maximiser les revenus de votre équipe de conseil'},
    {id:'util',icon:'\uD83D\uDCCA', title:'Améliorer le Taux d\'Utilisation',        sub:'Optimiser le staffing et réduire les jours non facturés'},
    {id:'tjm', icon:'\uD83D\uDCC8', title:'Augmenter le TJM Moyen',                  sub:'Améliorer les tarifs et la marge de votre équipe'}
  ];

  var sections=goals.map(function(g){
    var recs=S.precs&&S.precs[g.id];
    var recHtml=recs?recs.map(function(r,i){
      return '<div class="rec-card">'
        +'<div class="rec-title">'+esc((i+1)+'. '+r.title)+'</div>'
        +'<div class="rec-detail">'+esc(r.detail)+'</div></div>';
    }).join(''):'<div style="font-size:12px;color:#94a3b8;font-style:italic;padding:8px 0">Cliquez sur \u00ab\u00a0G\u00e9n\u00e9rer\u00a0\u00bb pour obtenir des pr\u00e9conisations personnalis\u00e9es bas\u00e9es sur vos donn\u00e9es '+fyLbl(S.year)+'.</div>';
    return '<div class="goal-card"><div class="goal-header">'
      +'<div class="goal-icon">'+g.icon+'</div>'
      +'<div style="flex:1"><div class="goal-title">'+esc(g.title)+'</div><div class="goal-sub">'+esc(g.sub)+'</div></div>'
      +'<button class="bp" style="flex-shrink:0" data-act="gen-'+g.id+'">\u26A1 Générer les préconisations</button>'
      +'</div>'+recHtml+'</div>';
  }).join('');

  return '<div class="vw">'
    +'<div><div class="pt">Param\u00e9trage & Pr\u00e9conisations</div>'
    +'<div class="ps">Analyse intelligente de vos donn\u00e9es '+fyLbl(S.year)+' pour vous aider \u00e0 atteindre vos objectifs</div></div>'
    +context+sections+'</div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - MODAL
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tActivite(){
  if(!S.cons.length)return '<div class="emp">Aucun consultant.</div>';
  if(!S.actCid||!S.cons.find(function(c){return c.id===S.actCid;}))S.actCid=S.cons[0].id;
  if(!S.actMonth)S.actMonth=TODAY.slice(0,7);
  var cid=S.actCid,c=S.cons.find(function(x){return x.id===cid;});
  var ym=S.actMonth.split('-'),year=+ym[0],mon=+ym[1];
  var hset=frHols(year);
  var Hy=fyHols(S.year);
  var _r=curRange(S.year);var rS=_r[0],rE=_r[1];
  var period=curLbl();

  /* ── Stats sur la période sélectionnée (FY ou trimestre) ── */
  var kc=kpi(c,S.miss,S.lvs,S.year,Hy,_r);

  /* Jours intercontrat sur la période = jours ouvrés sans mission ET sans congé
     (même logique que le planning : "Disponible" = ni mission ni congé enregistré) */
  var icDays=0;
  (function(){
    var d=rS;
    while(d<=rE){
      if(isWD(d,Hy)){
        var pres=true;
        if(c.arrive&&d<c.arrive)pres=false;
        if(c.depart&&d>c.depart)pres=false;
        if(pres&&!leaveOnDay(cid,d)&&!missOnDay(cid,d))icDays++;
      }
      d=nxt(d);
    }
  }());

  /* Jours congés/arrêts sur la période (hors Inter-contrat) */
  var lvCp=S.lvs.filter(function(l){return l.cid===cid&&l.type!=='Inter-contrat'&&l.type!=='Mission interne'&&l.e>=rS&&l.s<=rE;});
  var cpDays=lvCp.reduce(function(s,l){return s+wDays(l.s>rS?l.s:rS,l.e<rE?l.e:rE,Hy);},0);

  /* Jours mission interne */
  var lvInt=S.lvs.filter(function(l){return l.cid===cid&&l.type==='Mission interne'&&l.e>=rS&&l.s<=rE;});
  var intDays=lvInt.reduce(function(s,l){return s+wDays(l.s>rS?l.s:rS,l.e<rE?l.e:rE,Hy);},0);

  /* Marge sur les missions de la période */
  var marg=kc.om!=null?kc.om.toFixed(1)+'%':'\u2014';

  function statCard(label,val,sub,col){
    return '<div style="background:#f8fafc;border-radius:10px;padding:14px 16px;border:1px solid #e2e8f0">'
      +'<div style="font-size:22px;font-weight:800;color:'+(col||'#0f172a')+'">'+val+'</div>'
      +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:3px">'+label+'</div>'
      +(sub?'<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+sub+'</div>':'')
      +'</div>';
  }

  var statsGrid='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">'
    +statCard('Jours facturés', kc.bill+'j', period, '#2563eb')
    +statCard('Jours internes', intDays+'j', 'non facturés', '#0f766e')
    +statCard('Congés &amp; arrêts', cpDays+'j', period, '#b45309')
    +statCard('Inter-contrat', icDays+'j', period, icDays>0?'#b91c1c':'#15803d')
    +statCard('Staffing', kc.sr.toFixed(0)+'%', 'marge : '+marg, kc.sr>=75?'#15803d':kc.sr>=50?'#b45309':'#b91c1c')
    +'</div>';

  /* ── Calendrier mensuel ── */
  var firstDow=(new Date(year,mon-1,1).getDay()+6)%7;
  var dim=new Date(year,mon,0).getDate();
  var MNAMES=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  var co=S.cons.map(function(x){return '<option value="'+x.id+'"'+(x.id===cid?' selected':'')+'>'+esc(x.name)+'</option>';}).join('');
  var cells='',billed=0,leaveD=0,internD=0;
  for(var i=0;i<firstDow;i++)cells+='<div style="background:#f8fafc;border-radius:8px;min-height:62px"></div>';
  for(var d=1;d<=dim;d++){
    var ds=fD(new Date(year,mon-1,d));
    var we=isWE(ds),hol=hset.has(ds);
    var bg='#fff',bd='#e2e8f0',main='',sub='',txt='#0f172a',clk=false;
    if(we||hol){bg='#f8fafc';bd='#eef2f7';main=hol?'Férié':'';txt='#cbd5e1';}
    else{
      var lv=leaveOnDay(cid,ds);
      if(lv){
        var intern=(lv.type==='Mission interne'||lv.type==='Inter-contrat');
        bg=intern?'#f0fdfa':'#fffbeb';bd=intern?'#99f6e4':'#fde68a';
        main=lv.type;sub=intern?'Non facturé':'Absence';clk=true;
        if(intern)internD++;else leaveD++;
      }else{
        var mm=missOnDay(cid,ds);
        if(mm){bg='#eff6ff';bd='#bfdbfe';main=mm.client||mm.cli;sub=mm.name;billed++;clk=true;}
        else{main='Disponible';txt='#94a3b8';clk=true;}
      }
    }
    var isToday=(ds===TODAY);
    var style='background:'+bg+';border:'+(isToday?'2px solid #2563eb':'1px solid '+bd)+';border-radius:8px;min-height:62px;padding:5px 7px;overflow:hidden;'+(clk?'cursor:pointer':'');
    cells+='<div'+(clk?' data-act="day" data-day="'+ds+'"':'')+' style="'+style+'">'
      +'<div style="font-size:11px;font-weight:700;color:'+txt+'">'+d+'</div>'
      +(main?'<div style="font-size:10px;font-weight:600;color:#0f172a;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(main)+'</div>':'')
      +(sub?'<div style="font-size:9px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(sub)+'</div>':'')
      +'</div>';
  }
  var dows=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(function(x){return '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-align:center;text-transform:uppercase">'+x+'</div>';}).join('');

/* ════════════════════════════════════════════════════════════
   RECRUTEMENT — pipeline partagé, visible par toute l'entreprise
   ════════════════════════════════════════════════════════════ */
function tRecrut(){
  if(S.recSel){
    var cand=S.cands.find(function(c){return c.id===S.recSel;});
    if(cand)return tCandDetail(cand);
    S.recSel=null;
  }
  return tRecList();
}

function recListBody(){
  var q=(S.recF.q||'').toLowerCase().trim();
  var stF=S.recF.status||'all';
  var locF=S.recF.loc||[];
  var list=S.cands.filter(function(c){
    if(stF!=='all'&&c.status!==stF)return false;
    if(locF.length&&!(c.locations||[]).some(function(l){return locF.indexOf(l)>=0;}))return false;
    if(q){
      var hay=(c.name+' '+(c.expertise||[]).join(' ')+' '+(c.email||'')).toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }
    return true;
  });

  var counts={};REC_STATUS.forEach(function(s){counts[s.id]=0;});
  S.cands.forEach(function(c){if(counts[c.status]!=null)counts[c.status]++;});

  function pill(id,label,count){
    var active=stF===id;
    return '<button data-act="recf-st" data-id="'+id+'" style="padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid '+(active?'#2563eb':'#e2e8f0')+';background:'+(active?'#2563eb':'#fff')+';color:'+(active?'#fff':'#475569')+';cursor:pointer;margin:0 6px 6px 0">'+esc(label)+' <span style="opacity:.65">'+count+'</span></button>';
  }
  var pills=pill('all','Tous',S.cands.length)+REC_STATUS.map(function(s){return pill(s.id,s.lb,counts[s.id]);}).join('');

  var locCounts={};REC_LOCATIONS.forEach(function(l){locCounts[l]=0;});
  S.cands.forEach(function(c){(c.locations||[]).forEach(function(l){if(locCounts[l]!=null)locCounts[l]++;});});
  function locPill(loc){
    var active=locF.indexOf(loc)>=0;
    return '<button data-act="recf-loc" data-id="'+esc(loc)+'" style="padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid '+(active?'#7c3aed':'#e2e8f0')+';background:'+(active?'#7c3aed':'#fff')+';color:'+(active?'#fff':'#475569')+';cursor:pointer;margin:0 6px 6px 0">'+esc(loc)+' <span style="opacity:.65">'+locCounts[loc]+'</span></button>';
  }
  var locPills='<div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:10px 0 4px">Localisation'+(locF.length?' ('+locF.length+' sélectionnée'+(locF.length>1?'s':'')+')':'')+'</div>'
    +REC_LOCATIONS.map(locPill).join('');

  function tag(t){return '<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569;margin:0 4px 2px 0">'+esc(t)+'</span>';}

  var rows=list.map(function(c){
    var col=recStCol(c.status);
    var scr=recScr(c.reqSalary);
    var tjm=recTjm(c.reqSalary,c.marginPct);
    var exp=(c.expertise||[]);
    var expHtml=exp.slice(0,3).map(tag).join('')+(exp.length>3?'<span style="font-size:11px;color:#94a3b8">+'+(exp.length-3)+'</span>':'');
    var sec=(c.sectors||[]);
    var secHtml=sec.slice(0,2).map(tag).join('')+(sec.length>2?'<span style="font-size:11px;color:#94a3b8">+'+(sec.length-2)+'</span>':'');
    return '<tr data-act="recopen" data-id="'+c.id+'" style="cursor:pointer">'
      +'<td style="font-weight:700;color:#0f172a">'+esc(c.name)+'</td>'
      +'<td>'+(expHtml||'<span style="color:#cbd5e1">—</span>')+'</td>'
      +'<td>'+(secHtml||'<span style="color:#cbd5e1">—</span>')+'</td>'
      +'<td>'+esc((c.locations&&c.locations.length)?c.locations.join(', '):'—')+'</td>'
      +'<td>'+(c.availDate?fDt(c.availDate):'—')+'</td>'
      +'<td class="tr">'+(c.reqSalary?c.reqSalary.toLocaleString('fr-FR')+' €':'—')+'</td>'
      +'<td class="tr">'+(scr?scr.toFixed(0)+' €/j':'—')+'</td>'
      +'<td class="tr" style="font-weight:700;color:#2563eb">'+(tjm?tjm.toFixed(0)+' €/j':'—')+'</td>'
      +'<td><span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:'+col[0]+';color:'+col[1]+'">'+esc(recStLb(c.status))+'</span></td>'
      +'<td style="font-size:11px;color:#94a3b8">'+esc(c.createdBy?c.createdBy.split('@')[0]:'—')+'</td>'
      +'</tr>';
  }).join('');

  return '<div>'+pills+locPills+'</div>'
    +'<div class="card ov" style="margin-top:14px">'
    +'<table><thead><tr><th>Nom</th><th>Expertise</th><th>Secteurs</th><th>Localisation</th><th>Disponibilité</th><th class="tr">Rém. demandée</th><th class="tr">SCR/j</th><th class="tr">TJM revente</th><th>Statut</th><th>Ajouté par</th></tr></thead>'
    +'<tbody>'+rows+(rows?'':'<tr><td colspan="10" class="emp">Aucun candidat'+(q||stF!=='all'||locF.length?' ne correspond aux filtres.':' pour le moment. Cliquez « + Nouveau candidat » pour commencer.')+'</td></tr>')
    +'</tbody></table></div>';
}
/* Rafraîchit uniquement les pills + le tableau, sans toucher au champ de recherche
   (évite de recréer l'input et donc de lui faire perdre le focus à chaque frappe) */
function recListRefresh(){
  var wrap=document.getElementById('rec-list-wrap');
  if(wrap)wrap.innerHTML=recListBody();
}

function tRecList(){
  return '<div><div class="ph"><div><div class="pt">Recrutement</div>'
    +'<div class="ps">'+S.cands.length+' candidat'+(S.cands.length!==1?'s':'')+' · pipeline partagé entreprise, visible par tous les directeurs</div></div>'
    +'<button class="bp" data-act="arec">+ Nouveau candidat</button></div>'
    +'<div style="margin-bottom:10px"><input class="ic" id="recq" placeholder="Rechercher un candidat, une expertise, un email..." value="'+esc(S.recF.q||'')+'" style="max-width:360px"></div>'
    +'<div id="rec-list-wrap">'+recListBody()+'</div></div>';
}

function tCandDetail(c){
  var col=recStCol(c.status);
  var scr=recScr(c.reqSalary);
  var tjm=recTjm(c.reqSalary,c.marginPct);

  function tag(t){return '<span style="display:inline-block;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:600;background:#f1f5f9;color:#475569;margin:0 5px 5px 0">'+esc(t)+'</span>';}
  var expHtml=(c.expertise&&c.expertise.length)?c.expertise.map(tag).join(''):'<span style="color:#94a3b8;font-size:12px">Aucune expertise renseignée</span>';
  var secHtml=(c.sectors&&c.sectors.length)?c.sectors.map(tag).join(''):'<span style="color:#94a3b8;font-size:12px">Aucun secteur renseigné</span>';

  function info(label,val){
    return '<div><div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">'+label+'</div><div style="font-size:13px;color:#0f172a;font-weight:600">'+val+'</div></div>';
  }
  var infoGrid='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px 24px">'
    +info('Email',esc(c.email||'—'))
    +info('Téléphone',esc(c.phone||'—'))
    +info('Localisation',esc((c.locations&&c.locations.length)?c.locations.join(', '):'—'))
    +info('Nationalité',esc(c.nationality||'—'))
    +info('Expérience',c.yearsExp?c.yearsExp+' an'+(c.yearsExp>1?'s':''):'—')
    +info('Disponibilité',c.availDate?fDt(c.availDate):'—')
    +'</div>';

  var compCard='<div style="display:flex;gap:32px;flex-wrap:wrap;margin-top:18px;padding-top:18px;border-top:1px solid #e2e8f0">'

    +'<div><div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase">SCR journalier</div><div style="font-size:18px;font-weight:800;color:#0f172a">'+(scr?scr.toFixed(0)+' €':'—')+'</div></div>'
    +'<div><div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase">TJM de revente (marge '+(c.marginPct!=null?c.marginPct:25)+'%)</div><div style="font-size:18px;font-weight:800;color:#2563eb">'+(tjm?tjm.toFixed(0)+' €':'—')+'</div></div>'
    +'</div>';

  /* Compte rendu général (saisi à la création/édition du candidat) */
  var crHtml=(c.compteRendu||c.compteRenduFilePath)

      +(c.compteRenduFilePath?'<button class="lb" data-act="recmdl" data-id="'+c.id+'" data-fb="__cr">\uD83D\uDCCE '+esc(c.compteRenduFileName||'Fichier joint')+'</button>':'')
    : '<span style="color:#94a3b8;font-size:12px">Aucun compte rendu</span>';

  /* ── Rencontre CGI : entrées multiples (personne CGI + date + compte rendu + fichier), éditables ── */

  var cgiMeetsHtml=cgiMeets.map(function(mt){
    var hdr=[];
    if(mt.date)hdr.push(fDt(mt.date));
    if(mt.person)hdr.push(esc(mt.person));
    return '<div style="padding:14px 16px;background:#f8fafc;border-radius:10px;margin-bottom:10px;border:1px solid #e2e8f0">'

      +'<div style="display:flex;gap:10px;flex-shrink:0">'
      +'<button class="lb" data-act="recgedit" data-id="'+c.id+'" data-fb="'+mt.id+'">Modifier</button>'
      +'<button class="lr" data-act="recgdel" data-id="'+c.id+'" data-fb="'+mt.id+'">Suppr.</button>'
      +'</div></div>'
      +(mt.text?'<div style="font-size:13px;color:#334155;white-space:pre-wrap;line-height:1.5">'+esc(mt.text)+'</div>':'')
      +(mt.filePath?'<div style="margin-top:8px"><button class="lb" data-act="recgdl" data-id="'+c.id+'" data-fb="'+mt.id+'">\uD83D\uDCCE '+esc(mt.fileName||'Fichier joint')+'</button></div>':'')
      +'</div>';
  }).join('');

  var editingCgi=S.recEditCgiId?(c.cgiMeetings||[]).find(function(f){return f.id===S.recEditCgiId;}):null;
  var cgiFormOpen=S.recAddCgi||!!editingCgi;
  var addCgiForm=cgiFormOpen
    ? '<div style="padding:16px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:14px">'
      +(editingCgi?'<div style="font-size:11px;color:#2563eb;font-weight:700;margin-bottom:10px">\u2710 Modification d\u2019une rencontre existante</div>':'')

      +'<div class="fd cs2"><label class="fl">Date de la rencontre</label><input class="ic" id="cgdate" type="date" value="'+esc(editingCgi?editingCgi.date||'':fD(new Date()))+'" style="max-width:220px"></div>'
      +'</div>'
      +'<div class="fd"><label class="fl">Compte rendu rencontre CGI</label><textarea class="ic" id="cgtext" rows="4" placeholder="Notes, retour de l\u2019échange...">'+esc(editingCgi?editingCgi.text||'':'')+'</textarea></div>'
      +'<div class="fd"><label class="fl">Joindre un fichier (Word, e-mail, PDF...) — optionnel</label><input class="ic" type="file" id="cgfile" accept=".doc,.docx,.pdf,.txt,.odt,.eml,.msg">'

      +'<div class="br"><button class="bg" data-act="recgcancel">Annuler</button><button class="bp" data-act="recgsave" data-id="'+c.id+'"'+(editingCgi?' data-fb="'+editingCgi.id+'"':'')+'>'+(editingCgi?'Enregistrer les modifications':'Enregistrer la rencontre')+'</button></div>'
      +'</div>'
    : '';

  var meets=(c.feedbacks||[]).slice().reverse();
  var meetsHtml=meets.map(function(mt){
    var hdr=[];
    if(mt.date)hdr.push(fDt(mt.date));
    if(mt.client)hdr.push(esc(mt.client));
    if(mt.contact)hdr.push(esc(mt.contact));
    return '<div style="padding:14px 16px;background:#f8fafc;border-radius:10px;margin-bottom:10px;border:1px solid #e2e8f0">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:10px">'
      +'<div style="font-size:12px;color:#0f172a;font-weight:700">'+(hdr.join(' · ')||'Rencontre')+'</div>'
      +'<div style="display:flex;gap:10px;flex-shrink:0">'
      +'<button class="lb" data-act="recmedit" data-id="'+c.id+'" data-fb="'+mt.id+'">Modifier</button>'
      +'<button class="lr" data-act="recmdel" data-id="'+c.id+'" data-fb="'+mt.id+'">Suppr.</button>'
      +'</div></div>'
      +(mt.text?'<div style="font-size:13px;color:#334155;white-space:pre-wrap;line-height:1.5">'+esc(mt.text)+'</div>':'')
      +(mt.filePath?'<div style="margin-top:8px"><button class="lb" data-act="recmdl" data-id="'+c.id+'" data-fb="'+mt.id+'">\uD83D\uDCCE '+esc(mt.fileName||'Fichier joint')+'</button></div>':'')
      +'</div>';
  }).join('');

  var editingMeet=S.recEditMeetId?(c.feedbacks||[]).find(function(f){return f.id===S.recEditMeetId;}):null;
  var meetFormOpen=S.recAddMeet||!!editingMeet;
  var addMeetForm=meetFormOpen
    ? '<div style="padding:16px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:14px">'
      +(editingMeet?'<div style="font-size:11px;color:#2563eb;font-weight:700;margin-bottom:10px">\u2710 Modification d\u2019une rencontre existante</div>':'')
      +'<div class="g2">'
      +'<div class="fd"><label class="fl">Client rencontré</label><input class="ic" id="mtcli" value="'+esc(editingMeet?editingMeet.client||'':'')+'" placeholder="Nom du client"></div>'
      +'<div class="fd"><label class="fl">Opérationnel rencontré</label><input class="ic" id="mtcon" value="'+esc(editingMeet?editingMeet.contact||'':'')+'" placeholder="Prénom Nom"></div>'

      +'<div class="fd"><label class="fl">Joindre un fichier (Word, PDF...) — optionnel</label><input class="ic" type="file" id="mtfile" accept=".doc,.docx,.pdf,.txt,.odt">'
      +(editingMeet&&editingMeet.fileName?'<p class="fh">Fichier actuel : '+esc(editingMeet.fileName)+' — sélectionnez un nouveau fichier pour le remplacer.</p>':'')+'</div>'

    +'<div class="card" style="padding:24px;margin-bottom:18px">'+infoGrid

    +addCvForm

function expPickerHTML(){
  var sel=(S.modal&&S.modal.expSel)||[];

  var chips=sel.map(function(v){
    return '<span class="_tagchip" data-rm="'+esc(v)+'" style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af;margin:0 5px 5px 0;cursor:pointer">'+esc(v)+' <span style="font-weight:900;opacity:.65">\u00d7</span></span>';
  }).join('')||'<span style="font-size:12px;color:#94a3b8">Aucune expertise sélectionnée</span>';
  var checks=EXPERTISE_LIST.map(function(opt){
    var checked=selSet.has(opt);
    return '<label style="display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:12px;color:#334155;cursor:pointer;border-radius:5px">'
      +'<input type="checkbox" class="_expck" data-v="'+esc(opt)+'"'+(checked?' checked':'')+' style="accent-color:#84CC16">'+esc(opt)+'</label>';
  }).join('');
  return '<div style="margin-bottom:8px">'+chips+'</div>'
    +'<div style="max-height:140px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:6px;background:#fff">'+checks+'</div>'
    +'<div style="display:flex;gap:6px;margin-top:8px">'

    +'<button type="button" class="bg" id="exp-addbtn">+ Ajouter</button></div>';

function expRefresh(){var w=document.getElementById('exp-wrap');if(w){w.innerHTML=expPickerHTML();bindExpWidget();}}
function bindExpWidget(){
  var wrap=document.getElementById('exp-wrap');
  if(!wrap)return;
  wrap.onclick=function(e){
    var chip=e.target.closest('._tagchip');
    if(chip){
      var v=chip.getAttribute('data-rm');
      S.modal.expSel=(S.modal.expSel||[]).filter(function(x){return x!==v;});
      expRefresh();
    }
  };
  wrap.onchange=function(e){
    if(e.target.classList.contains('_expck')){
      var v=e.target.getAttribute('data-v');
      var a=S.modal.expSel=S.modal.expSel||[];
      var i=a.indexOf(v);
      if(e.target.checked){if(i<0)a.push(v);}else if(i>=0)a.splice(i,1);
    }
  };
  var btn=document.getElementById('exp-addbtn');
  if(btn)btn.onclick=function(){
    var inp=document.getElementById('exp-custom');if(!inp)return;
    var v=inp.value.trim();if(!v)return;
    var a=S.modal.expSel=S.modal.expSel||[];
    if(a.indexOf(v)<0)a.push(v);
    inp.value='';expRefresh();

    }else{
      var lo=LTYPES.map(function(t){return '<option value="'+t+'"'+(t==='Mission interne'?' selected':'')+'>'+esc(t)+'</option>';}).join('');
      body='<p style="font-size:13px;color:#475569;margin-bottom:12px">Marquer ce jour comme <strong>non travaillé</strong> :</p>'

    title='\uD83D\uDCE7 Invitation \u2014 '+esc(m.consName||'');
    body='<div style="text-align:center;padding:12px 0 20px">'

      +'Un lien d\u2019invitation a \u00e9t\u00e9 g\u00e9n\u00e9r\u00e9 pour <strong>'+esc(m.consName||'')+'</strong>'
      +'<br>(<span style="color:#64748b">'+esc(m.email||'')+'</span>).</div>'
      +'<a href="'+esc(m.mailtoUrl||'')+'" style="display:inline-block;background:#2563eb;color:#fff;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:.01em">'
      +'\uD83D\uDCE8 Ouvrir ma messagerie pour envoyer</a>'
      +'<div style="margin-top:16px;font-size:11px;color:#94a3b8">'
      +'Cliquez le bouton ci-dessus pour ouvrir votre client email (Outlook, Gmail, Mail...).<br>'
      +'L\u2019email sera pr\u00e9-rempli avec le lien d\u2019invitation.</div>'
      +'<div style="margin-top:14px;padding:10px 14px;background:#f8fafc;border-radius:8px;font-size:11px;color:#475569;word-break:break-all;text-align:left">'
      +'<span style="color:#94a3b8">Lien\u00a0: </span>'+esc(m.invLink||'')+'</div>'
      +'</div>'
      +'<div class="br"><button class="bg" data-act="mc">Fermer</button></div>';
  }
  /* ── Modal code d’invitation consultant ── */
  if(tp==='invite_code'){
    title='\uD83D\uDD11 Code d\u2019invitation — '+esc(m.consName||'');
    body='<div style="text-align:center;padding:12px 0 8px">'
      +'<div style="font-size:13px;color:#374151;margin-bottom:18px">Transmettez ce code \u00e0 <strong>'+esc(m.consName||'')+'</strong>.</div>'
      +'<div id="inv-code-box" style="font-size:32px;font-weight:900;letter-spacing:6px;color:#2563eb;background:#eff6ff;padding:20px 28px;border-radius:12px;border:2px solid #bfdbfe;cursor:text;user-select:all">'+esc(m.code||'')+'</div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-top:10px">Cliquez sur le code pour le s\u00e9lectionner, puis Ctrl+C / Cmd+C pour copier.</div>'
      +'<div style="margin-top:16px;padding:12px 16px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#15803d;text-align:left">'
      +'\u2139\uFE0F Code \u00e0 usage unique. Le consultant le saisira sur la page de connexion pour cr\u00e9er son compte et \u00eatre rattach\u00e9 \u00e0 votre \u00e9quipe.'
      +'</div></div>'
      +'<div class="br">'
      +'<button class="bp" onclick="var el=document.getElementById(\'inv-code-box\');if(el){var r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}">S\u00e9lectionner le code</button>'
      +'<button class="bg" data-act="mc">Fermer</button></div>';
  }
  /* ── Modal confirmation "demande envoyée" ── */
  if(tp==='approval_sent'){
    title='\uD83D\uDD14 Demande envoy\u00e9e';
    body='<div style="text-align:center;padding:20px 0">'
      +'<div style="font-size:48px;margin-bottom:12px">\u23f3</div>'
      +'<div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:8px">Votre demande est en cours d\u2019analyse</div>'
      +'<div style="font-size:13px;color:#64748b;max-width:320px;margin:0 auto">'
      +esc(m.desc||'')
      +'<br><br>Votre directeur recevra une notification et devra approuver ou refuser cette modification.'
      +'<br>Vous serez inform\u00e9(e) dans l\u2019onglet <strong>Approbations</strong>.</div></div>'
      +'<div class="br"><button class="bp" data-act="mc">Compris</button></div>';
  }
  /* ── Modal refus avec motif (directeur) ── */
  if(tp==='appr_reject'){
    title='Refuser la demande';
    body='<div style="font-size:13px;color:#64748b;margin-bottom:12px">Demande de <strong>'+esc(m.consName||'')+'</strong> : '+esc(m.applyDesc||'')+'</div>'
      +'<div class="fd"><label class="fl">Motif du refus *</label>'
      +'<textarea class="ic" id="appr-reason" rows="3" placeholder="Expliquez la raison du refus au consultant\u2026" style="resize:vertical"></textarea></div>'
      +'<div class="br"><button class="bg" data-act="mc">Annuler</button>'
      +'<button class="bp" style="background:#b91c1c;border-color:#b91c1c" data-act="appr-ko-confirm" data-id="'+esc(m.reqId||'')+'">Confirmer le refus</button></div>';

  return '<div class="mov" id="mov"><div class="mbox '+(wide?'mw':'mn')+'">'
    +'<div class="mhd"><h3>'+esc(title)+'</h3><button class="mcl" data-act="mc">&times;</button></div>'
    +'<div class="mbd">'+body+'</div></div></div>';

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RENDER
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function render(){
  if(!S.demo)saveLocal(); /* sauvegarde automatique — désactivée en mode démo */
  /* ═══ filtrage par rôle / directeur : on bascule sur la vue filtrée le temps du rendu ═══ */
  S._all={cons:S.cons,miss:S.miss,lvs:S.lvs};
  var _vis=visibleData();S.cons=_vis.cons;S.miss=_vis.miss;S.lvs=_vis.lvs;
  document.getElementById('sb').innerHTML=tSB();
  var v=S.tab==='dashboard'?tDash():S.tab==='teams'?tTeams():S.tab==='recrutement'?tRecrut():S.tab==='missions'?tMiss():S.tab==='planning'?tPlan():S.tab==='kpis'?tKPIs():S.tab==='leaves'?tLeaves():S.tab==='activite'?tActivite():S.tab==='directeurs'?tDirecteurs():S.tab==='approvals'?tApprovals():S.tab==='admin'?tAdmin():S.tab==='profile'?tProfile():tParam();
  var _ini=function(n){return n.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();};
  var _av=S._userEmail?_ini(S._userEmail.split('@')[0].replace(/[._]/g,' ')):'?';
  var _pfBtn='<div id="prof-btn" style="position:absolute;top:12px;right:14px;z-index:50">'
    +'<button onclick="S.tab=\'profile\';render()" title="Profil - '+esc(S._userEmail||'')+'"'
    +' style="width:34px;height:34px;border-radius:50%;background:#1B2B3A;color:#84CC16;border:2px solid #84CC16;'
    +'font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center">'+_av+'</button></div>';
  /* Bannière démo */
  var _demoBanner=S.demo
    ?'<div style="background:#7c3aed;color:#fff;text-align:center;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:16px;flex-shrink:0">'
    +'\uD83C\uDFAE MODE D\u00c9MO — donn\u00e9es fictives, aucune modification sauvegard\u00e9e'
    +'<a href="/esn_login.html" style="color:#e9d5ff;font-size:12px;font-weight:600;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:6px;text-decoration:none">'
    +'Cr\u00e9er un compte \u2192</a></div>'
    :'';
  document.getElementById('mc').innerHTML=_demoBanner+'<div class="inn" style="position:relative">'+_pfBtn+v+'</div>';
  document.getElementById('md').innerHTML=tModal();
  /* on restaure les données maîtres (les handlers de bind() mutent l'ensemble complet) */
  S.cons=S._all.cons;S.miss=S._all.miss;S.lvs=S._all.lvs;
  bind();
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   EVENT BINDING
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function bind(){
  var el=function(id){return document.getElementById(id);};
  var yr=el('yrs');if(yr)yr.onchange=function(){S.year=+this.value;H=fyHols(S.year);S.precs={};render();};
  /* nav */
  var nbs=document.querySelectorAll('[data-nav]');
  for(var i=0;i<nbs.length;i++){(function(b){b.onclick=function(){
    var nv=b.getAttribute('data-nav');
    if(nv==='recrutement'){S.recSel=null;S.recAddMeet=false;S.recAddCgi=false;S.recAddCv=false;S.recEditMeetId=null;S.recEditCgiId=null;}
    S.tab=nv;
    /* Rafraîchir les données en temps réel sur les onglets sensibles */
    if(nv==='admin'){loadConsInvites().then(function(){render();});}
    else if(nv==='dashboard'&&S.role==='directeur'){loadApprovals().then(function(){render();});}
    else{render();}
  };})(nbs[i]);}
  /* filters */
  var fc=el('fmc');if(fc)fc.onchange=function(){S.fmc=this.value;render();};
  var fs=el('fms');if(fs)fs.onchange=function(){S.fms=this.value;render();};
  var ftf=el('fmt');if(ftf)ftf.onchange=function(){S.fmt=this.value;render();};
  var acc=el('act-cid');if(acc)acc.onchange=function(){S.actCid=this.value;render();};
  var lc=el('flc');if(lc)lc.onchange=function(){S.flc=this.value;render();};
  var rq=el('recq');
  if(rq){
    rq.oninput=function(){
      S.recF.q=this.value;
      recListRefresh(); /* met à jour uniquement la liste — l'input n'est jamais recréé, le focus reste intact */
    };
  }
  /* délégation : les clics sur les pastilles de statut/localisation (recréées à chaque recListRefresh)
     sont capturés sur le conteneur stable, qui lui n'est jamais détruit pendant la frappe */
  var rlw=el('rec-list-wrap');
  if(rlw){
    rlw.onclick=function(e){
      var t=e.target.closest('[data-act]');
      if(!t)return;
      var ra=t.getAttribute('data-act'),rid=t.getAttribute('data-id');
      if(ra==='recf-st'){S.recF.status=rid;recListRefresh();}
      else if(ra==='recf-loc'){
        var la=S.recF.loc||[];
        var li=la.indexOf(rid);
        if(li>=0)la.splice(li,1);else la.push(rid);
        S.recF.loc=la;
        recListRefresh();
      }
      else if(ra==='recopen'){S.recSel=rid;S.recAddMeet=false;S.recAddCgi=false;S.recAddCv=false;S.recEditMeetId=null;S.recEditCgiId=null;render();}
    };
  }
  /* widgets multi-sélection Expertises / Secteurs (uniquement si le modal candidat est ouvert) */
  if(S.modal&&S.modal.type==='candidate'){bindExpWidget();bindSecWidget();bindLocWidget();}


  /* filtre directeur (gestionnaire) */
  var rcb=document.querySelectorAll('[data-dir]');
  for(var rk=0;rk<rcb.length;rk++){(function(cb){cb.onchange=function(){
    var r=cb.getAttribute('data-dir');
    if(!S.fdir)S.fdir=[];
    if(cb.checked){if(S.fdir.indexOf(r)<0)S.fdir.push(r);}
    else{S.fdir=S.fdir.filter(function(x){return x!==r;});}
    render();
  };})(rcb[rk]);}
  var rclr=document.querySelector('[data-dir-clear]');
  if(rclr)rclr.onclick=function(){S.fdir=[];render();};
  /* all data-act */
  var bs=document.querySelectorAll('[data-act]:not([data-act="recopen"]):not([data-act="recf-st"])');
  for(var j=0;j<bs.length;j++){(function(b){
    var a=b.getAttribute('data-act'),id=b.getAttribute('data-id'),fb=b.getAttribute('data-fb');
    b.onclick=async function(e){
      e.stopPropagation();
      if(a==='export'){exportJSON();return;}
      else if(a==='qsel'){S.quarter=id?+id:null;render();}
      else if(a==='lvc'){S.flc=id;render();return;}
      else if(a==='gen-ca'){genRecs('ca');}
      else if(a==='gen-util'){genRecs('util');}
      else if(a==='gen-tjm'){genRecs('tjm');}
      else if(a==='ac'){S.modal={type:'consultant',item:null};render();}
      else if(a==='am'){
      var _now=new Date();
      S.modal={type:'mission',item:null,wmode:'rec',manualDays:[],
        calYear:_now.getFullYear(),calMonth:_now.getMonth()};
      render();}
      else if(a==='al'){S.modal={type:'leave',item:null};render();}
      else if(a==='mc'){S.modal=null;render();}
      else if(a==='ec'){S.modal={type:'consultant',item:S.cons.find(function(c){return c.id===id;})};render();}
      else if(a==='em'){
      var _it=S.miss.find(function(m){return m.id===id;});
      var _now2=new Date();
      S.modal={type:'mission',item:_it,
        wmode:(_it&&_it.wmode)||'rec',
        manualDays:(_it&&_it.manualDays)?_it.manualDays.slice():[],
        calYear:_now2.getFullYear(),calMonth:_now2.getMonth()};
      render();}
      else if(a==='el'){S.modal={type:'leave',item:S.lvs.find(function(l){return l.id===id;})};render();}
      else if(a==='dc'){var c=S.cons.find(function(c){return c.id===id;});if(c&&confirm('Supprimer '+c.name+' ?')){S.cons=S.cons.filter(function(c){return c.id!==id;});sbDel('consultants',id);render();}}
      else if(a==='dm'){
        if(S.role==='consultant'){
          var mDel=S.miss.find(function(m){return m.id===id;});
          if(mDel&&confirm('Soumettre une demande de suppression de cette mission ?')){
            submitApproval('miss_del',{id:id},'Suppression de mission \u2014 '+esc(mDel.cli)+' \u00b7 '+esc(mDel.name));
          }
        }else{
          if(confirm('Supprimer cette mission ?')){S.miss=S.miss.filter(function(m){return m.id!==id;});sbDel('missions',id);render();}
        }
      }
      else if(a==='dl'){
        if(S.role==='consultant'){
          var lvDel=S.lvs.find(function(l){return l.id===id;});
          if(lvDel&&confirm('Soumettre une demande de suppression de cette absence ?')){
            submitApproval('leave_del',{id:id},'Suppression d\u2019absence \u2014 '+esc(lvDel.type)+' du '+fDt(lvDel.s)+' au '+fDt(lvDel.e));
          }
        }else{
          if(confirm('Supprimer cette absence ?')){S.lvs=S.lvs.filter(function(l){return l.id!==id;});sbDel('leaves',id);render();}
        }
      }
      /* ── Approbations directeur ── */
      else if(a==='appr-ok'){
        var req=S.approvals.find(function(r){return r.id===id;});
        if(!req)return;
        req.status='approved';req.resolvedAt=new Date().toISOString();
        applyApproval(req);
        S.approvals=S.approvals.map(function(r){return r.id===id?req:r;});
        sbUpsertApproval(req).catch(function(e){console.warn(e);});
        saveLocal();render();
      }
      else if(a==='appr-ko'){
        var reqKo=S.approvals.find(function(r){return r.id===id;});
        if(!reqKo)return;
        S.modal={type:'appr_reject',reqId:id,consName:reqKo.consName,applyDesc:reqKo.applyDesc};render();
      }
      else if(a==='appr-ko-confirm'){
        var reason=gv('appr-reason');
        if(!reason){alert('Veuillez saisir un motif de refus.');return;}
        var reqKo2=S.approvals.find(function(r){return r.id===id;});
        if(!reqKo2)return;
        reqKo2.status='rejected';reqKo2.rejectionReason=reason;reqKo2.resolvedAt=new Date().toISOString();
        S.approvals=S.approvals.map(function(r){return r.id===id?reqKo2:r;});
        sbUpsertApproval(reqKo2).catch(function(e){console.warn(e);});
        saveLocal();S.modal=null;render();
      }
      else if(a==='sc'){
        var n=gv('mn'),t=gv('mti'),s=+gv('ms'),em=gv('me');
        var arr=gv('marr')||null,dep=gv('mdep')||null;
        var rdir=(S.role==='directeur')?S.dirName:gv('mdir'); /* un directeur ne crée que dans son équipe */
        if(!n||!t||!s){alert('Veuillez remplir les champs obligatoires (*).');return;}
        var it=S.modal.item;
        var nc;
        if(it){S.cons=S.cons.map(function(c){if(c.id===it.id){nc=Object.assign({},c,{name:n,title:t,scr:s,email:em,dir:rdir,arrive:arr,depart:dep});return nc;}return c;});}
        else{nc={id:uid(),name:n,title:t,scr:s,email:em,dir:rdir,arrive:arr,depart:dep};S.cons=S.cons.concat([nc]);}
        sbUpsertCons(nc);
        S.modal=null;render();
      }
      /* save mission */
      else if(a==='sm'){
        var cid=gv('mcid'),mn=gv('mmn'),cl=gv('mcl'),tj=+gv('mtj'),sd=gv('msd'),ed=gv('med')||null;
        var lo=gv('mlo'),mg=gv('mmg'),cc=gv('mcc'),cr=gv('mcr');
        var btEl=document.querySelector('input[name="mbt"]:checked');
        var bt=btEl?btEl.value:'at';
        var wdays=[];var wdEls=document.querySelectorAll('.mwd:checked');
        for(var wi=0;wi<wdEls.length;wi++)wdays.push(+wdEls[wi].value);
        var wmode2=(S.modal&&S.modal.wmode==='man')?'man':'rec';
        var manualDays2=(wmode2==='man'&&S.modal&&S.modal.manualDays)?S.modal.manualDays.slice():[];
        var deal=+gv('mdeal')||0,tmar=(gv('mtmar')===''?null:+gv('mtmar'));
        if(!cid||!mn||!cl||!sd){alert('Veuillez remplir les champs obligatoires (*).');return;}
        /* Consultant : TJM saisi à 0, le directeur le renseigne lors de l'approbation */
        if(S.role!=='consultant'){
          if(bt==='forfait'){
            if(!deal||tmar==null){alert('Pour un forfait : indiquez le montant du deal (CA) et la marge recherchée.');return;}
          }else if(!tj){alert('Pour une mission en Assistance technique : indiquez le TJM.');return;}
        }
        if(!wdays.length&&wmode2!=='man'){alert('Sélectionnez au moins un jour travaillé.');return;}
        if(wmode2==='man'&&!manualDays2.length){alert('Sélectionnez au moins un jour dans le calendrier.');return;}
        var pcode=gv('mpcd')||'';
        var d={cid:cid,name:mn,cli:cl,tjm:tj,sd:sd,ed:ed,loc:lo,mgr:mg,ccn:cc,ccr:cr,btype:bt,wdays:wdays,deal:deal,tmar:tmar,pcode:pcode,wmode:wmode2,manualDays:manualDays2};
        var it=S.modal.item;
        if(S.role==='consultant'){
          var mDesc=(it?'Modification':'Ajout')+' de mission — '+esc(cl)+' · '+esc(mn)+' début '+fDt(sd)+(ed?' fin '+fDt(ed):'');
          var mPl=it?Object.assign({},it,d):Object.assign({id:uid()},d);
          submitApproval(it?'miss_edit':'miss_add',mPl,mDesc);
        }else{
          var nm;
          if(it){S.miss=S.miss.map(function(m){if(m.id===it.id){nm=Object.assign({},m,d);return nm;}return m;});}
          else{nm=Object.assign({id:uid()},d);S.miss=S.miss.concat([nm]);}
          sbUpsertMiss(nm);
          S.modal=null;render();
        }
      }
      /* save leave */
      else if(a==='sl'){
        var lci=gv('mlc'),lt=gv('mlt'),ls=gv('mls'),le=gv('mle');
        if(!lci||!ls||!le){alert('Veuillez remplir les champs obligatoires (*).');return;}
        var it=S.modal.item;
        /* ── Consultant : soumettre à approbation au lieu d'appliquer directement ── */
        if(S.role==='consultant'){
          var desc=(it?'Modification':'Ajout')+' d\u2019absence — '+esc(lt)+' du '+fDt(ls)+' au '+fDt(le);
          var pl=it
            ?Object.assign({},it,{cid:lci,type:lt,s:ls,e:le})
            :{id:uid(),cid:lci,type:lt,s:ls,e:le};
          submitApproval(it?'leave_edit':'leave_add',pl,desc);
        }else{
          var nl;
          if(it){S.lvs=S.lvs.map(function(l){if(l.id===it.id){nl=Object.assign({},l,{cid:lci,type:lt,s:ls,e:le});return nl;}return l;});}
          else{nl={id:uid(),cid:lci,type:lt,s:ls,e:le};S.lvs=S.lvs.concat([nl]);}
          sbUpsertLeave(nl);
          S.modal=null;render();
        }
      }
      /* ════════════════════ RECRUTEMENT ════════════════════ */
      else if(a==='arec'){S.modal={type:'candidate',item:null,expSel:[],secSel:[],locSel:[]};render();}
      else if(a==='erec'){
        var itEd=S.cands.find(function(c){return c.id===id;});
        S.modal={type:'candidate',item:itEd,
          expSel:(itEd&&itEd.expertise)?itEd.expertise.slice():[],
          secSel:(itEd&&itEd.sectors)?itEd.sectors.slice():[],
          locSel:(itEd&&itEd.locations)?itEd.locations.slice():[]};
        render();
      }
      else if(a==='drec'){
        var cdDel=S.cands.find(function(c){return c.id===id;});
        if(cdDel&&confirm('Supprimer le candidat '+cdDel.name+' ?\nCette action supprime aussi tous ses retours clients. Irr\u00e9versible.')){
          S.cands=S.cands.filter(function(c){return c.id!==id;});
          if(S.recSel===id)S.recSel=null;
          sbDel('candidates',id);
          render();
        }
      }
      else if(a==='screc'){
        var rn=gv('rcn');
        if(!rn){alert('Le nom du candidat est obligatoire.');return;}
        var expArr=(S.modal.expSel||[]).slice();
        var secArr=(S.modal.secSel||[]).slice();
        var marEl=document.getElementById('rcmar');
        var itC=S.modal.item;
        var candId=itC?itC.id:uid();

        var crFilePath=itC?(itC.compteRenduFilePath||null):null;
        var crFileName=itC?(itC.compteRenduFileName||null):null;
        var crFileEl=document.getElementById('rccrfile');
        var crFile=(crFileEl&&crFileEl.files&&crFileEl.files[0])?crFileEl.files[0]:null;
        if(crFile){
          try{
            crFilePath=await uploadCandFile(crFile,candId,'cr');
            crFileName=crFile.name;
          }catch(upErr){alert('\u26a0 '+upErr.message);return;}
        }

        /* CV : un ou plusieurs fichiers, s'ajoutent aux CV déjà présents */
        var cvArr=(itC&&itC.cvFiles)?itC.cvFiles.slice():[];
        var cvFileEl=document.getElementById('rccv');
        var cvFiles=(cvFileEl&&cvFileEl.files)?Array.from(cvFileEl.files):[];
        for(var cvi=0;cvi<cvFiles.length;cvi++){
          try{
            var cvId=uid();
            var cvPath=await uploadCandFile(cvFiles[cvi],candId,'cv_'+cvId);
            cvArr.push({id:cvId,fileName:cvFiles[cvi].name,filePath:cvPath});
          }catch(upErr){alert('\u26a0 Erreur upload CV ('+cvFiles[cvi].name+') : '+upErr.message);return;}
        }

        var locArr=(S.modal.locSel||[]).slice();

        var cfields={
          name:rn,email:gv('rce'),phone:gv('rcph'),
          locations:locArr,nationality:gv('rcnat')||'',
          availDate:gv('rcav')||'',reqSalary:+gv('rcsal')||0,
          yearsExp:+gv('rcyrs')||0,expertise:expArr,sectors:secArr,cvFiles:cvArr,
          compteRendu:gv('rccr'),compteRenduFilePath:crFilePath,compteRenduFileName:crFileName,
          marginPct:marEl?+marEl.value:25,status:gv('rcst')||'nouveau'
        };
        var ncand;
        if(itC){
          ncand=Object.assign({},itC,cfields);
          S.cands=S.cands.map(function(c){return c.id===itC.id?ncand:c;});
        }else{
          ncand=Object.assign({id:candId,createdBy:S._userEmail||'',feedbacks:[],cgiMeetings:[]},cfields);
          S.cands=S.cands.concat([ncand]);
        }

        /* ── Recrutement : créer le consultant dans l'équipe ── */
        var rcCb=document.getElementById('rc-recruited');
        var wasRecruited=itC&&itC.recruited;
        if(rcCb&&rcCb.checked){
          var rcStart=gv('rc-start');
          var rcPoste=gv('rc-poste');
          var rcDir=gv('rc-dir');
          if(!rcStart||!rcPoste){alert('La date de d\u00e9marrage et le poste sont obligatoires pour int\u00e9grer le consultant dans l\'\u00e9quipe.');return;}
          /* Stocker les champs recrutement sur le candidat */
          ncand.recruited=true;
          ncand.recruitStart=rcStart;
          ncand.recruitPoste=rcPoste;
          ncand.recruitDir=rcDir;
          ncand.status='recrute';
          /* Créer ou mettre à jour le profil consultant (ne crée qu'une seule fois) */
          if(!wasRecruited){
            var newCons={
              id:uid(),
              name:rn,
              title:rcPoste,
              scr:Math.round(recScr(cfields.reqSalary||0)),
              email:cfields.email||'',
              dir:rcDir||'',
              arrive:rcStart,
              depart:null,
              phone:cfields.phone||''
            };
            S.cons=S.cons.concat([newCons]);
            sbUpsertCons(newCons).catch(function(err){console.warn('sbUpsertCons (recrutement):',err);});
            ncand.consId=newCons.id; /* lien entre candidat et consultant */
          }
        }

        sbUpsertCand(ncand).catch(function(err){console.warn('sbUpsertCand:',err);alert('\u26a0 Erreur de synchronisation : '+err.message);});
        S.modal=null;render();
        if(rcCb&&rcCb.checked&&!wasRecruited){
          setTimeout(function(){alert('\u2713 '+rn+' a \u00e9t\u00e9 ajout\u00e9(e) \u00e0 l\'\u00e9quipe.\nRetrouvez le profil dans l\'onglet \u00c9quipe pour compl\u00e9ter les informations (SCR, missions...).');},100);
        }
      }
      else if(a==='recback'){S.recSel=null;S.recAddMeet=false;S.recAddCgi=false;S.recAddCv=false;S.recEditMeetId=null;S.recEditCgiId=null;render();}
      else if(a==='recmtoggle'){S.recAddMeet=true;S.recEditMeetId=null;render();}
      else if(a==='recmcancel'){S.recAddMeet=false;S.recEditMeetId=null;render();}
      else if(a==='recmedit'){S.recEditMeetId=fb;S.recAddMeet=false;render();}
      else if(a==='recmsave'){
        var mtCli=gv('mtcli'),mtCon=gv('mtcon'),mtDate=gv('mtdate')||fD(new Date()),mtTxt=gv('mttext');
        var mtFileEl=document.getElementById('mtfile');
        var mtFile=(mtFileEl&&mtFileEl.files&&mtFileEl.files[0])?mtFileEl.files[0]:null;
        if(!mtCli&&!mtCon&&!mtTxt&&!mtFile){alert('Renseignez au moins le client, l\u2019opérationnel, un compte rendu ou un fichier.');return;}
        var cdM=S.cands.find(function(c){return c.id===id;});
        if(!cdM)return;
        if(fb){
          /* édition d'une rencontre existante */
          var existing=(cdM.feedbacks||[]).find(function(f){return f.id===fb;});
          if(!existing)return;
          existing.client=mtCli;existing.contact=mtCon;existing.date=mtDate;existing.text=mtTxt||'';
          if(mtFile){
            try{
              var epath=await uploadCandFile(mtFile,id,fb);
              existing.filePath=epath;existing.fileName=mtFile.name;
            }catch(upErr){alert('\u26a0 '+upErr.message);return;}
          }
          cdM.feedbacks=(cdM.feedbacks||[]).map(function(f){return f.id===fb?existing:f;});
          S.recEditMeetId=null;
        }else{
          /* nouvelle rencontre */
          var mtId=uid();
          var entry={id:mtId,date:mtDate,client:mtCli,contact:mtCon,author:S._userEmail||'',text:mtTxt||''};
          if(mtFile){
            try{
              var mpath=await uploadCandFile(mtFile,id,mtId);
              entry.filePath=mpath;entry.fileName=mtFile.name;
            }catch(upErr){alert('\u26a0 '+upErr.message);return;}
          }
          cdM.feedbacks=(cdM.feedbacks||[]).concat([entry]);
          S.recAddMeet=false;
        }
        S.cands=S.cands.map(function(c){return c.id===id?cdM:c;});
        sbUpsertCand(cdM).catch(function(err){console.warn('sbUpsertCand meet:',err);alert('\u26a0 Erreur de synchronisation : '+err.message);});
        render();
      }
      else if(a==='recmdel'){
        if(!confirm('Supprimer cette rencontre client ?'))return;
        var cdMd=S.cands.find(function(c){return c.id===id;});
        if(!cdMd)return;
        cdMd.feedbacks=(cdMd.feedbacks||[]).filter(function(f){return f.id!==fb;});
        S.cands=S.cands.map(function(c){return c.id===id?cdMd:c;});
        if(S.recEditMeetId===fb)S.recEditMeetId=null;
        sbUpsertCand(cdMd).catch(function(err){console.warn('sbUpsertCand meetdel:',err);});
        render();
      }
      else if(a==='recmdl'){
        var cdMv=S.cands.find(function(c){return c.id===id;});
        if(!cdMv)return;
        if(fb==='__cr'){
          if(cdMv.compteRenduFilePath)downloadCandFile(cdMv.compteRenduFilePath,cdMv.compteRenduFileName);
          return;
        }
        var mtEntry=(cdMv.feedbacks||[]).find(function(f){return f.id===fb;});
        if(mtEntry&&mtEntry.filePath)downloadCandFile(mtEntry.filePath,mtEntry.fileName);
      }
      else if(a==='recgtoggle'){S.recAddCgi=true;S.recEditCgiId=null;render();}
      else if(a==='recgcancel'){S.recAddCgi=false;S.recEditCgiId=null;render();}
      else if(a==='recgedit'){S.recEditCgiId=fb;S.recAddCgi=false;render();}
      else if(a==='recgsave'){
        var cgPerson=gv('cgperson'),cgDate=gv('cgdate')||fD(new Date()),cgTxt=gv('cgtext');
        var cgFileEl=document.getElementById('cgfile');
        var cgFile=(cgFileEl&&cgFileEl.files&&cgFileEl.files[0])?cgFileEl.files[0]:null;
        if(!cgPerson&&!cgTxt&&!cgFile){alert('Renseignez au moins la personne rencontrée, un compte rendu ou un fichier.');return;}
        var cdG=S.cands.find(function(c){return c.id===id;});
        if(!cdG)return;
        if(fb){
          /* édition d'une rencontre CGI existante */
          var existingG=(cdG.cgiMeetings||[]).find(function(f){return f.id===fb;});
          if(!existingG)return;
          existingG.person=cgPerson;existingG.date=cgDate;existingG.text=cgTxt||'';
          if(cgFile){
            try{
              var gepath=await uploadCandFile(cgFile,id,fb);
              existingG.filePath=gepath;existingG.fileName=cgFile.name;
            }catch(upErr){alert('\u26a0 '+upErr.message);return;}
          }
          cdG.cgiMeetings=(cdG.cgiMeetings||[]).map(function(f){return f.id===fb?existingG:f;});
          S.recEditCgiId=null;
        }else{
          var cgId=uid();
          var gentry={id:cgId,date:cgDate,person:cgPerson,author:S._userEmail||'',text:cgTxt||''};
          if(cgFile){
            try{
              var gpath=await uploadCandFile(cgFile,id,cgId);
              gentry.filePath=gpath;gentry.fileName=cgFile.name;
            }catch(upErr){alert('\u26a0 '+upErr.message);return;}
          }
          cdG.cgiMeetings=(cdG.cgiMeetings||[]).concat([gentry]);
          S.recAddCgi=false;
        }
        S.cands=S.cands.map(function(c){return c.id===id?cdG:c;});
        sbUpsertCand(cdG).catch(function(err){console.warn('sbUpsertCand cgi:',err);alert('\u26a0 Erreur de synchronisation : '+err.message);});
        render();
      }
      else if(a==='recgdel'){
        if(!confirm('Supprimer cette rencontre CGI ?'))return;
        var cdGd=S.cands.find(function(c){return c.id===id;});
        if(!cdGd)return;
        cdGd.cgiMeetings=(cdGd.cgiMeetings||[]).filter(function(f){return f.id!==fb;});
        S.cands=S.cands.map(function(c){return c.id===id?cdGd:c;});
        if(S.recEditCgiId===fb)S.recEditCgiId=null;
        sbUpsertCand(cdGd).catch(function(err){console.warn('sbUpsertCand cgidel:',err);});
        render();
      }
      else if(a==='recgdl'){
        var cdGv=S.cands.find(function(c){return c.id===id;});
        if(!cdGv)return;
        var gEntry=(cdGv.cgiMeetings||[]).find(function(f){return f.id===fb;});
        if(gEntry&&gEntry.filePath)downloadCandFile(gEntry.filePath,gEntry.fileName);
      }
      else if(a==='reccvtoggle'){S.recAddCv=true;render();}
      else if(a==='reccvcancel'){S.recAddCv=false;render();}
      else if(a==='reccvadd'){
        var cvFileEl2=document.getElementById('cvfile');
        var cvFiles2=(cvFileEl2&&cvFileEl2.files)?Array.from(cvFileEl2.files):[];
        if(!cvFiles2.length){alert('S\u00e9lectionnez au moins un fichier.');return;}
        var cdCv=S.cands.find(function(c){return c.id===id;});
        if(!cdCv)return;
        var newCvs=(cdCv.cvFiles||[]).slice();
        for(var cvj=0;cvj<cvFiles2.length;cvj++){
          try{
            var cvId2=uid();
            var cvPath2=await uploadCandFile(cvFiles2[cvj],id,'cv_'+cvId2);
            newCvs.push({id:cvId2,fileName:cvFiles2[cvj].name,filePath:cvPath2});
          }catch(upErr){alert('\u26a0 Erreur upload CV ('+cvFiles2[cvj].name+') : '+upErr.message);return;}
        }
        cdCv.cvFiles=newCvs;
        S.cands=S.cands.map(function(c){return c.id===id?cdCv:c;});
        S.recAddCv=false;
        sbUpsertCand(cdCv).catch(function(err){console.warn('sbUpsertCand cv:',err);alert('\u26a0 Erreur de synchronisation : '+err.message);});
        render();
      }
      else if(a==='reccvdel'){
        if(!confirm('Supprimer ce CV ?'))return;
        var cdCvD=S.cands.find(function(c){return c.id===id;});
        if(!cdCvD)return;
        cdCvD.cvFiles=(cdCvD.cvFiles||[]).filter(function(f){return f.id!==fb;});
        S.cands=S.cands.map(function(c){return c.id===id?cdCvD:c;});
        sbUpsertCand(cdCvD).catch(function(err){console.warn('sbUpsertCand cvdel:',err);});
        render();
      }
      else if(a==='reccvdl'){
        var cdCvV=S.cands.find(function(c){return c.id===id;});
        if(!cdCvV)return;
        var cvEntry=(cdCvV.cvFiles||[]).find(function(f){return f.id===fb;});
        if(cvEntry&&cvEntry.filePath)downloadCandFile(cvEntry.filePath,cvEntry.fileName);
      }
      /* inviter / supprimer un directeur */
      else if(a==='inv-add'){
        var iem=gv('inv-email'),inm=gv('inv-name');
        if(!iem||!inm){alert('Email et nom du directeur requis.');return;}
        sbInvite(iem,inm).then(function(r){
          if(r&&r.error){alert('Erreur : '+(r.error.message||r.error));return;}
          loadInvites().then(render);
        });
      }
      else if(a==='inv-del'){
        if(confirm('Supprimer ce directeur / cette invitation ?')){sbDelInvite(id).then(function(){loadInvites().then(render);});}
      }
      else if(a==='admin-cons-add'){
        var aEmail=gv('admin-cons-email'),aName=gv('admin-cons-name');
        if(!aEmail||!aName){alert('Email et nom du consultant requis.');return;}
        sbInviteCons(aEmail,aName).then(function(r){
          if(r&&r.error){alert('Erreur\u00a0: '+(r.error.message||r.error));return;}
          loadConsInvites().then(render);
        });
      }
      else if(a==='admin-cons-del'){
        if(confirm('Supprimer cette invitation ?')){
          sbDelConsInvite(id).then(function(){loadConsInvites().then(render);});
        }
      }
      /* activité jour par jour */
      else if(a==='day'){S.modal={type:'dayexc',day:b.getAttribute('data-day'),cid:S.actCid};render();}
      else if(a==='day-set'){
        var dt=gv('dexc-type'),dd=S.modal.day,dcid=S.modal.cid;
        if(S.role==='consultant'){
          submitApproval('leave_add',{id:uid(),cid:dcid,type:dt,s:dd,e:dd},
            'Ajout d\u2019absence \u2014 '+esc(dt)+' le '+fDt(dd));
        }else{
          var nl={id:uid(),cid:dcid,type:dt,s:dd,e:dd};
          S.lvs=S.lvs.concat([nl]);sbUpsertLeave(nl);S.modal=null;render();
        }
      }
      else if(a==='day-clear'){
        if(S.role==='consultant'){
          var lvClr=S.lvs.find(function(l){return l.id===id;});
          submitApproval('leave_del',{id:id},'Suppression d\u2019absence'+(lvClr?' \u2014 '+esc(lvClr.type)+' le '+fDt(lvClr.s):''));
        }else{
          S.lvs=S.lvs.filter(function(l){return l.id!==id;});sbDel('leaves',id);S.modal=null;render();
        }
      }
      else if(a==='act-prev'){S.actMonth=shiftMonth(S.actMonth||TODAY.slice(0,7),-1);render();}
      else if(a==='act-next'){S.actMonth=shiftMonth(S.actMonth||TODAY.slice(0,7),1);render();}
      else if(a==='act-today'){S.actMonth=TODAY.slice(0,7);render();}
    };
  })(bs[j]);}
  /* overlay */
  var ov=el('mov');if(ov)ov.onclick=function(e){if(e.target===ov){S.modal=null;render();}};
  /* mission : afficher/masquer le bloc forfait selon le type choisi */
  var mbtEls=document.querySelectorAll('input[name="mbt"]');
  for(var mb=0;mb<mbtEls.length;mb++){mbtEls[mb].onchange=function(){
    var ft=document.getElementById('ft-fields');
    var sel=document.querySelector('input[name="mbt"]:checked');
    if(ft)ft.style.display=(sel&&sel.value==='forfait')?'block':'none';
  };}
  /* import file input */
  var impFile=el('imp-file');
  if(impFile)impFile.onchange=function(){importJSON(this.files[0]);this.value='';};
  /* logout & sync */
  /* Imputations + Missions : file inputs */
  var missImpFi=el('miss-imp-fi');
  if(missImpFi)missImpFi.onchange=function(){if(this.files[0])handleMissImpFile(this.files[0]);this.value='';};
  var missImpDz=el('miss-imp-dz');
  if(missImpDz){
    missImpDz.addEventListener('dragover',function(e){e.preventDefault();missImpDz.style.borderColor='#2563eb';});
    missImpDz.addEventListener('dragleave',function(){missImpDz.style.borderColor='#e2e8f0';});
    missImpDz.addEventListener('drop',function(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f)handleMissImpFile(f);});
    missImpDz.addEventListener('click',function(e){if(e.target.tagName!=='LABEL'&&e.target.tagName!=='INPUT'){var fi2=el('miss-imp-fi');if(fi2)fi2.click();}});
  }
  if(impFile)impFile.onchange=function(){if(this.files[0])handleImpFile(this.files[0]);this.value='';};
  var impDz=el('imp-dz');
  if(impDz){
    impDz.addEventListener('dragover',function(e){e.preventDefault();impDz.style.borderColor='#2563eb';impDz.style.background='#eff6ff';});
    impDz.addEventListener('dragleave',function(){impDz.style.borderColor='#e2e8f0';impDz.style.background='#fff';});
    impDz.addEventListener('drop',function(e){
      e.preventDefault();impDz.style.borderColor='#e2e8f0';impDz.style.background='#fff';
      var f=e.dataTransfer.files[0];if(f)handleImpFile(f);
    });
    impDz.addEventListener('click',function(e){if(e.target.tagName!=='LABEL'&&e.target.tagName!=='INPUT'){var fi=el('imp-fi');if(fi)fi.click();}});
  }
  var logoutBtn=el('sb-logout');
  if(document.querySelector('[data-act="logout"]')){
    document.querySelector('[data-act="logout"]').onclick=function(){
      if(sb){sb.auth.signOut().then(function(){window.location.href='/esn_login.html';});}
      else{window.location.href='/esn_login.html';}
    };
  }
  /* sync */
  if(document.querySelector('[data-act="sync"]')){
    document.querySelector('[data-act="sync"]').onclick=function(){syncToSB();};
  }
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   PERSISTENCE - localStorage auto + JSON export / import
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
var SKEY='esn_cgi_v1';

function saveLocal(){
  try{localStorage.setItem(SKEY,JSON.stringify({cons:S.cons,miss:S.miss,lvs:S.lvs,cands:S.cands}));}
  catch(e){console.warn('localStorage indisponible',e);}
}

function loadLocal(){
  try{
    var raw=localStorage.getItem(SKEY);
    if(!raw)return false;
    var d=JSON.parse(raw);
    if(d&&d.cons&&d.cons.length){S.cons=d.cons;S.miss=d.miss||[];S.lvs=d.lvs||[];S.cands=d.cands||[];return true;}
  }catch(e){}
  return false;
}

function exportJSON(){
  var d={version:1,exported:new Date().toISOString().slice(0,10),cons:S.cons,miss:S.miss,lvs:S.lvs};
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='esn_manager_'+d.exported+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importJSON(file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(d&&d.cons&&d.miss){
        if(!confirm('Importer '+d.cons.length+' consultants et '+d.miss.length+' missions ?\n(Les données actuelles seront remplacées)'))return;
        S.cons=d.cons;S.miss=d.miss;S.lvs=d.lvs||[];
        saveLocal();render();
        alert('\u2705 Import r\u00e9ussi - '+d.cons.length+' consultants, '+d.miss.length+' missions'+(d.exported?' (sauvegarde du '+d.exported+')':'')+'.');
      }else{alert('\u274c Fichier invalide : structure non reconnue.');}
    }catch(err){alert('\u274c Erreur de lecture : '+err.message);}
  };
  r.readAsText(file);
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550

async function loadSB(){
  if(!sb||!SB_CID)return false;
  try{
    /* un directeur ne charge que les consultants de son équipe (puis leurs missions/absences) */
    var cq=sb.from('consultants').select('*').eq('company_id',SB_CID).order('name');
    if(S.role==='directeur')cq=cq.eq('directeur',S.dirName);
    var cr=await cq;
    var cons=(cr.data||[]).map(mapC);
    var mq=sb.from('missions').select('*').eq('company_id',SB_CID);
    var lq=sb.from('leaves').select('*').eq('company_id',SB_CID);
    /* Recrutement : TOUJOURS visible pour toute l'entreprise, quel que soit le rôle
       ou le directeur connecté \u2014 jamais filtré par équipe */
    var rq=sb.from('candidates').select('*').eq('company_id',SB_CID).order('created_at',{ascending:false});
    /* P&L Budget (Pilotage financier) : company-wide \u00e9galement */
    var pq=sb.from('pnl_budget').select('*').eq('company_id',SB_CID);
    if(S.role==='directeur'){
      var ids=cons.map(function(c){return c.id;});
      if(!ids.length){S.cons=[];S.miss=[];S.lvs=[];return false;}
      mq=mq.in('consultant_id',ids);lq=lq.in('consultant_id',ids);
    }
    var res=await Promise.all([mq,lq,rq]);
    S.cons=cons;
    if(res[0].data)S.miss=res[0].data.map(mapM);
    if(res[1].data)S.lvs=res[1].data.map(mapL);
    if(res[2].data)S.cands=res[2].data.map(mapCand);
    return S.cons.length>0;
  }catch(e){console.warn('Supabase load error:',e);return false;}
}

async function syncToSB(){

  if(!SB_CID){alert('Session expirée - rechargez la page et reconnectez-vous via esn_login.html');return;}
  var btn=document.querySelector('[data-act="sync"]');
  if(btn){btn.textContent='Sync en cours...';btn.disabled=true;}
  try{
    for(var i=0;i<S.cons.length;i++) await sbUpsertCons(S.cons[i]);
    for(var i=0;i<S.miss.length;i++) await sbUpsertMiss(S.miss[i]);
    for(var i=0;i<S.lvs.length;i++) await sbUpsertLeave(S.lvs[i]);

    S.sbSt='Supabase connecte - '+S.cons.length+' consultants';

async function initApp(){
  /* ── Mode démo : ?demo=true dans l'URL → données fictives, pas de Supabase ── */
  if(new URLSearchParams(window.location.search).get('demo')==='true'){
    loadDemoData();
    render();
    return;
  }
  if(sb){
    try{
      /* ── 1. V\u00e9rifier la session (avec retry si timing issue) ── */
      var sess=await sb.auth.getSession();

      /* Si pas de session au 1er essai, attendre 1s et r\u00e9essayer
         (le token peut mettre un instant \u00e0 \u00eatre \u00e9crit dans localStorage apr\u00e8s redirect) */
      if(!sess.data||!sess.data.session){
        await new Promise(function(r){setTimeout(r,1000);});
        sess=await sb.auth.getSession();
      }

      if(!sess.data||!sess.data.session){
        window.location.href='/esn_login.html';return;
      }

      /* ── 2. R\u00e9cup\u00e9rer company_id + r\u00f4le ── */
      var uid2=sess.data.session.user.id;
      S._userEmail=sess.data.session.user.email||'';
      var pr=await sb.from('profiles').select('*').eq('id',uid2).single();
      if(pr.data&&pr.data.company_id){
        SB_CID=pr.data.company_id;
        S.role=(pr.data.role==='directeur')?'directeur':(pr.data.role==='consultant'?'consultant':'gestionnaire');
        S.dirName=pr.data.directeur_name||'';
        S.consId=pr.data.cons_id||null;
        if(S.role==='consultant'&&S.consId)S.tab='activite';
      }else if(pr.data&&pr.data.role==='consultant'){
        /* Consultant : company_id null dans profiles → résoudre via consultant_invites */
        try{
          var ci=await sb.from('consultant_invites').select('*').eq('email',S._userEmail).maybeSingle();
          if(ci&&ci.data&&ci.data.company_id){
            SB_CID=ci.data.company_id;
            S.role='consultant';
            S.dirName=ci.data.dir_name||pr.data.directeur_name||'';
            S.consId=ci.data.cons_id||pr.data.cons_id||null;
            sb.from('profiles').update({company_id:ci.data.company_id,directeur_name:S.dirName,cons_id:S.consId}).eq('id',uid2).catch(function(e){console.warn('profile patch:',e);});
            if(S.consId)S.tab='activite';
          }
        }catch(e){console.warn('ci lookup:',e);}
      }else{
        /* Fallback : chercher company_id directement dans companies */
        var cq=await sb.from('companies').select('id').eq('owner_id',uid2).single();
        if(cq.data)SB_CID=cq.data.id;
      }

      /* ── 3. Charger les donn\u00e9es depuis Supabase ── */
      var ok=await loadSB();
      if(!ok){
        loadLocal();
        if(S.cons.length>0){
          S.sbSync=true;
          S.sbSt='Donn\u00e9es locales - cliquez Sync pour envoyer vers Supabase';
        }
      }else{
        S.sbSt='Supabase connect\u00e9';
        /* Fusionner le localStorage : r\u00e9cup\u00e9rer les entr\u00e9es locales non encore sync\u00e9es */
        try{
          var _raw=localStorage.getItem(SKEY);
          if(_raw){
            var _d=JSON.parse(_raw);
            if(_d){
              var _sbMids=new Set(S.miss.map(function(m){return m.id;}));
              var _localMiss=(_d.miss||[]).filter(function(m){return !_sbMids.has(m.id);});
              if(_localMiss.length){
                S.miss=S.miss.concat(_localMiss);
                _localMiss.forEach(function(m){sbUpsertMiss(m).catch(function(e){console.warn('merge-sync miss:',e);});});
              }
              var _sbCids=new Set(S.cons.map(function(c){return c.id;}));
              var _localCons=(_d.cons||[]).filter(function(c){return !_sbCids.has(c.id);});
              if(_localCons.length){
                S.cons=S.cons.concat(_localCons);
                _localCons.forEach(function(c){sbUpsertCons(c).catch(function(e){console.warn('merge-sync cons:',e);});});
              }
              var _sbLids=new Set(S.lvs.map(function(l){return l.id;}));
              var _localLvs=(_d.lvs||[]).filter(function(l){return !_sbLids.has(l.id);});
              if(_localLvs.length){
                S.lvs=S.lvs.concat(_localLvs);
                _localLvs.forEach(function(l){sbUpsertLeave(l).catch(function(e){console.warn('merge-sync lv:',e);});});
              }
              var _sbCandIds=new Set(S.cands.map(function(c){return c.id;}));
              var _localCands=(_d.cands||[]).filter(function(c){return !_sbCandIds.has(c.id);});
              if(_localCands.length){
                S.cands=S.cands.concat(_localCands);
                _localCands.forEach(function(c){sbUpsertCand(c).catch(function(e){console.warn('merge-sync cand:',e);});});
              }
            }
          }
        }catch(_e){console.warn('localStorage merge:',_e);}
      }

      await loadInvites();
      await loadConsInvites();
      await loadApprovals();

      /* ── 4. Listener pour d\u00e9connexion / expiration de token ── */
      sb.auth.onAuthStateChange(function(event){
        if(event==='SIGNED_OUT'){window.location.href='/esn_login.html';}
      });

    }catch(err){
      console.error('initApp error:',err);
      /* En cas d\u2019erreur inattendue, charger en mode local plut\u00f4t que boucler */
      loadLocal();
    }
  }else{
    /* Supabase non configur\u00e9 - mode local */
    loadLocal();
  }
  render();
  /* Teams sync désactivé - intégration Azure Portal abandonnée */
}
/* FY helper : 'FY26' pour toute date Oct2025-Sep2026 */
function dateToFY(dateStr){
  if(!dateStr||dateStr.length<7)return null;
  var yr=parseInt(dateStr.substring(0,4));
  var mo=parseInt(dateStr.substring(5,7));
  return 'FY'+(mo>=10?yr+1:yr).toString().substring(2);
}
function fyLabelToYear(lbl){
  /* 'FY26' -> 2026 */
  return parseInt('20'+lbl.substring(2));
}

function applyMissImp(){
  var mi=S.missImp;if(!mi)return;
  var cm={};
  ['cons','name','pcode','cli','tjm','sd','ed','btype','deal','wdays','loc','mgr','ccn','ccr'].forEach(function(f){
    var el=document.getElementById('mim-'+f);
    if(el&&el.value!=='')cm[f]=parseInt(el.value);
  });
  if(cm.cons===undefined){alert('Colonne Consultant obligatoire.');return;}
  if(cm.name===undefined){alert('Colonne Nom de mission obligatoire.');return;}
  if(cm.sd===undefined){alert('Colonne Date d\u00e9but obligatoire.');return;}

  function fmtDate(v){
    if(!v)return null;
    if(v instanceof Date)return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
    var s=String(v).trim();
    var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    return s||null;
  }
  function norm(n){return String(n||'').toLowerCase().trim();}

  /* Parser les jours travaill\u00e9s
   * Entr\u00e9e : 5, 4, 3, 2, 1  ou  "L,M,Me,J,V"  ou  "Lun,Mar,..."
   * Sortie : tableau d\u2019entiers 1=Lun...5=Ven (0=Dim exclu par d\u00e9faut)
   */
  function parseWdays(v){
    if(!v&&v!==0)return [1,2,3,4,5];
    var s=String(v).trim().toLowerCase();
    var n=parseInt(s);
    if(!isNaN(n)&&n>=1&&n<=7)return [1,2,3,4,5].slice(0,n);
    var dayMap={l:1,lu:1,lun:1,lundi:1,m:2,ma:2,mar:2,mardi:2,me:3,mer:3,merc:3,mercredi:3,j:4,je:4,jeu:4,jeudi:4,v:5,ve:5,ven:5,vendredi:5,s:6,sa:6,sam:6,samedi:6};
    var parts=s.split(/[,;\s]+/).map(function(p){return p.trim();}).filter(Boolean);
    var res=[];
    parts.forEach(function(p){var d=dayMap[p];if(d&&res.indexOf(d)<0)res.push(d);});
    return res.length?res.sort():[1,2,3,4,5];
  }

  var created=0,skipped=[];
  mi.raw.forEach(function(row){
    var consName=String(row[cm.cons]||'').trim();
    var missName=String(row[cm.name]||'').trim();
    if(!consName||!missName)return;

    var consNorm=norm(consName);
    var found=S.cons.find(function(c){
      var cn=norm(c.name);var cp=cn.split(' ');var kp=consNorm.split(' ');
      var score=0;cp.forEach(function(p){if(p.length>2&&kp.indexOf(p)>=0)score++;});
      return score>=1||cn===consNorm;
    });
    if(!found){skipped.push(consName+' (consultant non trouv\u00e9)');return;}

    var sd=fmtDate(cm.sd!==undefined?row[cm.sd]:null);
    if(!sd){skipped.push(missName+' (date d\u00e9but manquante)');return;}

    /* Type facturation */
    var btypeRaw=cm.btype!==undefined?String(row[cm.btype]||'').toLowerCase().trim():'';
    var btype=btypeRaw.includes('forfait')?'forfait':'at';

    /* TJM */
    var tjm=cm.tjm!==undefined?parseFloat(String(row[cm.tjm]||'0').replace(',','.'))||0:0;

    /* Budget forfait */
    var deal=cm.deal!==undefined?parseFloat(String(row[cm.deal]||'').replace(',','.'))||null:null;

    /* Jours travaill\u00e9s */
    var wdaysRaw=cm.wdays!==undefined?row[cm.wdays]:5;
    var wdays=parseWdays(wdaysRaw);

    if(btype==='forfait'&&!deal){skipped.push(missName+' (forfait sans budget)');return;}
    if(btype==='at'&&tjm===0){skipped.push(missName+' (AT sans TJM)');return;}

    var pcode2=cm.pcode!==undefined?String(row[cm.pcode]||'').trim():'';

    /* D\u00e9doublon : ignorer si une mission identique existe d\u00e9j\u00e0
     * Crit\u00e8res :
     *   1. M\u00eame code projet (pcode) non vide
     *   2. M\u00eame consultant + m\u00eame nom de mission + m\u00eame date de d\u00e9but
     */
    var isDuplicate=S.miss.some(function(m){
      if(pcode2&&m.pcode&&m.pcode.trim().toLowerCase()===pcode2.toLowerCase())return true;
      return m.cid===found.id&&norm(m.name)===norm(missName)&&m.sd===sd;
    });
    if(isDuplicate){skipped.push(missName+' (d\u00e9j\u00e0 existante)');return;}

    var m2={
      id:uid(),cid:found.id,
      name:missName,
      pcode:cm.pcode!==undefined?String(row[cm.pcode]||'').trim():'',
      cli:cm.cli!==undefined?String(row[cm.cli]||'').trim():'',
      tjm:tjm,
      sd:sd,
      ed:fmtDate(cm.ed!==undefined?row[cm.ed]:null),
      btype:btype,
      deal:deal,
      tmar:null,
      wdays:wdays,
      loc:cm.loc!==undefined?String(row[cm.loc]||'').trim():'',
      mgr:cm.mgr!==undefined?String(row[cm.mgr]||'').trim():'',
      ccn:cm.ccn!==undefined?String(row[cm.ccn]||'').trim():'',
      ccr:cm.ccr!==undefined?String(row[cm.ccr]||'').trim():''
    };
    S.miss.push(m2);
    created++;
  });

  S.missImp=null;
  saveLocal();  /* sauvegarde locale imm\u00e9diate */
  var msg=created+' mission(s) ajout\u00e9e(s)';
  if(skipped.length)msg+='. Ignor\u00e9(s) :\n'+skipped.join('\n');

  /* Diagnostic */

  if(!sb){alert(msg+'\nLocalStorage uniquement (Supabase non configuré).');render();return;}
  if(!SB_CID){
    alert(msg+'\n\n⚠ SB_CID manquant (profil Supabase non chargé).\nLes missions sont sauvegardées localement.\nDéconnectez-vous et reconnectez-vous, puis cliquez "Synchroniser".');
    render();return;
  }

  var newMissions=S.miss.slice(-created);
  Promise.all(newMissions.map(function(m2){
    return sbUpsertMiss(m2);
  }))
  .then(function(){
    alert(msg+' - synchronisées dans Supabase ✓');
  })
  .catch(function(err){
    console.error('[import] Sync KO:', err);
    alert(msg+'\n\n⚠ Erreur Supabase : '+err.message+'\nCliquez "Synchroniser" dans la barre latérale pour réessayer.');
  });
  render();
}
