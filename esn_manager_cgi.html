        +'<div class="fd"><label class="fl">Motif</label><select class="ic" id="dexc-type">'+lo+'</select><p class="fh">« Mission interne » / « Inter-contrat » = non facturé au client</p></div>'
        +'<div class="br"><button class="bg" data-act="mc">Annuler</button><button class="bp" data-act="day-set">Marquer non travaillé</button></div>';
    }
  }
  return '<div class="mov" id="mov"><div class="mbox '+(wide?'mw':'mn')+'">'
    +'<div class="mhd"><h3>'+esc(title)+'</h3><button class="mcl" data-act="mc">&times;</button></div>'
    +'<div class="mbd">'+body+'</div></div></div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RENDER
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function render(){
  saveLocal(); /* \u2190 sauvegarde automatique à chaque changement */
  /* ═══ filtrage par rôle / directeur : on bascule sur la vue filtrée le temps du rendu ═══ */
  S._all={cons:S.cons,miss:S.miss,lvs:S.lvs};
  var _vis=visibleData();S.cons=_vis.cons;S.miss=_vis.miss;S.lvs=_vis.lvs;
  document.getElementById('sb').innerHTML=tSB();
  var v=S.tab==='dashboard'?tDash():S.tab==='teams'?tTeams():S.tab==='missions'?tMiss():S.tab==='planning'?tPlan():S.tab==='kpis'?tKPIs():S.tab==='leaves'?tLeaves():S.tab==='imputations'?tImpute():S.tab==='activite'?tActivite():S.tab==='directeurs'?tDirecteurs():tParam();
  document.getElementById('mc').innerHTML='<div class="inn">'+v+'</div>';
  document.getElementById('md').innerHTML=tModal();
  /* on restaure les données maîtres (les handlers de bind() mutent l'ensemble complet) */
  S.cons=S._all.cons;S.miss=S._all.miss;S.lvs=S._all.lvs;
  bind();
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   EVENT BINDING
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function bind(){
  var el=function(id){return document.getElementById(id);};
  var yr=el('yrs');if(yr)yr.onchange=function(){S.year=+this.value;H=fyHols(S.year);S.precs={};render();};
  /* nav */
  var nbs=document.querySelectorAll('[data-nav]');
  for(var i=0;i<nbs.length;i++){(function(b){b.onclick=function(){S.tab=b.getAttribute('data-nav');render();};})(nbs[i]);}
  /* filters */
  var fc=el('fmc');if(fc)fc.onchange=function(){S.fmc=this.value;render();};
  var fs=el('fms');if(fs)fs.onchange=function(){S.fms=this.value;render();};
  var ftf=el('fmt');if(ftf)ftf.onchange=function(){S.fmt=this.value;render();};
  var acc=el('act-cid');if(acc)acc.onchange=function(){S.actCid=this.value;render();};
  var lc=el('flc');if(lc)lc.onchange=function(){S.flc=this.value;render();};
  /* filtre directeur (gestionnaire) */
  var rcb=document.querySelectorAll('[data-dir]');
  for(var rk=0;rk<rcb.length;rk++){(function(cb){cb.onchange=function(){
    var r=cb.getAttribute('data-dir');
    if(!S.fdir)S.fdir=[];
    if(cb.checked){if(S.fdir.indexOf(r)<0)S.fdir.push(r);}
    else{S.fdir=S.fdir.filter(function(x){return x!==r;});}
    render();
  };})(rcb[rk]);}
  var rclr=document.querySelector('[data-dir-clear]');
  if(rclr)rclr.onclick=function(){S.fdir=[];render();};
  /* all data-act */
  var bs=document.querySelectorAll('[data-act]');
  for(var j=0;j<bs.length;j++){(function(b){
    var a=b.getAttribute('data-act'),id=b.getAttribute('data-id');
    b.onclick=function(e){
      e.stopPropagation();
      if(a==='export'){exportJSON();return;}
      else if(a==='gen-ca'){genRecs('ca');}
      else if(a==='gen-util'){genRecs('util');}
      else if(a==='gen-tjm'){genRecs('tjm');}
      else if(a==='ac'){S.modal={type:'consultant',item:null};render();}
      else if(a==='am'){S.modal={type:'mission',item:null};render();}
      else if(a==='al'){S.modal={type:'leave',item:null};render();}
      else if(a==='mc'){S.modal=null;render();}
      else if(a==='ec'){S.modal={type:'consultant',item:S.cons.find(function(c){return c.id===id;})};render();}
      else if(a==='em'){S.modal={type:'mission',item:S.miss.find(function(m){return m.id===id;})};render();}
      else if(a==='el'){S.modal={type:'leave',item:S.lvs.find(function(l){return l.id===id;})};render();}
      else if(a==='dc'){var c=S.cons.find(function(c){return c.id===id;});if(c&&confirm('Supprimer '+c.name+' ?')){S.cons=S.cons.filter(function(c){return c.id!==id;});sbDel('consultants',id);render();}}
      else if(a==='dm'){if(confirm('Supprimer cette mission ?')){S.miss=S.miss.filter(function(m){return m.id!==id;});sbDel('missions',id);render();}}
      else if(a==='dl'){if(confirm('Supprimer cette absence ?')){S.lvs=S.lvs.filter(function(l){return l.id!==id;});sbDel('leaves',id);render();}}
      else if(a==='sc'){
        var n=gv('mn'),t=gv('mti'),s=+gv('ms'),em=gv('me');
        var arr=gv('marr')||null,dep=gv('mdep')||null;
        var rdir=(S.role==='directeur')?S.dirName:gv('mdir'); /* un directeur ne crée que dans son équipe */
        if(!n||!t||!s){alert('Veuillez remplir les champs obligatoires (*).');return;}
        var it=S.modal.item;
        var nc;
        if(it){S.cons=S.cons.map(function(c){if(c.id===it.id){nc=Object.assign({},c,{name:n,title:t,scr:s,email:em,dir:rdir,arrive:arr,depart:dep});return nc;}return c;});}
        else{nc={id:uid(),name:n,title:t,scr:s,email:em,dir:rdir,arrive:arr,depart:dep};S.cons=S.cons.concat([nc]);}
        sbUpsertCons(nc);
        S.modal=null;render();
      }
      /* save mission */
      else if(a==='sm'){
        var cid=gv('mcid'),mn=gv('mmn'),cl=gv('mcl'),tj=+gv('mtj'),sd=gv('msd'),ed=gv('med')||null;
        var lo=gv('mlo'),mg=gv('mmg'),cc=gv('mcc'),cr=gv('mcr');
        var btEl=document.querySelector('input[name="mbt"]:checked');
        var bt=btEl?btEl.value:'at';
        var wdays=[];var wdEls=document.querySelectorAll('.mwd:checked');for(var wi=0;wi<wdEls.length;wi++)wdays.push(+wdEls[wi].value);
        var deal=+gv('mdeal')||0,tmar=(gv('mtmar')===''?null:+gv('mtmar'));
        if(!cid||!mn||!cl||!sd){alert('Veuillez remplir les champs obligatoires (*).');return;}
        if(bt==='forfait'){
          if(!deal||tmar==null){alert('Pour un forfait : indiquez le montant du deal (CA) et la marge recherchée.');return;}
        }else if(!tj){alert('Pour une mission en Assistance technique : indiquez le TJM.');return;}
        if(!wdays.length){alert('Sélectionnez au moins un jour travaillé.');return;}
        var pcode=gv('mpcd')||'';
        var d={cid:cid,name:mn,cli:cl,tjm:tj,sd:sd,ed:ed,loc:lo,mgr:mg,ccn:cc,ccr:cr,btype:bt,wdays:wdays,deal:deal,tmar:tmar,pcode:pcode};
        var it=S.modal.item;
        var nm;
        if(it){S.miss=S.miss.map(function(m){if(m.id===it.id){nm=Object.assign({},m,d);return nm;}return m;});}
        else{nm=Object.assign({id:uid()},d);S.miss=S.miss.concat([nm]);}
        sbUpsertMiss(nm);
        S.modal=null;render();
      }
      /* save leave */
      else if(a==='sl'){
        var lci=gv('mlc'),lt=gv('mlt'),ls=gv('mls'),le=gv('mle');
        if(!lci||!ls||!le){alert('Veuillez remplir les champs obligatoires (*).');return;}
        var it=S.modal.item;
        var nl;
        if(it){S.lvs=S.lvs.map(function(l){if(l.id===it.id){nl=Object.assign({},l,{cid:lci,type:lt,s:ls,e:le});return nl;}return l;});}
        else{nl={id:uid(),cid:lci,type:lt,s:ls,e:le};S.lvs=S.lvs.concat([nl]);}
        sbUpsertLeave(nl);
        S.modal=null;render();
      }
      /* inviter / supprimer un directeur */
      else if(a==='inv-add'){
        var iem=gv('inv-email'),inm=gv('inv-name');
        if(!iem||!inm){alert('Email et nom du directeur requis.');return;}
        sbInvite(iem,inm).then(function(r){
          if(r&&r.error){alert('Erreur : '+(r.error.message||r.error));return;}
          loadInvites().then(render);
        });
      }
      else if(a==='inv-del'){
        if(confirm('Supprimer ce directeur / cette invitation ?')){sbDelInvite(id).then(function(){loadInvites().then(render);});}
      }
      /* activité jour par jour */
      else if(a==='day'){S.modal={type:'dayexc',day:b.getAttribute('data-day'),cid:S.actCid};render();}
      else if(a==='day-set'){
        var dt=gv('dexc-type'),dd=S.modal.day,dcid=S.modal.cid;
        var nl={id:uid(),cid:dcid,type:dt,s:dd,e:dd};
        S.lvs=S.lvs.concat([nl]);sbUpsertLeave(nl);S.modal=null;render();
      }
      else if(a==='day-clear'){
        S.lvs=S.lvs.filter(function(l){return l.id!==id;});sbDel('leaves',id);S.modal=null;render();
      }
      else if(a==='act-prev'){S.actMonth=shiftMonth(S.actMonth||TODAY.slice(0,7),-1);render();}
      else if(a==='act-next'){S.actMonth=shiftMonth(S.actMonth||TODAY.slice(0,7),1);render();}
      else if(a==='act-today'){S.actMonth=TODAY.slice(0,7);render();}
    };
  })(bs[j]);}
  /* overlay */
  var ov=el('mov');if(ov)ov.onclick=function(e){if(e.target===ov){S.modal=null;render();}};
  /* mission : afficher/masquer le bloc forfait selon le type choisi */
  var mbtEls=document.querySelectorAll('input[name="mbt"]');
  for(var mb=0;mb<mbtEls.length;mb++){mbtEls[mb].onchange=function(){
    var ft=document.getElementById('ft-fields');
    var sel=document.querySelector('input[name="mbt"]:checked');
    if(ft)ft.style.display=(sel&&sel.value==='forfait')?'block':'none';
  };}
  /* import file input */
  var impFile=el('imp-file');
  if(impFile)impFile.onchange=function(){importJSON(this.files[0]);this.value='';};
  /* logout & sync */
  /* Imputations : file input + drag-and-drop */
  var impFi=el('imp-fi');
  if(impFi)impFi.onchange=function(){if(this.files[0])handleImpFile(this.files[0]);this.value='';};
  var impDz=el('imp-dz');
  if(impDz){
    impDz.addEventListener('dragover',function(e){e.preventDefault();impDz.style.borderColor='#2563eb';impDz.style.background='#eff6ff';});
    impDz.addEventListener('dragleave',function(){impDz.style.borderColor='#e2e8f0';impDz.style.background='#fff';});
    impDz.addEventListener('drop',function(e){
      e.preventDefault();impDz.style.borderColor='#e2e8f0';impDz.style.background='#fff';
      var f=e.dataTransfer.files[0];if(f)handleImpFile(f);
    });
    impDz.addEventListener('click',function(e){if(e.target.tagName!=='LABEL'&&e.target.tagName!=='INPUT'){var fi=el('imp-fi');if(fi)fi.click();}});
  }
  var logoutBtn=el('sb-logout');
  if(document.querySelector('[data-act="logout"]')){
    document.querySelector('[data-act="logout"]').onclick=function(){
      if(sb){sb.auth.signOut().then(function(){window.location.href='/esn_login.html';});}
      else{window.location.href='/esn_login.html';}
    };
  }
  /* sync */
  if(document.querySelector('[data-act="sync"]')){
    document.querySelector('[data-act="sync"]').onclick=function(){syncToSB();};
  }
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   PERSISTENCE - localStorage auto + JSON export / import
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
var SKEY='esn_cgi_v1';

function saveLocal(){
  try{localStorage.setItem(SKEY,JSON.stringify({cons:S.cons,miss:S.miss,lvs:S.lvs}));}
  catch(e){console.warn('localStorage indisponible',e);}
}

function loadLocal(){
  try{
    var raw=localStorage.getItem(SKEY);
    if(!raw)return false;
    var d=JSON.parse(raw);
    if(d&&d.cons&&d.cons.length){S.cons=d.cons;S.miss=d.miss||[];S.lvs=d.lvs||[];return true;}
  }catch(e){}
  return false;
}

function exportJSON(){
  var d={version:1,exported:new Date().toISOString().slice(0,10),cons:S.cons,miss:S.miss,lvs:S.lvs};
  var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;
  a.download='esn_manager_'+d.exported+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importJSON(file){
  if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(d&&d.cons&&d.miss){
        if(!confirm('Importer '+d.cons.length+' consultants et '+d.miss.length+' missions ?\n(Les données actuelles seront remplacées)'))return;
        S.cons=d.cons;S.miss=d.miss;S.lvs=d.lvs||[];
        saveLocal();render();
        alert('\u2705 Import r\u00e9ussi - '+d.cons.length+' consultants, '+d.miss.length+' missions'+(d.exported?' (sauvegarde du '+d.exported+')':'')+'.');
      }else{alert('\u274c Fichier invalide : structure non reconnue.');}
    }catch(err){alert('\u274c Erreur de lecture : '+err.message);}
  };
  r.readAsText(file);
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   SUPABASE - helpers (synchronisation non-bloquante)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function mapC(r){return{id:r.id,name:r.name,title:r.title||'',scr:r.scr||0,email:r.email||'',dir:r.directeur||'',arrive:r.arrive||null,depart:r.depart||null};}
function mapM(r){return{id:r.id,cid:r.consultant_id,name:r.name,cli:r.client_name||'',tjm:r.tjm||0,sd:r.start_date,ed:r.end_date||null,loc:r.location||'',mgr:r.manager_name||'',ccn:r.client_contact_name||'',ccr:r.client_contact_role||'',pcode:r.code_projet||'',btype:r.billing_type||'at',wdays:(Array.isArray(r.work_days)?r.work_days:(r.work_days?String(r.work_days).split(',').map(Number):[1,2,3,4,5])),deal:r.deal_amount||0,tmar:(r.target_margin!=null?r.target_margin:null)};}
function mapL(r){return{id:r.id,cid:r.consultant_id,type:r.type||'Congé payé',s:r.start_date,e:r.end_date};}

async function loadSB(){
  if(!sb||!SB_CID)return false;
  try{
    /* un directeur ne charge que les consultants de son équipe (puis leurs missions/absences) */
    var cq=sb.from('consultants').select('*').eq('company_id',SB_CID).order('name');
    if(S.role==='directeur')cq=cq.eq('directeur',S.dirName);
    var cr=await cq;
    var cons=(cr.data||[]).map(mapC);
    var mq=sb.from('missions').select('*').eq('company_id',SB_CID);
    var lq=sb.from('leaves').select('*').eq('company_id',SB_CID);
    if(S.role==='directeur'){
      var ids=cons.map(function(c){return c.id;});
      if(!ids.length){S.cons=[];S.miss=[];S.lvs=[];return false;}
      mq=mq.in('consultant_id',ids);lq=lq.in('consultant_id',ids);
    }
    var res=await Promise.all([mq,lq]);
    S.cons=cons;
    if(res[0].data)S.miss=res[0].data.map(mapM);
    if(res[1].data)S.lvs=res[1].data.map(mapL);
    return S.cons.length>0;
  }catch(e){console.warn('Supabase load error:',e);return false;}
}

async function sbUpsertCons(c){
  if(!sb||!SB_CID)return;
  var res=await sb.from('consultants').upsert({id:c.id,company_id:SB_CID,name:c.name,title:c.title,scr:c.scr,email:c.email,directeur:c.dir||null,arrive:c.arrive||null,depart:c.depart||null});
  if(res.error)throw new Error(c.name+': '+res.error.message);
}
async function sbUpsertMiss(m){
  if(!sb||!SB_CID)return;

async function syncToSB(){
  if(!sb){alert('Supabase non configuré.');return;}
  if(!SB_CID){alert('Session expirée - rechargez la page et reconnectez-vous via esn_login.html');return;}
  var btn=document.querySelector('[data-act="sync"]');
  if(btn){btn.textContent='Sync en cours...';btn.disabled=true;}
  try{
    for(var i=0;i<S.cons.length;i++) await sbUpsertCons(S.cons[i]);
    for(var i=0;i<S.miss.length;i++) await sbUpsertMiss(S.miss[i]);
    for(var i=0;i<S.lvs.length;i++) await sbUpsertLeave(S.lvs[i]);
    S.sbSync=false;
    S.sbSt='Supabase connecte - '+S.cons.length+' consultants';
    render();
  }catch(e){
    alert('Erreur sync : ' + e.message);
  }
  if(btn){btn.textContent='Synchroniser vers Supabase';btn.disabled=false;}
}

async function initApp(){
  if(sb){
    /* 1. Vérifier la session - redirect si non connecté */
    var sess=await sb.auth.getSession();
    if(!sess.data||!sess.data.session){
      window.location.href='/esn_login.html';return;
    }
    /* 2. Récupérer le company_id + le rôle (gestionnaire / directeur) */
    var uid2=sess.data.session.user.id;
    var pr=await sb.from('profiles').select('*').eq('id',uid2).single();
    if(pr.data){
      SB_CID=pr.data.company_id;
      S.role=(pr.data.role==='directeur')?'directeur':'gestionnaire';
      S.dirName=pr.data.directeur_name||'';
    }
    /* 3. Charger les données depuis Supabase */
    var ok=await loadSB();
    if(!ok){
      /* Supabase vide \u2192 utiliser localStorage et proposer de synchroniser */
      loadLocal();
      if(S.cons.length>0){
        S.sbSync=true;
        S.sbSt='Donnees locales - cliquez Sync pour envoyer vers Supabase';
      }
    }else{
      S.sbSt='Supabase connecte';
    }
    await loadInvites();
  }else{
    /* Supabase non configur\u00e9 - mode local */
    loadLocal();
  }
  render();
}

function loadXLSX(cb){
  if(window.XLSX){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=function(){cb();};
  s.onerror=function(){alert('Impossible de charger la librairie Excel. V\u00e9rifiez votre connexion.');};
  document.head.appendChild(s);
}

function handleImpFile(file){
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(['xlsx','xls','csv'].indexOf(ext)<0){alert('Format non support\u00e9. Utilisez .xlsx, .xls ou .csv');return;}
  loadXLSX(function(){
    var r=new FileReader();
    r.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        var data=rows.filter(function(row){return row.some(function(c){return c!=='';});});
        if(data.length<2){alert('Fichier vide ou non reconnu.');return;}
        var headers=data[0].map(function(h){return String(h||'').trim();});
        var am={};
        headers.forEach(function(h,i){
          var l=h.toLowerCase().replace(/\s+/g,' ').trim();
          if(am.cons===undefined&&(l==='nom'||l.includes('collaborateur')||l.includes('consultant')||l.includes('salarie')||l.includes('employe')))am.cons=i;
          if(am.typeAnal===undefined&&(l==='type anal.'||l==='type anal'||l.includes('type anal')))am.typeAnal=i;
          if(am.date===undefined&&(l==='trans date'||l==='trans. date'||l.includes('trans date')||l.includes('date')||l.includes('mois')||l.includes('periode')))am.date=i;
          if(am.montant===undefined&&(l==='foreign amount'||l.includes('foreign amount')||l.includes('montant')||l.includes('total')||l.includes('amount')||l.includes('facture')))am.montant=i;
          if(am.projet===undefined&&(l==='projet'||l==='project'||l.includes('projet')||l.includes('project code')))am.projet=i;
          if(am.nbj===undefined&&(l==='nbr of days'||l==='nb jours'||l.includes('nbr of days')||l.includes('nombre de jour')||l.includes('nb jour')||l==='qt\u00e9'||l==='qte'))am.nbj=i;
        });
        S.imp={file:file.name,sheet:wb.SheetNames[0],headers:headers,raw:data.slice(1),map:am,rows:[],results:null,selYear:'all'};
        render();
      }catch(err){alert('Erreur de lecture : '+err.message);}
    };
    r.readAsArrayBuffer(file);
  });
}

function applyImpMap(){
  try{
    var imp=S.imp;
    if(!imp){alert('Aucun fichier charg\u00e9.');return;}

    var cm={};
    ['cons','typeAnal','date','montant','projet'].forEach(function(f){
      var el=document.getElementById('im-'+f);
      if(el&&el.value!=='')cm[f]=parseInt(el.value);
    });
    if(cm.cons===undefined){alert('Colonne Consultant non s\u00e9lectionn\u00e9e.');return;}
    if(cm.montant===undefined){alert('Colonne Montant non s\u00e9lectionn\u00e9e.');return;}
    imp.map=cm;

    function parseName(raw){
      var s=String(raw||'').trim();
      var p=s.split(',');
      return p.length>=2?p[1].trim()+' '+p[0].trim():s;
    }
    function parseDate(v){
      if(!v)return '';
      if(v instanceof Date)return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
      return String(v);
    }
    function norm(n){return n.toLowerCase().replace(/[^a-z0-9 ]/gi,'').trim();}

    var useProjet=cm.projet!==undefined;

    /* Parser les lignes */
    imp.rows=imp.raw.map(function(row){
      var tAnal=cm.typeAnal!==undefined?String(row[cm.typeAnal]||'').trim().toUpperCase():'SHR';
      var nom=parseName(row[cm.cons]);
      var montant=parseFloat(String(row[cm.montant]||'0').replace(',','.'))||0;
      var date=parseDate(cm.date!==undefined?row[cm.date]:null);
      var projet=cm.projet!==undefined?String(row[cm.projet]||'').trim():'';
      return{cons:nom,typeAnal:tAnal,montant:montant,date:date,projet:projet};
    }).filter(function(r){
      if(!r.cons)return false;
      if(cm.typeAnal!==undefined)return(r.typeAnal==='SHR'||r.typeAnal==='CST')&&r.montant!==0;
      return r.montant!==0;
    });

    if(imp.rows.length===0){
      alert('Aucune ligne SHR ou CST trouv\u00e9e.\nV\u00e9rifiez la colonne "Type ANAL".');
      return;
    }

    /* Ann\u00e9es */
    var years=[];
    if(cm.date!==undefined){
      imp.rows.forEach(function(r){
        if(r.date&&r.date.length>=4){var yr=r.date.substring(0,4);if(yr&&years.indexOf(yr)<0)years.push(yr);}
      });
      years.sort();
    }

    /*
     * buildGroup : deux niveaux de cl\u00e9
     *   projetKey   : {projetCode|consKey}  → netter par (projet,cons,date)
     *   consKey     : {consKey}              → netter par (cons,date) — fallback si pas de projet
     *
     * R\u00e8gle jours : date avec montant net > 0 = 1 jour facturable.
     */
    function buildGroup(rows,yr){
      var byDate={};
      var byCst={};

      rows.forEach(function(r){
        if(yr!=='all'&&(!r.date||r.date.substring(0,4)!==yr))return;
        var ck=norm(r.cons);
        var dt=r.date||'unknown';

        if(r.typeAnal==='SHR'||cm.typeAnal===undefined){
          /* Cl\u00e9 (projet, consultant) */
          if(useProjet&&r.projet){
            var pk=r.projet.toLowerCase()+'|'+ck;
            if(!byDate[pk])byDate[pk]={proj:r.projet,cons:r.cons,dates:{}};
            byDate[pk].dates[dt]=(byDate[pk].dates[dt]||0)+r.montant;
          }
          /* Cl\u00e9 consultant seul (fallback) */
          if(!byDate[ck])byDate[ck]={proj:'',cons:r.cons,dates:{}};
          byDate[ck].dates[dt]=(byDate[ck].dates[dt]||0)+r.montant;
        }
        if(r.typeAnal==='CST'){
          if(!byCst[ck])byCst[ck]={name:r.cons,cost:0,n:0};
          byCst[ck].cost+=r.montant;byCst[ck].n++;
        }
      });

      /* Convertir en {key:{proj,cons,shr:{ca,jours},cst:{...}}} */
      var grp={};
      Object.keys(byDate).forEach(function(key){
        var d=byDate[key];
        grp[key]={proj:d.proj,cons:d.cons,shr:{ca:0,jours:0},cst:{cost:0,n:0}};
        Object.keys(d.dates).forEach(function(dt){
          var net=d.dates[dt];
          if(net>0){grp[key].shr.ca+=net;grp[key].shr.jours++;}
        });
      });
      Object.keys(byCst).forEach(function(ck){
        if(grp[ck]){grp[ck].cst.cost+=byCst[ck].cost;grp[ck].cst.n+=byCst[ck].n;}
      });
      return grp;
    }

    var byYear={all:buildGroup(imp.rows,'all')};
    years.forEach(function(yr){byYear[yr]=buildGroup(imp.rows,yr);});

    /*
     * buildResults : matching par code projet si disponible, sinon par nom.
     *
     * Pour chaque consultant :
     *   1. S\u2019il a des missions avec pcode → sommer les SHR de chaque (pcode|cons)
     *   2. Sinon → utiliser la cl\u00e9 cons seul
     *
     * On n\u2019affiche QUE les consultants identifi\u00e9s dans le fichier (impCA>0 ou impJ>0).
     */
    function buildResults(grp){
      var fyS=fyStart(S.year),fyE=fyEnd(S.year);
      var rows=[];
      var matchedProjs={};

      S.cons.filter(function(c){return !isGone(c);}).forEach(function(c){
        var cn=norm(c.name);
        var impCA=0,impJ=0,impCost=0,impCST_n=0;
        var matchedByProj=false;

        /* Matching prioritaire : code projet */
        if(useProjet){
          var pcMiss=S.miss.filter(function(m){return m.cid===c.id&&m.pcode&&m.pcode.trim();});
          pcMiss.forEach(function(m){
            var pkey=m.pcode.trim().toLowerCase()+'|'+cn;
            var d=grp[pkey];
            if(d){
              impCA+=d.shr.ca;impJ+=d.shr.jours;
              matchedByProj=true;
              matchedProjs[pkey]=true;
            }
          });
        }

        /* Fallback : nom consultant */
        if(!matchedByProj){
          var d=grp[cn];
          if(d){impCA+=d.shr.ca;impJ+=d.shr.jours;matchedProjs[cn]=true;}
        }

        /* CST : toujours par nom */
        var dc=grp[cn];
        if(dc){impCost+=dc.cst.cost;impCST_n+=dc.cst.n;}

        /* Ne garder QUE les consultants trouv\u00e9s dans le fichier */
        if(impCA===0&&impJ===0&&impCost===0)return;

        var k=kpi(c,S.miss,S.lvs,S.year,H);
        var impTJM=impJ>0?impCA/impJ:0;
        var impSCR=impCST_n>0?impCost/impCST_n:0;
        rows.push({c:c,k:k,
          appJ:k.bill,impJ:impJ,ecartJ:impJ-k.bill,
          appCA:k.rev,impCA:impCA,ecartCA:impCA-k.rev,
          appTJM:k.avgT,impTJM:impTJM,ecartTJM:impTJM-k.avgT,
          appCost:c.scr*(k.tWD||0),impCost:impCost,
          appSCR:c.scr,impSCR:impSCR,
          matchedByProj:matchedByProj});
      });

      /* D\u00e9tail par mission avec pcode */
      var missRows=[];
      if(useProjet){
        S.miss.filter(function(m){return m.pcode&&m.pcode.trim();}).forEach(function(m){
          var c=S.cons.find(function(c){return c.id===m.cid;});
          if(!c||isGone(c))return;
          var pkey=m.pcode.trim().toLowerCase()+'|'+norm(c.name);
          var d=grp[pkey];
          if(!d||d.shr.ca===0)return;  /* N\u2019afficher que si donn\u00e9es trouv\u00e9es */
          var mS=m.sd<fyS?fyS:m.sd,mE=(!m.ed||m.ed>fyE)?fyE:m.ed;
          var appJ=0,appCA=0;
          if(mS<=mE){var k=kpi(c,S.miss,S.lvs,S.year,H);var mk=k.pm.find(function(p){return p.id===m.id;});appJ=mk?mk.days:0;appCA=mk?mk.rev:0;}
          var impTJM=d.shr.jours>0?d.shr.ca/d.shr.jours:0;
          missRows.push({m:m,c:c,appJ:appJ,impJ:d.shr.jours,ecartJ:d.shr.jours-appJ,
            appCA:appCA,impCA:d.shr.ca,ecartCA:d.shr.ca-appCA,
            appTJM:m.tjm,impTJM:impTJM,ecartTJM:impTJM-m.tjm});
        });
      }

      /* Non-identifi\u00e9s dans le fichier = codes projets sans mission dans l\u2019app */
      var unmatched=Object.keys(grp).filter(function(k){
        return k.indexOf('|')>=0&&!matchedProjs[k]&&grp[k].shr.ca>0;
      }).map(function(k){return grp[k];});

      var tCA=rows.reduce(function(s,r){return s+r.impCA;},0);
      var tJ=rows.reduce(function(s,r){return s+r.impJ;},0);
      var tCost=rows.reduce(function(s,r){return s+r.impCost;},0);
      return{rows:rows,missRows:missRows,unmatched:unmatched,totalImpCA:tCA,totalImpJ:tJ,totalImpCost:tCost};
    }

    var computed={all:buildResults(byYear.all)};
    years.forEach(function(yr){computed[yr]=buildResults(byYear[yr]||{});});
    imp.results={computed:computed,years:years};
    imp.selYear='all';
    render();

  }catch(err){
    console.error('applyImpMap:',err);
    alert('Erreur :\n'+err.message+'\n\nF12 \u2192 Console pour le d\u00e9tail.');
  }
}

function tImpute(){
  var imp=S.imp;
  /* Etat 1 : zone upload */
  if(!imp){
    return '<div class="vw">'
      +'<div class="ph"><div><div class="pt">Imputations r\u00e9elles</div>'
      +'<div class="ps">Importez vos fichiers de facturation pour comparer avec les donn\u00e9es saisies</div></div></div>'
      +'<div class="card" style="padding:60px 32px;text-align:center;border:2px dashed #e2e8f0;background:#fff;border-radius:16px" id="imp-dz">'
      +'<div style="margin:0 auto 20px;color:#94a3b8"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>'

      +'<div style="font-size:13px;color:#64748b;margin-bottom:24px">ou cliquez pour parcourir (.xlsx, .xls, .csv)</div>'
      +'<label style="display:inline-block;background:#2563eb;color:#fff;padding:11px 28px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer">'
      +'Choisir un fichier<input type="file" id="imp-fi" accept=".xlsx,.xls,.csv" style="display:none"></label>'
      +'</div>'
      +'<div class="card" style="padding:20px;margin-top:16px">'
      +'<div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:10px">Format attendu</div>'
      +'<div style="font-size:12px;color:#64748b;line-height:1.8">Votre fichier doit contenir au minimum une colonne <strong>Consultant</strong> et une colonne <strong>Jours</strong> ou <strong>Montant</strong>.'
      +' Les colonnes Client, Mission, TJM et Date sont optionnelles. L\'application d\u00e9tecte automatiquement les colonnes.</div>'
      +'</div></div>';
  }
  /* Etat 2 : mapping colonnes */
  if(!imp.results){
    var FIELDS=[
      ['cons',     'Nom / Consultant *', 'Colonne contenant le nom (format NOM, Pr\u00e9nom accept\u00e9)'],
      ['typeAnal', 'Type ANAL',          'SHR = facturation TJM \u00b7 CST = co\u00fbt SCR \u2014 les autres types sont ignor\u00e9s'],
      ['date',     'Date (Trans Date)',  'Date de la transaction \u2014 utilis\u00e9e pour le filtre par ann\u00e9e'],
      ['montant',  'Montant *',          'Montant en devise (Foreign Amount)'],
      ['projet',   'Projet (code mission)', 'Code projet PSA/SAP - recoupage avec le code projet des missions de l\'app']
    ];
    /* N'afficher que les colonnes pertinentes (ou toutes si <15 colonnes) */
    var relevantIdx=imp.headers.reduce(function(acc,h,i){
      var l=h.toLowerCase().trim();
      if(l==='nom'||l==='projet'||l.includes('type anal')||l.includes('trans date')||l.includes('foreign amount')||
         l.includes('collaborateur')||l.includes('consultant')||l.includes('date')||l.includes('montant')||l.includes('amount'))acc.push(i);
      return acc;
    },[]);
    if(relevantIdx.length===0||imp.headers.length<=15)relevantIdx=imp.headers.map(function(_,i){return i;});
    var baseOpts='<option value="">-- Ignorer --</option>'+relevantIdx.map(function(i){return '<option value="'+i+'">'+(i+1)+'. '+esc(imp.headers[i])+'</option>';}).join('');
    var formHtml=FIELDS.map(function(f){
      var sel='<select class="ic" id="im-'+f[0]+'">';
      sel+=baseOpts.replace(new RegExp('value="'+imp.map[f[0]]+'"'),'value="'+imp.map[f[0]]+'" selected');
      sel+='</select>';
      return '<div class="fd" style="margin-bottom:12px"><label class="fl">'+f[1]+'</label>'+sel+'<p style="font-size:11px;color:#94a3b8;margin-top:3px">'+f[2]+'</p></div>';
    }).join('');
    var prevRows=imp.raw.slice(0,4).map(function(row){
      return '<tr>'+imp.headers.map(function(h,i){return '<td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #f1f5f9;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis">'+esc(String(row[i]||''))+'</td>';}).join('')+'</tr>';
    }).join('');
    var prevTbl='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
      +'<thead><tr>'+imp.headers.map(function(h){return '<th style="padding:5px 8px;font-size:11px;font-weight:700;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-align:left;white-space:nowrap">'+esc(h)+'</th>';}).join('')+'</tr></thead>'
      +'<tbody>'+prevRows+'</tbody></table>'
      +'<div style="font-size:11px;color:#94a3b8;margin-top:6px">Aper\u00e7u : 4 premi\u00e8res lignes sur '+imp.raw.length+' au total</div></div>';
    return '<div class="vw">'
      +'<div class="ph"><div><div class="pt">Imputations r\u00e9elles</div>'
      +'<div class="ps">Fichier : <strong>'+esc(imp.file)+'</strong> \u00b7 Feuille : '+esc(imp.sheet)+' \u00b7 '+imp.raw.length+' lignes</div></div>'
      +'<button class="bg" onclick="clearImp()">Changer de fichier</button></div>'
      +'<div style="display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start">'
      +'<div class="card" style="padding:22px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:4px">Association des colonnes</div>'
      +'<div style="font-size:12px;color:#64748b;margin-bottom:18px">Faites correspondre chaque colonne du fichier. * = obligatoire.</div>'
      +formHtml
      +'<button class="bp" style="width:100%;margin-top:4px" onclick="applyImpMap()">Consolider les donn\u00e9es</button></div>'
      +'<div class="card" style="padding:22px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:12px">Aper\u00e7u du fichier</div>'+prevTbl+'</div>'
      +'</div></div>';
  }
  /* Etat 3 : resultats */
  var selYear=imp.selYear||'all';
  var res=(imp.results.computed[selYear]||imp.results.computed.all);
  var years=imp.results.years;
  var totalAppCA=res.rows.reduce(function(s,r){return s+r.appCA;},0);
  var ecartCA=res.totalImpCA-totalAppCA;
  function ecC(v){return v===0?'#374151':v>0?'#16a34a':'#dc2626';}
  function sgn(v,u){return (v>0?'+':'')+Math.round(v)+(u||'');}
  function sgnCA(v){return (v>0?'+':'')+fEur(Math.round(v));}
  function fJ(v){return v>0?(Math.round(v*10)/10)+'j':'0j';}
  var TH='padding:8px 10px;font-size:11px;font-weight:700;text-align:right;color:#64748b;border-bottom:1px solid #e2e8f0;white-space:nowrap;';
  var THL='padding:8px 10px;font-size:11px;font-weight:700;text-align:left;color:#64748b;border-bottom:1px solid #e2e8f0;';
  var TD='padding:8px 10px;font-size:12px;text-align:right;border-bottom:1px solid #f1f5f9;';
  var TDL='padding:8px 10px;font-size:12px;font-weight:600;color:#0f172a;border-bottom:1px solid #f1f5f9;';
  var TDS='padding:8px 10px;font-size:12px;color:#64748b;border-bottom:1px solid #f1f5f9;';

  /* Filtre ann\u00e9e */
  var yearBtns='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">';
  (['all'].concat(years)).forEach(function(yr){
    var active=yr===selYear;
    yearBtns+='<button onclick="S.imp.selYear=\''+yr+'\';render()" style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid '+(active?'#2563eb':'#e2e8f0')+';background:'+(active?'#2563eb':'#fff')+';color:'+(active?'#fff':'#64748b')+'">'+(yr==='all'?'Toutes ann\u00e9es':yr)+'</button>';
  });
  yearBtns+='</div>';

  /* Hero */
  var hero='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">'
    +'<div class="card" style="padding:18px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px">CA import\u00e9 (SHR)</div>'
    +'<div style="font-size:26px;font-weight:900;color:#2563eb">'+fEur(Math.round(res.totalImpCA))+'</div>'
    +'<div style="font-size:11px;color:#64748b;margin-top:4px">vs '+fEur(Math.round(totalAppCA))+' saisi</div></div>'
    +'<div class="card" style="padding:18px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px">Jours factur\u00e9s</div>'
    +'<div style="font-size:26px;font-weight:900;color:#0f172a">'+fJ(res.totalImpJ)+'</div>'
    +'<div style="font-size:11px;color:#64748b;margin-top:4px">dates SHR nettes &gt; 0</div></div>'
    +'<div class="card" style="padding:18px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px">\u00c9cart CA</div>'
    +'<div style="font-size:26px;font-weight:900;color:'+ecC(ecartCA)+'">'+sgnCA(ecartCA)+'</div>'
    +'<div style="font-size:11px;color:#64748b;margin-top:4px">'+(Math.abs(ecartCA)<1?'Aucun':ecartCA>0?'CA r\u00e9el sup\u00e9rieur':'CA r\u00e9el inf\u00e9rieur')+'</div></div>'
    +'<div class="card" style="padding:18px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px">Co\u00fbt import\u00e9 (CST)</div>'
    +'<div style="font-size:26px;font-weight:900;color:#7c3aed">'+fEur(Math.round(res.totalImpCost))+'</div>'
    +'<div style="font-size:11px;color:#64748b;margin-top:4px">total lignes CST</div></div>'
    +'</div>';

  /* Tableau CONSULTANT (toujours visible) */
  var thead1='<thead><tr>'
    +'<th style="'+THL+'">Consultant</th>'
    +'<th style="'+TH+'">Jours (app FY)</th><th style="'+TH+'">Jours (SHR)</th><th style="'+TH+'">\u00c9cart j</th>'
    +'<th style="'+TH+'">CA saisi</th><th style="'+TH+'">CA r\u00e9el (SHR)</th><th style="'+TH+'">\u00c9cart CA</th>'
    +'<th style="'+TH+'">TJM saisi</th><th style="'+TH+'">TJM r\u00e9el</th>'
    +'</tr></thead>';
  var tbody1='<tbody>'+res.rows.map(function(r){
    var jCol=Math.abs(r.ecartJ)>2?ecC(r.ecartJ):'#374151';
    var cCol=Math.abs(r.ecartCA)>500?ecC(r.ecartCA):'#374151';
    return '<tr>'
      +'<td style="'+TDL+'">'+esc(r.c.name)+(r.matchedByProj?' <span style="font-size:10px;background:#dcfce7;color:#16a34a;padding:1px 6px;border-radius:4px;font-weight:600">code projet</span>':'')+'</td>'
      +'<td style="'+TD+'">'+fJ(r.appJ)+'</td>'
      +'<td style="'+TD+'">'+fJ(r.impJ)+'</td>'
      +'<td style="'+TD+';color:'+jCol+';font-weight:700">'+sgn(r.ecartJ,'j')+'</td>'
      +'<td style="'+TD+'">'+fEur(Math.round(r.appCA))+'</td>'
      +'<td style="'+TD+'">'+fEur(Math.round(r.impCA))+'</td>'
      +'<td style="'+TD+';color:'+cCol+';font-weight:700">'+sgnCA(r.ecartCA)+'</td>'
      +'<td style="'+TD+'">'+(r.appTJM>0?fEur(Math.round(r.appTJM)):'\u2014')+'</td>'
      +'<td style="'+TD+'">'+(r.impTJM===0?'\u2014':fEur(Math.round(r.impTJM)))+'</td>'
      +'</tr>';
  }).join('')+'</tbody>';

  /* Tableau MISSIONS (visible si missRows.length > 0) */
  var missionSection='';
  if(res.missRows&&res.missRows.length>0){
    var thead2='<thead><tr>'
      +'<th style="'+THL+'">Code projet</th><th style="'+THL+'">Mission</th><th style="'+THL+'">Consultant</th>'
      +'<th style="'+TH+'">Jours (app FY)</th><th style="'+TH+'">Jours (SHR)</th>'
      +'<th style="'+TH+'">CA (app)</th><th style="'+TH+'">CA (SHR)</th><th style="'+TH+'">\u00c9cart CA</th>'
      +'<th style="'+TH+'">TJM app</th><th style="'+TH+'">TJM r\u00e9el</th>'
      +'</tr></thead>';
    var tbody2='<tbody>'+res.missRows.map(function(r){
      var noD=!r.imp;
      var cCol=Math.abs(r.ecartCA)>500?ecC(r.ecartCA):'#374151';
      return '<tr>'
        +'<td style="'+TDL+';font-size:11px;color:#64748b;font-weight:500">'+esc(r.m.pcode)+'</td>'
        +'<td style="'+TDS+'">'+esc(r.m.name)+' \u2014 '+esc(r.m.cli)+'</td>'
        +'<td style="'+TDS+'">'+esc(r.c.name)+'</td>'
        +'<td style="'+TD+'">'+fJ(r.appJ)+'</td>'
        +'<td style="'+TD+(noD?';color:#94a3b8':'')+'">'+(noD?'\u2014':fJ(r.impJ))+'</td>'
        +'<td style="'+TD+'">'+fEur(Math.round(r.appCA))+'</td>'
        +'<td style="'+TD+(noD?';color:#94a3b8':'')+'">'+(noD?'Non trouv\u00e9':fEur(Math.round(r.impCA)))+'</td>'
        +'<td style="'+TD+';color:'+cCol+';font-weight:700">'+(noD?'\u2014':sgnCA(r.ecartCA))+'</td>'
        +'<td style="'+TD+'">'+(r.appTJM>0?fEur(r.appTJM):'\u2014')+'</td>'
        +'<td style="'+TD+'">'+(noD||r.impTJM===0?'\u2014':fEur(Math.round(r.impTJM)))+'</td>'
        +'</tr>';
    }).join('')+'</tbody>';
    missionSection='<div class="card ov" style="margin-top:16px">'
      +'<div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">'
      +'<div style="font-size:13px;font-weight:700;color:#0f172a">D\u00e9tail par mission (code projet)</div>'
      +'<div style="font-size:11px;color:#94a3b8">Missions avec code projet renseign\u00e9 uniquement</div>'
      +'</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+thead2+tbody2+'</table></div>'
      +'</div>';
  } else if(imp.map.projet!==undefined){
    missionSection='<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 16px;margin-top:12px;font-size:12px;color:#1e40af">'
      +'Colonne Projet mapp\u00e9e \u2014 pour voir le d\u00e9tail par mission, renseignez le champ "Code projet" sur chaque mission dans l\u2019onglet Missions.'
      +'</div>';
  }

  var unmatch=res.unmatched.length?'<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;margin-top:12px">'
    +'<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:4px">'+res.unmatched.length+' collaborateur(s) dans le fichier non retrouv\u00e9(s) dans l\'app</div>'
    +'<div style="font-size:12px;color:#78350f">'+res.unmatched.map(function(b){return esc(b.name||'')+' ('+fEur(Math.round(b.shr.ca))+' / '+fJ(b.shr.jours)+')';}).join(' \u00b7 ')+'</div>'
    +'</div>':'';

  return '<div class="vw">'
    +'<div class="ph"><div><div class="pt">Imputations r\u00e9elles</div>'
    +'<div class="ps">Fichier : <strong>'+esc(imp.file)+'</strong> \u00b7 '+imp.rows.length+' lignes (SHR+CST)</div></div>'
    +'<div style="display:flex;gap:8px"><button class="bg" onclick="S.imp.results=null;render()">Modifier</button><button class="bg" onclick="clearImp()">Nouvel import</button></div></div>'
    +yearBtns+hero
    +'<div class="card ov">'
    +'<div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">'
    +'<div style="font-size:13px;font-weight:700;color:#0f172a">Comparaison par consultant \u2014 '+(selYear==='all'?'Toutes ann\u00e9es':selYear)+'</div>'
    +'<div style="font-size:11px;color:#94a3b8">Jours app = FY s\u00e9lectionn\u00e9 (oct \u2192 sept)</div>'
    +'</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+thead1+tbody1+'</table></div>'
    +unmatch+'</div>'
    +missionSection+'</div>';
}

/* ======================================================*/
(function(){
  var m=window.innerWidth<768;
  var s=localStorage.getItem('sb-col');
  if(m||(s==='true'))document.body.classList.add('sb-col');
})();
function toggleSB(){
  document.body.classList.toggle('sb-col');
  localStorage.setItem('sb-col',document.body.classList.contains('sb-col'));
}
initApp();
</script>
</body>
</html>
