        +'</div>'
        +'<div style="font-size:11px;color:#94a3b8;margin-top:4px">'+pct+'% du CA total</div>'
        +'</div></div>';
    }).join(''):'<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">Aucune donn\u00e9e</div>')
    +'</div>';

  var cards='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px">'
    +ks.map(function(x){
      var k=x.k,c=x.c;
      var col=srCol(k.sr),bg=srBg(k.sr);
      var ms=k.pm.filter(function(m){return m.days>0;});
      var msStr=ms.length?ms.map(function(m){return m.cli+' \u2014 '+m.name;}).join(' / '):'Inter-contrat';
      var marCol=k.om!=null?(k.om>=30?'#16a34a':k.om>=15?'#d97706':'#dc2626'):'#94a3b8';
      return '<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 12px rgba(0,0,0,.07);border-top:3px solid '+col+'">'
        +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
        +'<div style="width:42px;height:42px;border-radius:10px;background:'+bg+';color:'+col+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">'+ini(c.name)+'</div>'
        +'<div style="min-width:0;flex:1">'
        +'<div style="font-weight:700;font-size:13px;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name)+'</div>'
        +'<div style="font-size:11px;color:#94a3b8;margin-top:1px">'+esc(c.title)+'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:20px;font-weight:900;color:'+col+'">'+k.sr.toFixed(0)+'%</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8">staffing</div>'
        +(k.cs&&k.cs>fyStart(S.year)?'<div style="font-size:9px;color:#f59e0b;font-weight:600;margin-top:2px">\u25B6 depuis '+fDt(k.cs)+'</div>':'')
        +'</div></div>'
        +'<div style="height:4px;background:#f1f5f9;border-radius:2px;margin-bottom:12px;overflow:hidden">'
        +'<div style="height:100%;width:'+Math.min(k.sr,100).toFixed(0)+'%;background:'+col+'"></div></div>'
        +'<div style="font-size:11px;color:#64748b;margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(msStr)+'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:#0f172a">'+fEur(k.rev)+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">CA</div></div>'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:'+marCol+'">'+(k.om!=null?k.om.toFixed(1)+'%':'&mdash;')+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">Marge</div></div>'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:#374151">'+(k.avgT>0?fEur(k.avgT):'&mdash;')+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">TJM</div></div>'
        +'</div></div>';
    }).join('')+'</div>';

  var pmR=ks.map(function(x){
    var pm=x.k.pm.filter(function(m){return m.days>0;});
    if(!pm.length)return '';
    return '<div style="border-bottom:1px solid #f1f5f9">'
      +'<div style="padding:10px 20px;background:#f8fafc;display:flex;align-items:center;gap:10px">'
      +'<div style="width:24px;height:24px;border-radius:6px;background:'+srBg(x.k.sr)+';color:'+srCol(x.k.sr)+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">'+ini(x.c.name)+'</div>'
      +'<span style="font-size:12px;font-weight:700;color:#374151">'+esc(x.c.name)+'</span>'
      +'<span style="font-size:11px;color:#94a3b8">'+pm.length+' mission'+(pm.length>1?'s':'')+'</span></div>'
      +pm.map(function(m){
        var mc=m.mar>=30?'#16a34a':m.mar>=0?'#d97706':'#dc2626';
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 20px;border-top:1px solid #f1f5f9;font-size:12px">'
          +'<div style="flex:1;min-width:0"><span style="font-weight:600;color:#0f172a">'+esc(m.cli)+'</span> <span style="color:#94a3b8">&mdash; '+esc(m.name)+'</span></div>'
          +'<span style="color:#64748b;flex-shrink:0">'+m.days+'j</span>'
          +'<span style="color:#374151;flex-shrink:0">'+fEur(m.tjm)+'/j</span>'
          +'<span style="font-weight:700;color:#0f172a;flex-shrink:0">'+fEur(m.rev)+'</span>'
          +'<span style="font-weight:800;color:'+mc+';flex-shrink:0">'+m.mar.toFixed(1)+'%</span></div>';
      }).join('')+'</div>';
  }).join('');

  /* ── KPIs par consultant : tableau déroulable ── */
  /* ── KPIs par consultant : tableau déroulable + tri par colonne ── */
  var kSort=S.kpiSort||null,kAsc=S.kpiSortAsc||false;
  var ksSorted=ks.slice().sort(function(a,b){
    if(!kSort)return 0;
    var va=kSort==='ca'?a.k.rev:kSort==='marge'?(a.k.om!=null?a.k.om:-999):kSort==='tjm'?(a.k.avgT||0):a.k.sr;
    var vb=kSort==='ca'?b.k.rev:kSort==='marge'?(b.k.om!=null?b.k.om:-999):kSort==='tjm'?(b.k.avgT||0):b.k.sr;
    return kAsc?va-vb:vb-va;
  });
  function sortTh(col,label){
    var active=kSort===col;
    var arrow=active?(kAsc?' ▲':' ▼'):'';
    return '<th class="tc" style="cursor:pointer;user-select:none;color:'+(active?'#84CC16':'#94a3b8')+';font-weight:'+(active?800:600)+'" data-act="kpi-sort" data-id="'+col+'">'+label+arrow+'</th>';
  }
  var consKpiRows=ksSorted.map(function(x){
    var k=x.k,c=x.c;
    var mc=k.om!=null?(k.om>=30?'#16a34a':k.om>=15?'#d97706':'#dc2626'):'#94a3b8';
    return '<tr>'
      +'<td><div style="font-weight:600;font-size:13px;color:#0f172a">'+esc(c.name)+'</div>'
      +'<div style="font-size:11px;color:#94a3b8">'+esc(c.title)+'</div></td>'
      +'<td class="tc" style="font-weight:800;font-size:13px;color:#0f172a">'+fEur(k.rev)+'</td>'
      +'<td class="tc" style="font-weight:800;color:'+mc+'">'+(k.om!=null?k.om.toFixed(1)+'%':'&mdash;')+'</td>'
      +'<td class="tc" style="font-weight:700;color:#374151">'+(k.avgT>0?fEur(k.avgT):'&mdash;')+'</td>'
      +'<td class="tc"><div style="display:inline-block;background:'+(k.sr>=80?'#f0fdf4':k.sr>=50?'#fffbeb':'#fff1f2')+';color:'+(k.sr>=80?'#16a34a':k.sr>=50?'#d97706':'#dc2626')+';padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+k.sr.toFixed(0)+'%</div></td>'
      +'</tr>';
  }).join('');

  var consKpiSection='<details style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:16px;overflow:hidden"'+(kSort?' open':'')+'>'  
    +'<summary style="display:flex;align-items:center;gap:8px;padding:14px 18px;cursor:pointer;font-size:14px;font-weight:800;color:#0f172a;list-style:none;user-select:none" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'  
    +'\uD83D\uDCCB<span style="flex:1;margin-left:8px">KPIs par Consultant</span>'
    +'<span style="font-size:11px;font-weight:700;background:#e2e8f0;color:#475569;padding:1px 8px;border-radius:99px;margin-right:6px">'+ks.length+' consultants</span>'
    +'<span style="font-size:11px;color:#94a3b8">&#x25be;</span></summary>'
    +'<div style="padding:0 0 4px"><table>'
    +'<thead><tr><th>'+rLabel('utilisateur')+'</th>'+sortTh('ca','CA')+sortTh('marge','Marge')+sortTh('tjm','TJM moy.')+sortTh('sr','Staffing')+'</tr></thead>'
    +'<tbody>'+consKpiRows+(consKpiRows?'':'<tr><td colspan="5" class="emp">Aucune donn\u00e9e sur la p\u00e9riode</td></tr>')
    +'</tbody></table></div></details>';

  return '<div class="vw">'
    +'<div style="margin-bottom:24px"><div class="pt">KPIs &mdash; '+fyLbl(S.year)+(S.quarter?' \u00b7 '+curRangeLbl():'')+'</div></div>'
    +hero
    +'<div style="display:grid;grid-template-columns:3fr 200px;gap:16px;margin-bottom:16px">'
    +'<div class="card" style="padding:20px">'
    +'<div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:8px">Staffing par consultant (%)</div>'
    +srBars+'</div>'

    +'</div>'
    +(S.role==='admin'?tKPIsDirSection():S.role==='super_admin'?tKPIsSVPSection():consKpiSection)

}


/* ══════════════════════════════════════════════════════════════
   TEMPLATE - KPIs DIRECTEURS (gestionnaire)
══════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════
   TEMPLATE - KPIs SVP (3 niveaux : VP → Directeur → Consultant)
══════════════════════════════════════════════════════════════ */
function tKPIsSVPSection(){
  var allKS=buildKS();
  var dSort=S.kpiDirSort||null,dAsc=S.kpiDirSortAsc||false;
  var colDef='display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 24px;align-items:center;gap:8px';

  function sortBtn(col,label){
    var active=dSort===col;
    var arrow=active?(dAsc?' \u25b2':' \u25bc'):'';
    return '<button style="background:none;border:none;cursor:pointer;font-weight:'+(active?800:600)+';color:'+(active?'#84CC16':'#94a3b8')+';font-size:11px;padding:0;font-family:\'Nunito\',sans-serif;text-transform:uppercase;letter-spacing:.04em" data-act="kpi-dir-sort" data-id="'+col+'">'+label+arrow+'</button>';
  }
  function srBadge(v){
    return '<span style="background:'+(v>=80?'#f0fdf4':v>=50?'#fffbeb':'#fff1f2')+';color:'+(v>=80?'#16a34a':v>=50?'#d97706':'#dc2626')+';padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+v.toFixed(0)+'%</span>';
  }
  function aggKS(list){
    var ca=list.reduce(function(s,x){return s+x.k.rev;},0);
    var bills=list.reduce(function(s,x){return s+x.k.bill;},0);
    var mars=list.filter(function(x){return x.k.om!=null;}).map(function(x){return x.k.om;});
    var twd=list.reduce(function(s,x){return s+(x.k.tWD||0);},0);
    var sr=twd>0?list.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/twd:0;
    return{ca:ca,tjm:bills>0?ca/bills:0,marge:mars.length?mars.reduce(function(s,v){return s+v;},0)/mars.length:null,sr:sr};
  }
  function sortList(list,keyFn){
    if(!dSort)return list;
    return list.slice().sort(function(a,b){
      var va=keyFn(a),vb=keyFn(b);
      return dAsc?va-vb:vb-va;
    });
  }
  function kpiVal(agg,col){
    return col==='ca'?agg.ca:col==='marge'?(agg.marge!=null?agg.marge:-999):col==='sr'?agg.sr:agg.tjm;
  }
  function fmtMarge(m){return m!=null?(m>=30?'#16a34a':m>=15?'#d97706':'#dc2626'):'#94a3b8';}

  /* ── Grouper par VP → Directeur ── */
  var vpMap={};
  allKS.forEach(function(x){
    var dir=x.c.dir||'(Sans directeur)';
    var vp='(Sans VP)';
    /* Cherche dans vpDirMap si ce directeur y est référencé */
    Object.keys(S.vpDirMap||{}).forEach(function(v){if((S.vpDirMap[v]||[]).indexOf(dir)>=0)vp=v;});
    /* Fallback : si vpDirMap vide et un seul VP invité, tout lui appartient */
    if(vp==='(Sans VP)'&&Object.keys(S.vpDirMap||{}).length===0&&S.svpInvites&&S.svpInvites.length===1){
      vp=S.svpInvites[0].vp_name||S.svpInvites[0].email||'(Sans VP)';
    }
    if(!vpMap[vp])vpMap[vp]={};
    if(!vpMap[vp][dir])vpMap[vp][dir]=[];
    vpMap[vp][dir].push(x);
  });

  /* ── VP list triée ── */
  var vpList=Object.keys(vpMap).map(function(vpName){
    var all=[];Object.keys(vpMap[vpName]).forEach(function(d){all=all.concat(vpMap[vpName][d]);});
    var agg=aggKS(all);
    return{name:vpName,agg:agg,count:all.length,dirs:vpMap[vpName]};
  });
  vpList=sortList(vpList,function(v){return kpiVal(v.agg,dSort);});

  /* ── HTML VP cards ── */
  var vpCards=vpList.map(function(vp){
    var a=vp.agg,mc=fmtMarge(a.marge);
    var vpOpen=!!(S.kpiVPOpen&&S.kpiVPOpen[vp.name]);
    var vKey=vp.name.replace(/'/g,"'");

    /* Directeurs dans ce VP */
    var dirList=Object.keys(vp.dirs).map(function(dirName){
      var dKS=vp.dirs[dirName];
      var da=aggKS(dKS);
      return{name:dirName,agg:da,cons:dKS};
    });
    dirList=sortList(dirList,function(d){return kpiVal(d.agg,dSort);});

    var dirCards=dirList.map(function(dir){
      var da=dir.agg,dmc=fmtMarge(da.marge);
      var dirKey=(vp.name+'|||'+dir.name).replace(/'/g,"'");
      var dirOpen=!!(S.kpiDirDirOpen&&S.kpiDirDirOpen[vp.name+'|||'+dir.name]);

      /* Consultants dans ce directeur */
      var sortedCons=sortList(dir.cons,function(x){
        return dSort==='ca'?x.k.rev:dSort==='marge'?(x.k.om!=null?x.k.om:-999):dSort==='sr'?x.k.sr:(x.k.avgT||0);
      });
      var consRows=sortedCons.map(function(x){
        var k=x.k,c=x.c;
        var cmc=k.om!=null?(k.om>=30?'#16a34a':k.om>=15?'#d97706':'#dc2626'):'#94a3b8';
        return '<div style="'+colDef+';padding:8px 14px 8px 44px;border-top:1px solid #f1f5f9;background:#f8fafc">'
          +'<div><div style="font-weight:600;font-size:12px;color:#374151">'+esc(c.name)+'</div>'

function tKPIsDirSection(){
  var allKS=buildKS();
  var dSort=S.kpiDirSort||null,dAsc=S.kpiDirSortAsc||false;

  /* Grouper par directeur */
  var dirs={};
  allKS.forEach(function(x){
    var dir=x.c.dir||'(Sans directeur)';
    if(!dirs[dir])dirs[dir]={ca:0,bills:0,margins:[],cons:[]};
    var d=dirs[dir];
    d.ca+=x.k.rev;d.bills+=x.k.bill;
    if(x.k.om!=null)d.margins.push(x.k.om);
    d.cons.push(x);
  });

  var dirList=Object.keys(dirs).map(function(dir){
    var d=dirs[dir];
    var totTWD=d.cons.reduce(function(s,x){return s+(x.k.tWD||0);},0);
    var avgSrDir=totTWD>0?d.cons.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/totTWD:0;
    return{name:dir,ca:d.ca,
      tjm:d.bills>0?d.ca/d.bills:0,
      marge:d.margins.length?d.margins.reduce(function(s,v){return s+v;},0)/d.margins.length:null,
      sr:avgSrDir,
      count:d.cons.length,cons:d.cons};
  });

  /* Tri directeurs */
  if(dSort)dirList.sort(function(a,b){
    var va=dSort==='ca'?a.ca:dSort==='marge'?(a.marge!=null?a.marge:-999):dSort==='sr'?a.sr:a.tjm;
    var vb=dSort==='ca'?b.ca:dSort==='marge'?(b.marge!=null?b.marge:-999):dSort==='sr'?b.sr:b.tjm;
    return dAsc?va-vb:vb-va;
  });

  function dSortBtn(col,label){
    var active=dSort===col;
    var arrow=active?(dAsc?' \u25b2':' \u25bc'):'';
    return '<button style="background:none;border:none;cursor:pointer;font-weight:'+(active?800:600)+';color:'+(active?'#84CC16':'#94a3b8')+';font-size:11px;padding:0;font-family:\'Nunito\',sans-serif;text-transform:uppercase;letter-spacing:.04em" data-act="kpi-dir-sort" data-id="'+col+'">'+label+arrow+'</button>';
  }

  /* Colonnes header */
  var colDef='display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 24px;align-items:center;gap:8px';

  /* Lignes par directeur */
  var dirCards=dirList.map(function(d){
    var mc=d.marge!=null?(d.marge>=30?'#16a34a':d.marge>=15?'#d97706':'#dc2626'):'#94a3b8';
    /* Consultants triés par même colonne */
    var sortedCons=d.cons.slice().sort(function(a,b){
      if(!dSort)return 0;
      var va=dSort==='ca'?a.k.rev:dSort==='marge'?(a.k.om!=null?a.k.om:-999):dSort==='sr'?a.k.sr:(a.k.avgT||0);
      var vb=dSort==='ca'?b.k.rev:dSort==='marge'?(b.k.om!=null?b.k.om:-999):dSort==='sr'?b.k.sr:(b.k.avgT||0);
      return dAsc?va-vb:vb-va;
    });
    var consRows=sortedCons.map(function(x){
      var k=x.k,c=x.c;
      var cmc=k.om!=null?(k.om>=30?'#16a34a':k.om>=15?'#d97706':'#dc2626'):'#94a3b8';
      return '<div style="'+colDef+';padding:10px 16px 10px 28px;border-top:1px solid #f1f5f9;background:#f8fafc">'
        +'<div><div style="font-weight:600;font-size:12px;color:#374151">'+esc(c.name)+'</div>'
        +'<div style="font-size:10px;color:#94a3b8">'+esc(c.title)+'</div></div>'
        +'<div style="text-align:center;font-size:12px;font-weight:700;color:#0f172a">'+fEur(k.rev)+'</div>'
        +'<div style="text-align:center;font-size:12px;font-weight:700;color:'+cmc+'">'+(k.om!=null?k.om.toFixed(1)+'%':'&mdash;')+'</div>'
        +'<div style="text-align:center;font-size:12px;color:#374151">'+(k.avgT>0?fEur(k.avgT):'&mdash;')+'</div>'
        +'<div style="text-align:center"><span style="background:'+(k.sr>=80?'#f0fdf4':k.sr>=50?'#fffbeb':'#fff1f2')+';color:'+(k.sr>=80?'#16a34a':k.sr>=50?'#d97706':'#dc2626')+';padding:1px 8px;border-radius:99px;font-size:11px;font-weight:700">'+k.sr.toFixed(0)+'%</span></div>'
        +'<div></div>'
        +'</div>';
    }).join('');
    var isOpen=!!(S.kpiDirOpen&&S.kpiDirOpen[d.name]);
    var srBg2=d.sr>=80?'#f0fdf4':d.sr>=50?'#fffbeb':'#fff1f2';
    var srFg2=d.sr>=80?'#16a34a':d.sr>=50?'#d97706':'#dc2626';
    var dKey=d.name.replace(/'/g,"'");
    return '<details'+(isOpen?' open':'')+' ontoggle="if(!S.kpiDirOpen)S.kpiDirOpen={};S.kpiDirOpen[\''+dKey+'\'\']=this.open">'
      +'<summary style="'+colDef+';padding:14px 16px;cursor:pointer;list-style:none;border-top:1px solid #e2e8f0" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'
      +'<div><div style="font-weight:700;color:#0f172a;font-size:13px">'+esc(d.name)+'</div>'
      +'<div style="font-size:11px;color:#94a3b8">'+d.count+' consultant'+(d.count>1?'s':'')+'</div></div>'
      +'<div style="text-align:center;font-weight:900;font-size:14px;color:#0f172a">'+fEur(d.ca)+'</div>'
      +'<div style="text-align:center;font-weight:800;color:'+mc+'">'+(d.marge!=null?d.marge.toFixed(1)+'%':'&mdash;')+'</div>'
      +'<div style="text-align:center;font-weight:700;color:#374151">'+(d.tjm>0?fEur(Math.round(d.tjm)):'&mdash;')+'</div>'
      +'<div style="text-align:center"><span style="background:'+srBg2+';color:'+srFg2+';padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+d.sr.toFixed(0)+'%</span></div>'
      +'<div style="text-align:right;font-size:14px;color:#94a3b8">\u25be</div>'
      +'</summary>'
      +consRows
      +'</details>';
  }).join('');

  /* Totaux */
  var totCA=allKS.reduce(function(s,x){return s+x.k.rev;},0);
  var totBill=allKS.reduce(function(s,x){return s+x.k.bill;},0);
  var allMar=allKS.filter(function(x){return x.k.om!=null;});
  var totTJM=totBill>0?totCA/totBill:0;
  var totMar=allMar.length?allMar.reduce(function(s,x){return s+x.k.om;},0)/allMar.length:null;
  var totMc=totMar!=null?(totMar>=30?'#16a34a':totMar>=15?'#d97706':'#dc2626'):'#94a3b8';
  var totTWDAll=allKS.reduce(function(s,x){return s+(x.k.tWD||0);},0);
  var totSrAll=totTWDAll>0?allKS.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/totTWDAll:0;
  var totSrBg=totSrAll>=80?'#f0fdf4':totSrAll>=50?'#fffbeb':'#fff1f2';
  var totSrFg=totSrAll>=80?'#16a34a':totSrAll>=50?'#d97706':'#dc2626';
  var totalRow='<div style="'+colDef+';padding:14px 16px;background:#f0fdf4;border-top:2px solid #84CC16">'
    +'<div style="font-weight:800;color:#1B2B3A">\u03a3 Total ESN</div>'
    +'<div style="text-align:center;font-weight:900;font-size:14px;color:#1B2B3A">'+fEur(totCA)+'</div>'
    +'<div style="text-align:center;font-weight:800;color:'+totMc+'">'+(totMar!=null?totMar.toFixed(1)+'%':'&mdash;')+'</div>'
    +'<div style="text-align:center;font-weight:700;color:#1B2B3A">'+(totTJM>0?fEur(Math.round(totTJM)):'&mdash;')+'</div>'
    +'<div style="text-align:center"><span style="background:'+totSrBg+';color:'+totSrFg+';padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+totSrAll.toFixed(0)+'%</span></div>'
    +'<div></div></div>';

  return '<details style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:16px;overflow:hidden"'+(dSort?' open':'')+'>'
    +'<summary style="display:flex;align-items:center;gap:8px;padding:14px 18px;cursor:pointer;font-size:14px;font-weight:800;color:#0f172a;list-style:none;user-select:none" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'
    +'\uD83D\uDCCA<span style="flex:1;margin-left:8px">KPIs par '+rLabel('gestionnaire')+'</span>'
    +'<span style="font-size:11px;font-weight:700;background:#e2e8f0;color:#475569;padding:1px 8px;border-radius:99px;margin-right:6px">'+dirList.length+' directeurs</span>'
    +'<span style="font-size:11px;color:#94a3b8">&#x25be;</span></summary>'
    +'<div style="'+colDef+';padding:10px 16px;background:#f8fafc;border-top:1px solid #e2e8f0">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">'+rLabel('gestionnaire')+'</div>'
    +'<div style="text-align:center">'+dSortBtn('ca','CA')+'</div>'

    +'<div style="text-align:center">'+dSortBtn('tjm','TJM moy.')+'</div>'
    +'<div style="text-align:center">'+dSortBtn('sr','Staffing')+'</div>'
    +'<div></div></div>'
    +dirCards
    +totalRow
    +'</details>';

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - LEAVES
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tLeaves(){
  var H=fyHols(S.year);
  var _r=curRange(S.year);var fyS=_r[0],fyE=_r[1];

  var fil=S.lvs.filter(function(l){
    if(S.flc!=='all'&&l.cid!==S.flc)return false;
    return l.e>=fyS&&l.s<=fyE;
  }).sort(function(a,b){return a.s.localeCompare(b.s);});

  var co='<option value="all">Tous les consultants</option>'+S.cons.map(function(c){
    return '<option value="'+c.id+'"'+(c.id===S.flc?' selected':'')+'>'+esc(c.name)+'</option>';
  }).join('');

  var TCC={
    'Cong\u00e9 pay\u00e9':'#dbeafe|#1e40af','RTT':'#ede9fe|#5b21b6',
    'Formation':'#dcfce7|#15803d','Inter-contrat':'#ffedd5|#c2410c',
    'Maladie':'#fee2e2|#b91c1c','Cong\u00e9 maternit\u00e9':'#fce7f3|#9d174d',
    'Cong\u00e9 sans solde':'#f1f5f9|#475569','Mission interne':'#ccfbf1|#0f766e','Autre':'#f1f5f9|#475569'
  };
  function isArret(t){return t==='Maladie'||t==='Cong\u00e9 maternit\u00e9'||t==='Cong\u00e9 sans solde';}

  var bodyHtml='';

  if(S.flc==='all'){
    /* ── Vue synth\u00e8se : indicateur par consultant ── */
    var sumRows=S.cons.map(function(c){
      var clvs=S.lvs.filter(function(l){return l.cid===c.id&&l.e>=fyS&&l.s<=fyE;});
      if(!clvs.length)return '';
      var cpJ=0,arJ=0;
      clvs.forEach(function(l){
        /* Clamp à la période sélectionnée */
        var effS=l.s>fyS?l.s:fyS;
        var effE=l.e<fyE?l.e:fyE;
        var wd=wDays(effS,effE,H);
        if(isArret(l.type))arJ+=wd;
        else if(l.type!=='Inter-contrat')cpJ+=wd;
      });
      if(!cpJ&&!arJ)return '';
      var tot=cpJ+arJ;
      return '<tr>'
        +'<td style="font-weight:600;color:#0f172a">'+esc(c.name)+'</td>'
        +'<td class="tc"><span style="background:#dbeafe;color:#1e40af;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+cpJ+'j</span></td>'
        +'<td class="tc"><span style="background:#fee2e2;color:#b91c1c;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+arJ+'j</span></td>'
        +'<td class="tc" style="font-weight:800;color:#0f172a;font-size:14px">'+tot+'j</td>'
        +'<td class="tr"><button class="lb" data-act="lvc" data-id="'+c.id+'">\u2192 D\u00e9tail</button></td>'
        +'</tr>';
    }).filter(Boolean).join('');
    bodyHtml='<table><thead><tr><th>'+rLabel('utilisateur')+'</th><th class="tc">Cong\u00e9s &amp; RTT</th>'
      +'<th class="tc">Arr\u00eats / Mat.</th><th class="tc">Total '+curLbl()+'</th><th></th></tr></thead>'
      +'<tbody>'+sumRows+(sumRows?'':'<tr><td colspan="5" class="emp">Aucune absence enregistr\u00e9e sur le '+curLbl()+'</td></tr>')
      +'</tbody></table>';
  } else {
    /* ── Vue d\u00e9tail consultant ── */
    var detRows=fil.map(function(l){
      /* Clamp à la période pour n'afficher que les jours dans la fenêtre */
      var effS=l.s>fyS?l.s:fyS;
      var effE=l.e<fyE?l.e:fyE;
      var wd=wDays(effS,effE,H);
      var tc=(TCC[l.type]||'#f1f5f9|#475569').split('|');
      return '<tr>'
        +'<td><span style="display:inline-flex;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;background:'+tc[0]+';color:'+tc[1]+'">'+esc(l.type)+'</span></td>'
        +'<td>'+fDt(l.s)+'</td><td>'+fDt(l.e)+'</td>'
        +'<td class="tc" style="font-weight:700">'+wd+'j</td>'
        +'<td class="tr"><button class="lb" style="margin-right:10px" data-act="el" data-id="'+l.id+'">Modifier</button>'
        +'<button class="lr" data-act="dl" data-id="'+l.id+'">Suppr.</button></td>'
        +'</tr>';
    }).join('');
    var totCP=0,totAr=0;
    fil.forEach(function(l){
      var effS=l.s>fyS?l.s:fyS;
      var effE=l.e<fyE?l.e:fyE;
      var wd=wDays(effS,effE,H);
      if(isArret(l.type))totAr+=wd;
      else if(l.type!=='Inter-contrat')totCP+=wd;
    });
    var tot=totCP+totAr;
    var totRow=fil.length
      ?'<tr style="background:#f8fafc;border-top:2px solid #e2e8f0">'
        +'<td colspan="3" style="font-weight:700;color:#0f172a">TOTAL '+curLbl()+'</td>'
        +'<td class="tc" style="font-weight:800;color:#0f172a;font-size:15px">'+tot+'j</td><td></td></tr>'

var _REC_COLORS={
  blue:{bg:'#eff6ff',fg:'#1e40af'},orange:{bg:'#fff7ed',fg:'#c2410c'},
  purple:{bg:'#ede9fe',fg:'#5b21b6'},teal:{bg:'#d1fae5',fg:'#065f46'},
  red:{bg:'#fee2e2',fg:'#b91c1c'},pink:{bg:'#fce7f3',fg:'#9d174d'}
};
function addRecStatus(){
  var lb=(document.getElementById('rec-st-new-lb')||{}).value||'';
  var col=(document.getElementById('rec-st-new-color')||{}).value||'blue';
  if(!lb.trim()){alert('Saisissez un nom de statut.');return;}
  var colors=_REC_COLORS[col]||_REC_COLORS.blue;
  var id='st_'+Date.now();
  REC_STATUS.push({id:id,lb:lb.trim(),bg:colors.bg,fg:colors.fg});
  if(S.settings)S.settings.recStatuses=REC_STATUS.slice();
  render();
}
function delRecStatus(id){
  if(REC_STATUS.length<=2){alert('Il faut au moins 2 statuts.');return;}
  if(!confirm('Supprimer ce statut ? Les candidats avec ce statut garderont l\'ancien statut.'))return;
  REC_STATUS=REC_STATUS.filter(function(s){return s.id!==id;});
  if(S.settings)S.settings.recStatuses=REC_STATUS.slice();
  render();
}
function saveSettings(){
  var cur=document.getElementById('set-currency');
  var fym=document.getElementById('set-fystart');
  var currencies={EUR:'\u20ac',USD:'$',GBP:'\u00a3',CHF:'CHF',CAD:'CA$',MAD:'DH'};
  var roleKeys=['super_admin','admin','gestionnaire','utilisateur','recruteur'];
  var labels={};
  roleKeys.forEach(function(k){var el=document.getElementById('rol-'+k);if(el&&el.value.trim())labels[k]=el.value.trim();});
  /* Lire les statuts actuels depuis les inputs */
  var newStatuses=REC_STATUS.map(function(s){
    var el=document.getElementById('rec-st-'+s.id);
    var lb=el&&el.value.trim()?el.value.trim():s.lb;
    return Object.assign({},s,{lb:lb});
  });
  S.settings.recStatuses=newStatuses;
  S.settings.recStatusLabels={}; /* déprécié — on utilise recStatuses désormais */
  applyRecStatuses();
  S.settings.currency=cur?cur.value:'EUR';
  S.settings.currencySymbol=currencies[S.settings.currency]||S.settings.currency;
  S.settings.fyStartMonth=fym?parseInt(fym.value):10;
  S.settings.roleLabels=labels;
  /* Sauvegarder en localStorage (cache local) */
  try{localStorage.setItem('esn_settings_'+SB_CID,JSON.stringify(S.settings));}catch(e){}
  rebuildQuarters(); /* Recalculer T1/T2/T3/T4 si le FY a changé */
  applyRecStatuses();
  var msg=document.getElementById('set-msg');
  if(msg){msg.style.display='block';msg.style.color='#94a3b8';msg.textContent='Enregistrement...';}
  /* Sauvegarder dans Supabase pour toute l\'entreprise */
  if(sb&&SB_CID){
    /* Ne jamais persister les flags modules dans le JSON modifiable :
       leur source de vérité est la table `companies` (back-office uniquement). */
    var _persist=Object.assign({},S.settings);
    delete _persist.hasBusinessModule;delete _persist.hasRecrutementModule;
    sb.from('company_settings').upsert({
      company_id:SB_CID,
      settings:_persist,
      updated_at:new Date().toISOString()
    },{onConflict:'company_id'}).then(function(r){
      if(msg){
        if(r.error){msg.style.color='#ef4444';msg.textContent='\u26a0 Erreur Supabase : '+r.error.message+' (sauvegard\u00e9 localement)';}
        else{msg.style.color='#16a34a';msg.textContent='\u2713 Param\u00e8tres enregistr\u00e9s pour toute l\'entreprise. Rechargez la page.';}
      }
    });
  }else{
    if(msg){msg.style.color='#16a34a';msg.textContent='\u2713 Enregistr\u00e9 localement (Supabase non connect\u00e9).';}
  }
}

function visibleOpps(){
  var all=S.bizOpps,me=S._userEmail||'';
  /* Super Admin : voit TOUTES les opportunités */
  if(S.role==='super_admin')return all;
  /* Admin : voit ses opps + celles de ses Gestionnaires + tout le dessous */
  if(S.role==='admin'){
    var myVpName=S.vpName||me;
    return all.filter(function(o){
      if(!o.owner_email)return true;
      if(o.owner_email===me)return true;
      if(o.owner_vp===myVpName)return true; /* Gestionnaires sous cet Admin */
      return false;
    });
  }
  /* Gestionnaire : ses opps + opps des Business Manager/Utilisateurs de son équipe */
  if(S.role==='gestionnaire'){
    var myTeamEmails=((S._all&&S._all.cons)||S.cons).map(function(c){return c.email||'';}).filter(Boolean);
    return all.filter(function(o){
      if(!o.owner_email)return true;
      if(o.owner_email===me)return true;
      if(myTeamEmails.indexOf(o.owner_email)>=0)return true;
      if(o.owner_dir===S.dirName)return true; /* Business Manager rattachés à ce Gestionnaire */
      return false;
    });
  }
  /* Business Manager / Utilisateur : uniquement leurs propres opportunités */
  return all.filter(function(o){return !o.owner_email||o.owner_email===me;});
}
function pendingBizApprovals(){
  if(S.role==='utilisateur')return [];
  if(S.role==='gestionnaire'){
    var myEmails=((S._all&&S._all.cons)||S.cons).map(function(c){return c.email||'';});
    return S.bizApprovals.filter(function(a){return a.status==='pending'&&myEmails.indexOf(a.submitted_by_email)>=0;});
  }
  return S.bizApprovals.filter(function(a){return a.status==='pending';});
}

/* Opportunité gagnée → créer mission */
function bizOppToMission(oppId){
  var o=S.bizOpps.find(function(x){return x.id===oppId;});
  if(!o){alert('Opportunité non trouvée.');return;}
  var acc=S.bizAccounts.find(function(x){return x.id===o.account_id;})||{};
  var isFor=o.btype==='forfait';
  var missions=[];
  var mName=o.name+(acc.name?'\u00a0\u2014 '+acc.name:'');
  var sd=o.date_start||new Date().toISOString().slice(0,10);

  if(isFor){
    /* Forfait : utiliser opp_team si disponible */
    var team=o.opp_team&&o.opp_team.length?o.opp_team
      :(o.consultant_ids||[]).map(function(cid){
        return {cid:cid,taux:Math.round(100/Math.max((o.consultant_ids||[]).length,1)),wdays:[1,2],tmar:25};
      });
    var allConsForCalc=S.cons.concat([]); /* ref locale pour calculs */
    team.filter(function(t){return t.cid;}).forEach(function(tm){
      var cons=S.cons.find(function(x){return x.id===tm.cid;})||{scr:0,name:'?'};
      /* Calcul automatique : poids = SCR × jours_staffing */
      var cons_for_weight=allConsForCalc.find(function(x){return x.id===tm.cid;})||{scr:1};
      var sdays=(tm.wdays&&tm.wdays.length?tm.wdays:[1,2]).length;
      var tmWeight=(cons_for_weight.scr||1)*sdays;
      var totalWeight=team.filter(function(t){return t.cid;}).reduce(function(s,t){
        var tc=allConsForCalc.find(function(x){return x.id===t.cid;})||{scr:1};
        return s+(tc.scr||1)*((t.wdays&&t.wdays.length?t.wdays:[1,2]).length);
      },0)||1;
      var dealPortion=(o.deal_amount||0)*tmWeight/totalWeight;
      var tmar=tm.tmar!=null?tm.tmar:25;
      var wdays=tm.wdays&&tm.wdays.length?tm.wdays:[1,2];
      /* TJM = SCR × 113.35 × 1.25 / (1 - marge) */
      var tjm=cons.scr>0?Math.round(cons.scr*113.35*1.25/(1-Math.min(tmar,99)/100)):0;
      var days=tjm>0?Math.round(dealPortion/tjm):0;
      missions.push({
        id:uid2(),name:mName,btype:'forfait',cid:tm.cid,cli:acc.name||'',
        tjm:tjm,deal:dealPortion,tmar:tmar,wdays:wdays,days:days,
        sd:sd,ed:null,notes:o.notes||''
      });
    });
  }else{
    /* AT */
    var cid1=(o.consultant_ids||[])[0]||null;
    missions.push({
      id:uid2(),name:mName,btype:'at',cid:cid1,cli:acc.name||'',
      tjm:o.tjm_cible||0,days:o.jours_estimes||0,deal:0,
      sd:sd,ed:o.date_end||null,notes:o.notes||''
    });
  }

  if(!missions.length){alert('Aucun consultant associé à cette opportunité. Ajoutez au moins un consultant avant de créer la mission.');return;}
  S.miss=S.miss.concat(missions);
  var firstId=missions[0].id;
  S.bizOpps=S.bizOpps.map(function(x){return x.id===oppId?Object.assign({},x,{linked_mission_id:firstId,status:'gagne'}):x;});
  sbUpsertOpp(S.bizOpps.find(function(x){return x.id===oppId;}));
  if(sb&&SB_CID){
    missions.forEach(function(m){
      sb.from('missions').insert({
        id:m.id,company_id:SB_CID,consultant_id:m.cid,
        name:m.name,client_name:m.cli,
        tjm:m.tjm||0,start_date:m.sd,end_date:m.ed||null,
        billing_type:m.btype||'at',deal_amount:m.deal||null,
        target_margin:m.tmar!=null?m.tmar:null,
        work_days:m.wdays||[1,2,3,4,5]
      }).then(function(r){if(r&&r.error)console.warn('Mission insert error:',r.error.message);});
    });
  }
  S.bizModal=null;S.tab='missions';
  alert(missions.length+' mission'+(missions.length>1?'s':'')+' créée'+(missions.length>1?'s':'')+' dans l\'onglet Missions.');
  render();
}

/* ── KPIs Business ── */
function tBizKpis(){
  var byStatus={};OPP_STATUS.forEach(function(s){byStatus[s.id]={count:0,ca:0};});
  S.bizOpps.forEach(function(o){if(byStatus[o.status]){byStatus[o.status].count++;byStatus[o.status].ca+=caPot(o);}});
  var total=S.bizOpps.length;
  var pipeline=S.bizOpps.filter(function(o){return o.status!=='gagne'&&o.status!=='perdu';});
  var won=S.bizOpps.filter(function(o){return o.status==='gagne';});
  var pipeline_pond=pipeline.reduce(function(s,o){return s+caPot(o)*(o.probability||0)/100;},0);

  var funnelHtml='<div class="card" style="padding:24px;margin-bottom:16px"><div style="font-size:13px;font-weight:800;color:#0f172a;margin-bottom:16px">Entonnoir de conversion</div>'
    +OPP_STATUS.map(function(s){
      var d=byStatus[s.id]||{count:0,ca:0};
      var pct=total>0?d.count/total*100:0;
      return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'
        +'<span style="font-weight:700">'+s.lb+'</span>'
        +'<span style="color:#64748b">'+d.count+' opp. · '+(d.ca>0?fEur(d.ca):'—')+'</span></div>'
        +'<div style="height:10px;background:#f1f5f9;border-radius:5px">'
        +'<div style="height:100%;width:'+pct.toFixed(0)+'%;background:'+s.fg+';border-radius:5px"></div></div>';
    }).join('')
    +'</div>';

  /* Top comptes par CA potentiel */
  var accCA={};S.bizOpps.forEach(function(o){accCA[o.account_id]=(accCA[o.account_id]||0)+caPot(o);});
  var topAcc=Object.keys(accCA).sort(function(a,b){return accCA[b]-accCA[a];}).slice(0,5);
  var topHtml=topAcc.length?'<div class="card" style="padding:24px"><div style="font-size:13px;font-weight:800;color:#0f172a;margin-bottom:14px">Top 5 comptes — CA potentiel</div>'
    +topAcc.map(function(aid,i){
      var name=accName(aid)||'Inconnu';
      return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
        +'<span style="font-size:11px;font-weight:700;color:#94a3b8;width:18px">#'+(i+1)+'</span>'
        +'<span style="flex:1;font-weight:600;color:#0f172a">'+esc(name)+'</span>'
        +'<span style="font-size:13px;font-weight:800;color:#1B2B3A">'+fEur(accCA[aid])+'</span></div>';
    }).join('')+'</div>':'';

  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
    +'<div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    +kbCard('Pipeline pondéré',fEur(pipeline_pond),'∑ CA × probabilité','#1B2B3A')
    +kbCard('Win Rate',total?Math.round(won.length/total*100)+'%':'—','Opportunités gagnées','#065f46')
    +kbCard('Durée moy. pipeline',pipeline.length?Math.round(pipeline.reduce(function(s,o){return s+(o.duree_mois||0);},0)/pipeline.length)+' mois':'—','','#5b21b6')
    +kbCard('CA gagné total',won.length?fEur(won.reduce(function(s,o){return s+caPot(o);},0)):'—','','#c2410c')
    +'</div>'+topHtml+'</div>'
    +'<div>'+funnelHtml+'</div></div>';
}

    var checks=S.cons.filter(function(c){return c.grade!=='sales_grade';}).map(function(cc){
      return '<label style="display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:12px;color:#334155;cursor:pointer;border-radius:5px">'
        +'<input type="checkbox" class="_oppck" data-v="'+cc.id+'"'+(selSet.has(cc.id)?' checked':'')+' style="accent-color:#84CC16">'+esc(cc.name)+'</label>';
    }).join('');
    return '<div id="opp-cons-chips" style="margin-bottom:8px">'+chips+'</div>'
      +'<div style="max-height:120px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:6px;background:#fff">'+checks+'</div>';
  }
  
  /* FORFAIT : builder avec staffing + marge par consultant */
  var allCons=S.cons.filter(function(c){return c.grade!=='sales_grade';});
  var rows=team.map(function(tm,idx){
    var wdSel=tm.wdays&&tm.wdays.length?tm.wdays:[1,2]; /* défaut lun+mar */
    var wdChks=['Lun','Mar','Mer','Jeu','Ven'].map(function(lb,di){
      var dv=di+1;
      return '<label style="display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer;white-space:nowrap">'
        +'<input type="checkbox" class="_oppwd" data-idx="'+idx+'" data-dv="'+dv+'"'+(wdSel.indexOf(dv)>=0?' checked':'')+' style="accent-color:#84CC16;width:13px;height:13px">'+lb+'</label>';
    }).join('');
    var consOpts='<option value="">— Consultant —</option>'+allCons.map(function(cc){
      return '<option value="'+cc.id+'"'+(cc.id===tm.cid?' selected':'')+'>'+esc(cc.name)+'</option>';
    }).join('')+'<option value="__new__">✚ Nouveau consultant...</option>';
    /* Calcul indicatif nb jours */
    var cons=allCons.find(function(x){return x.id===tm.cid;});
    var indDays='—';
    if(cons&&cons.scr>0&&S.bizModal&&S.bizModal.item){
      var deal=(S.bizModal.item.deal_amount||0)/Math.max(team.length,1); /* CA distribué par poids */
      if(deal>0&&tm.tmar>=0){
        var tjm=cons.scr*113.35*1.25/(1-Math.min(tm.tmar||25,99)/100);
        indDays=Math.round(deal/tjm)+'j';
      }
    }
    return '<div class="opp-team-row" data-idx="'+idx+'" style="border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#f8fafc">'
      +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
      +'<select class="ic" style="flex:2;min-width:140px;font-size:12px" onchange="oppTeamUpdate('+idx+',\'cid\',this.value)"><option value="">'+consOpts+'</select>'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:5px 8px">'+wdChks+'</div>'
      +'<div style="display:flex;align-items:center;gap:4px"><label style="font-size:11px;color:#64748b;white-space:nowrap">Marge</label>'
        +'<input class="ic" type="number" min="0" max="100" placeholder="%" style="width:60px;font-size:12px" value="'+(tm.tmar!=null?tm.tmar:25)+'" onchange="oppTeamUpdate('+idx+',\'tmar\',+this.value)"><span style="font-size:11px;color:#64748b">%</span></div>'
      +'<span style="font-size:11px;font-weight:700;color:#1B2B3A;background:#e2e8f0;padding:2px 8px;border-radius:99px;white-space:nowrap">'+indDays+'</span>'
      +'<button type="button" onclick="oppTeamRemove('+idx+')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-weight:700;font-size:13px">✕</button>'
      +'</div>'
      /* Mini-form nouveau consultant */
      +'<div id="opp-new-cons-'+idx+'" style="display:none;margin-top:10px;background:#f0fdf4;border-radius:6px;padding:10px;border:1px solid #bbf7d0">'
        +'<div style="font-size:11px;font-weight:700;color:#15803d;margin-bottom:8px">✚ Nouveau consultant</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr 100px;gap:8px">'
          +'<input class="ic" placeholder="Nom complet *" id="opp-nc-name-'+idx+'" style="font-size:12px">'
          +'<input class="ic" placeholder="Poste *" id="opp-nc-title-'+idx+'" style="font-size:12px">'
          +'<input class="ic" type="number" placeholder="SCR €" id="opp-nc-scr-'+idx+'" style="font-size:12px">'
        +'</div>'
        +'<div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end">'
          +'<button type="button" onclick="oppNewConsCancel('+idx+')" style="background:#f1f5f9;color:#374151;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px">Annuler</button>'
          +'<button type="button" onclick="oppNewConsSave('+idx+')" style="background:#15803d;color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700">Créer &amp; ajouter</button>'
        +'</div>'
      +'</div>'
      +'</div>';
  }).join('');

  return rows
    /* ── Synthèse par consultant ── */
    +(team.filter(function(t){return t.cid;}).length>0?(function(){
      var totalDeal=S.bizModal&&S.bizModal.item&&S.bizModal.item.deal_amount||0;
      var allC=S.cons;
      var teamActive=team.filter(function(t){return t.cid;});
      var weights=teamActive.map(function(tm){
        var cc=allC.find(function(x){return x.id===tm.cid;})||{scr:1,name:'?'};
        return (cc.scr||1)*((tm.wdays&&tm.wdays.length?tm.wdays:[1,2]).length);
      });
      var totalW=weights.reduce(function(s,w){return s+w;},0)||1;
      var lines=teamActive.map(function(tm,i){
        var cc=allC.find(function(x){return x.id===tm.cid;})||{scr:1,name:tm.cid};
        var pct=Math.round(weights[i]/totalW*100);
        var dealPortion=totalDeal*weights[i]/totalW;
        var tmar=tm.tmar!=null?tm.tmar:25;
        var tjm=cc.scr>0?Math.round(cc.scr*113.35*1.25/(1-Math.min(tmar,99)/100)):0;
        var days=tjm>0?Math.round(dealPortion/tjm):0;
        var wdayLabel=(tm.wdays&&tm.wdays.length?tm.wdays:[1,2]).map(function(d){return['Lun','Mar','Mer','Jeu','Ven'][d-1];}).join('+');
        return '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;background:'+(i%2===0?'#f0fdf4':'#eff6ff')+';font-size:12px">'
          +'<span style="font-weight:700;color:#0f172a;flex:1">'+esc(cc.name)+'</span>'
          +'<span style="background:#1B2B3A;color:#84CC16;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:800">'+pct+'% du deal</span>'
          +(totalDeal>0?'<span style="color:#64748b">'+fEur(Math.round(dealPortion))+'</span>':'')
          +'<span style="color:#64748b">'+days+'j</span>'
          +'<span style="color:#94a3b8;font-size:11px">'+wdayLabel+'</span>'
          +'</div>';
      }).join('');
      return '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:10px">'
        +'<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Synthèse</div>'
        +lines+'</div>';
    }()):'')
    +'<div style="display:flex;gap:8px;margin-top:6px">'
    +'<button type="button" onclick="oppTeamAdd()" style="background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700">+ Ajouter un membre</button>'
    +'</div>';
}

function oppTeamUpdate(idx,key,val){
  if(!S.bizModal)return;
  S.bizModal.oppTeam=S.bizModal.oppTeam||[];
  if(!S.bizModal.oppTeam[idx])return;
  /* Si "nouveau consultant" sélectionné : montrer le mini-form */
  if(key==='cid'&&val==='__new__'){
    S.bizModal.oppTeam[idx].cid='';
    var nf=document.getElementById('opp-new-cons-'+idx);
    if(nf)nf.style.display='block';
    return;
  }
  S.bizModal.oppTeam[idx][key]=val;
  oppConsRefresh();
}
function oppTeamAdd(){
  if(!S.bizModal)return;
  S.bizModal.oppTeam=S.bizModal.oppTeam||[];
  S.bizModal.oppTeam.push({cid:'',wdays:[1,2],tmar:25});
  oppConsRefresh();
}
function oppTeamRemove(idx){
  if(!S.bizModal)return;
  S.bizModal.oppTeam=(S.bizModal.oppTeam||[]).filter(function(_,i){return i!==idx;});
  oppConsRefresh();
}
function oppNewConsCancel(idx){
  var nf=document.getElementById('opp-new-cons-'+idx);if(nf)nf.style.display='none';
}
function oppNewConsSave(idx){
  var nameEl=document.getElementById('opp-nc-name-'+idx);
  var titleEl=document.getElementById('opp-nc-title-'+idx);
  var scrEl=document.getElementById('opp-nc-scr-'+idx);
  var n=nameEl&&nameEl.value.trim();var t=titleEl&&titleEl.value.trim();var scr=+(scrEl&&scrEl.value)||0;
  if(!n||!t){alert('Nom et poste requis.');return;}
  var newC={id:uid(),name:n,title:t,scr:scr,email:'',dir:S.dirName||'',arrive:null,depart:null,expertise:[],sectors:[],contract:'salarie',grade:''};
  S.cons=S.cons.concat([newC]);
  sbUpsertCons(newC);
  if(S.bizModal&&S.bizModal.oppTeam&&S.bizModal.oppTeam[idx]){S.bizModal.oppTeam[idx].cid=newC.id;}
  oppConsRefresh();
}

function oppConsRefresh(){var w=document.getElementById('opp-cons-wrap');if(w){w.innerHTML=oppConsPickerHTML();bindOppConsPicker();}}
function bindOppConsPicker(){
  var wrap=document.getElementById('opp-cons-wrap');if(!wrap)return;
  wrap.onclick=function(e){
    var chip=e.target.closest('._opp-chip');
    if(chip){var v=chip.getAttribute('data-rm');S.bizModal.consPickerSel=(S.bizModal.consPickerSel||[]).filter(function(x){return x!==v;});oppConsRefresh();}
  };
  wrap.onchange=function(e){
    if(e.target.classList.contains('_oppck')){
      var v=e.target.getAttribute('data-v');
      S.bizModal.consPickerSel=S.bizModal.consPickerSel||[];
      if(e.target.checked){if(S.bizModal.consPickerSel.indexOf(v)<0)S.bizModal.consPickerSel.push(v);}
      else{S.bizModal.consPickerSel=S.bizModal.consPickerSel.filter(function(x){return x!==v;});}
      oppConsRefresh();
    }
    if(e.target.classList.contains('_oppwd')){
      var idx2=+e.target.getAttribute('data-idx');
      var dv=+e.target.getAttribute('data-dv');
      if(!S.bizModal.oppTeam[idx2])return;
      S.bizModal.oppTeam[idx2].wdays=S.bizModal.oppTeam[idx2].wdays||[1,2];
      if(e.target.checked){if(S.bizModal.oppTeam[idx2].wdays.indexOf(dv)<0)S.bizModal.oppTeam[idx2].wdays.push(dv);}
      else{S.bizModal.oppTeam[idx2].wdays=S.bizModal.oppTeam[idx2].wdays.filter(function(x){return x!==dv;});}
      S.bizModal.oppTeam[idx2].wdays.sort();
      oppConsRefresh();
    }
  };
}

      +'</div>';

    saveAction='bizSaveAct()';
    var tpOpts=ACT_TYPES.map(function(t){return '<option value="'+t.id+'"'+(it.type===t.id?' selected':(!it.id&&t.id==='appel'?' selected':''))+'>'+t.lb+'</option>';}).join('');

      +'</div>';
  }

  return '<div class="mov"><div class="mob" style="max-width:680px">'
    +'<div class="moh"><div class="mot">'+title+'</div>'
    +'<button class="moc" onclick="S.bizModal=null;render()">✕</button></div>'
    +'<div class="mody" style="padding:20px">'+body
    +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">'
    +'<button class="bsec" onclick="S.bizModal=null;render()">Annuler</button>'
    +'<button class="bp" onclick="'+saveAction+'">Enregistrer</button>'
    +'</div></div></div></div>';
}

function logActivity(action,entityType,entityId,details){
  if(!S.activityLog)S.activityLog=[];
  var entry={id:uid(),user_email:S._userEmail||'',user_name:(S.profileFirstName||'')+(S.profileLastName?' '+S.profileLastName:''),user_role:rLabel(S.role||''),action:action,entity_type:entityType||'',entity_id:entityId||'',details:details||'',created_at:new Date().toISOString()};
  S.activityLog.unshift(entry);
  if(S.activityLog.length>200)S.activityLog.pop();
  if(sb&&SB_CID){sb.from('activity_logs').insert(Object.assign({},entry,{company_id:SB_CID})).then(function(){});}
}
async function loadActivityLog(){
  if(!S.activityLog)S.activityLog=[];
  if(!sb||!SB_CID)return;
  try{var r=await sb.from('activity_logs').select('*').eq('company_id',SB_CID).order('created_at',{ascending:false}).limit(100);if(r.data)S.activityLog=r.data;}catch(e){console.warn('activity_log:',e);}
}
function markOnboardingDone(){localStorage.setItem('konsilys_ob_'+S._userEmail,'1');S.modal=null;render();}
function restartOnboarding(){localStorage.removeItem('konsilys_ob_'+S._userEmail);S.modal={type:'onboarding',step:0};render();}
function checkOnboarding(){var key='konsilys_ob_'+S._userEmail;if(!S._userEmail||localStorage.getItem(key))return;S.modal={type:'onboarding',step:0};render();}

function tParam(){
  var ks=buildKS();
  var totR=ks.reduce(function(s,x){return s+x.k.rev;},0);
  var totBill=ks.reduce(function(s,x){return s+x.k.bill;},0);
  var _aktWD=ks.reduce(function(s,x){return s+(x.k.tWD||0);},0);
  var avgSr=_aktWD>0?ks.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/_aktWD:0;
  var avgTJMv=totBill>0?totR/totBill:0;
  var _fyTWD=wDays(fyStart(S.year),fyEnd(S.year),H);
  var netC=totR-(_fyTWD>0?ks.reduce(function(s,x){return s+(x.c.contract==='freelance'?x.c.scr*x.k.bill:x.c.scr*SCR_FACTOR*EMPLOYER_FACTOR*(x.k.tWD/_fyTWD));},0):0);

  var context='<div class="card" style="padding:20px;margin-bottom:20px">'
    +'<div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:14px">\uD83D\uDCCC Situation actuelle - '+fyLbl(S.year)+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">'
    +[['Staffing moyen',avgSr.toFixed(1)+'%'],['CA total',fEur(totR)],['TJM moyen',avgTJMv>0?fEur(Math.round(avgTJMv)):'\u2014'],['Contribution nette',fEur(netC)]].map(function(x){
      return '<div style="text-align:center;padding:12px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:16px;font-weight:800;color:#0f172a">'+x[1]+'</div>'
        +'<div style="font-size:11px;color:#64748b;margin-top:2px">'+x[0]+'</div></div>';
    }).join('')+'</div></div>';

  var goals=[
    {id:'ca',  icon:'\uD83D\uDCB6', title:'Augmenter le Chiffre d\'Affaires',       sub:'Maximiser les revenus de votre équipe de conseil'},
    {id:'util',icon:'\uD83D\uDCCA', title:'Améliorer le Taux d\'Utilisation',        sub:'Optimiser le staffing et réduire les jours non facturés'},
    {id:'tjm', icon:'\uD83D\uDCC8', title:'Augmenter le TJM Moyen',                  sub:'Améliorer les tarifs et la marge de votre équipe'}
  ];

  var sections=goals.map(function(g){
    var recs=S.precs&&S.precs[g.id];
    var recHtml=recs?recs.map(function(r,i){
      return '<div class="rec-card">'
        +'<div class="rec-title">'+esc((i+1)+'. '+r.title)+'</div>'
        +'<div class="rec-detail">'+esc(r.detail)+'</div></div>';
    }).join(''):'<div style="font-size:12px;color:#94a3b8;font-style:italic;padding:8px 0">Cliquez sur \u00ab\u00a0G\u00e9n\u00e9rer\u00a0\u00bb pour obtenir des pr\u00e9conisations personnalis\u00e9es bas\u00e9es sur vos donn\u00e9es '+fyLbl(S.year)+'.</div>';
    return '<div class="goal-card"><div class="goal-header">'
      +'<div class="goal-icon">'+g.icon+'</div>'
      +'<div style="flex:1"><div class="goal-title">'+esc(g.title)+'</div><div class="goal-sub">'+esc(g.sub)+'</div></div>'
      +'<button class="bp" style="flex-shrink:0" data-act="gen-'+g.id+'">\u26A1 Générer les préconisations</button>'
      +'</div>'+recHtml+'</div>';
  }).join('');

  return '<div class="vw">'
    +'<div><div class="pt">Param\u00e9trage & Pr\u00e9conisations</div>'
    +'<div class="ps">Analyse intelligente de vos donn\u00e9es '+fyLbl(S.year)+' pour vous aider \u00e0 atteindre vos objectifs</div></div>'
    +context+sections+'</div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - MODAL
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tActivite(){
  if(!S.cons.length)return '<div class="emp">Aucun consultant.</div>';
  if(!S.actCid||!S.cons.find(function(c){return c.id===S.actCid;}))S.actCid=S.cons[0].id;
  if(!S.actMonth)S.actMonth=TODAY.slice(0,7);
  var cid=S.actCid,c=S.cons.find(function(x){return x.id===cid;});
  var ym=S.actMonth.split('-'),year=+ym[0],mon=+ym[1];
  var hset=frHols(year);
  var Hy=fyHols(S.year);
  var _r=curRange(S.year);var rS=_r[0],rE=_r[1];
  var period=curLbl();

  /* ── Stats sur la période sélectionnée (FY ou trimestre) ── */
  var kc=kpi(c,S.miss,S.lvs,S.year,Hy,_r);

  /* Jours intercontrat sur la période = jours ouvrés sans mission ET sans congé
     (même logique que le planning : "Disponible" = ni mission ni congé enregistré) */
  var icDays=0;
  (function(){
    var d=rS;
    while(d<=rE){
      if(isWD(d,Hy)){
        var pres=true;
        if(c.arrive&&d<c.arrive)pres=false;
        if(c.depart&&d>c.depart)pres=false;
        if(pres&&!leaveOnDay(cid,d)&&!missOnDay(cid,d))icDays++;
      }
      d=nxt(d);
    }
  }());

  /* Jours congés/arrêts sur la période (hors Inter-contrat) */
  var lvCp=S.lvs.filter(function(l){return l.cid===cid&&l.type!=='Inter-contrat'&&l.type!=='Mission interne'&&l.e>=rS&&l.s<=rE;});
  var cpDays=lvCp.reduce(function(s,l){return s+wDays(l.s>rS?l.s:rS,l.e<rE?l.e:rE,Hy);},0);

  /* Jours mission interne */
  var lvInt=S.lvs.filter(function(l){return l.cid===cid&&l.type==='Mission interne'&&l.e>=rS&&l.s<=rE;});
  var intDays=lvInt.reduce(function(s,l){return s+wDays(l.s>rS?l.s:rS,l.e<rE?l.e:rE,Hy);},0);

  /* Marge sur les missions de la période */
  var marg=kc.om!=null?kc.om.toFixed(1)+'%':'\u2014';

  function statCard(label,val,sub,col){
    return '<div style="background:#f8fafc;border-radius:10px;padding:14px 16px;border:1px solid #e2e8f0">'
      +'<div style="font-size:22px;font-weight:800;color:'+(col||'#0f172a')+'">'+val+'</div>'
      +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:3px">'+label+'</div>'
      +(sub?'<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+sub+'</div>':'')
      +'</div>';
  }

  var statsGrid='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">'
    +statCard('Jours facturés', kc.bill+'j', period, '#2563eb')
    +statCard('Jours internes', intDays+'j', 'non facturés', '#0f766e')
    +statCard('Congés &amp; arrêts', cpDays+'j', period, '#b45309')
    +statCard('Inter-contrat', icDays+'j', period, icDays>0?'#b91c1c':'#15803d')
    +statCard('Staffing', kc.sr.toFixed(0)+'%', 'marge : '+marg, kc.sr>=75?'#15803d':kc.sr>=50?'#b45309':'#b91c1c')
    +'</div>';

  /* ── Calendrier mensuel ── */
  var firstDow=(new Date(year,mon-1,1).getDay()+6)%7;
  var dim=new Date(year,mon,0).getDate();
  var MNAMES=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  var consSortedM=S.cons.slice().sort(function(a,b){if(a.id===S.consId)return -1;if(b.id===S.consId)return 1;return 0;});
  var co=consSortedM.map(function(x){var lbl=(x.id===S.consId)?('\u2605 Moi \u2014 '+x.name):x.name;return '<option value="'+x.id+'"'+(x.id===cid?' selected':'')+'>'+esc(lbl)+'</option>';}).join('');
  var cells='',billed=0,leaveD=0,internD=0;
  for(var i=0;i<firstDow;i++)cells+='<div style="background:#f8fafc;border-radius:8px;min-height:62px"></div>';
  for(var d=1;d<=dim;d++){
    var ds=fD(new Date(year,mon-1,d));
    var we=isWE(ds),hol=hset.has(ds);
    var bg='#fff',bd='#e2e8f0',main='',sub='',txt='#0f172a',clk=false;
    if(we||hol){bg='#f8fafc';bd='#eef2f7';main=hol?'Férié':'';txt='#cbd5e1';}
    else{
      var lv=leaveOnDay(cid,ds);
      if(lv){
        var intern=(lv.type==='Mission interne'||lv.type==='Inter-contrat');
        bg=intern?'#f0fdfa':'#fffbeb';bd=intern?'#99f6e4':'#fde68a';
        main=lv.type;sub=intern?'Non facturé':'Absence';clk=true;
        if(intern)internD++;else leaveD++;
      }else{
        var mm=missOnDay(cid,ds);
        if(mm){bg='#eff6ff';bd='#bfdbfe';main=mm.client||mm.cli;sub=mm.name;billed++;clk=true;}
        else{main='Disponible';txt='#94a3b8';clk=true;}
      }
    }
    var isToday=(ds===TODAY);
    var style='background:'+bg+';border:'+(isToday?'2px solid #2563eb':'1px solid '+bd)+';border-radius:8px;min-height:62px;padding:5px 7px;overflow:hidden;'+(clk?'cursor:pointer':'');
    cells+='<div'+(clk?' data-act="day" data-day="'+ds+'"':'')+' style="'+style+'">'
      +'<div style="font-size:11px;font-weight:700;color:'+txt+'">'+d+'</div>'
      +(main?'<div style="font-size:10px;font-weight:600;color:#0f172a;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(main)+'</div>':'')
      +(sub?'<div style="font-size:9px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(sub)+'</div>':'')
      +'</div>';
  }
  var dows=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map(function(x){return '<div style="font-size:10px;font-weight:700;color:#94a3b8;text-align:center;text-transform:uppercase">'+x+'</div>';}).join('');
  var lg=function(b,bd2,t){return '<span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:'+b+';border:1px solid '+bd2+'"></span>'+t+'</span>';};

  return '<div class="vw">'
    +'<div class="ph"><div><div class="pt">Activit\u00e9 \u2014 '+esc(c.name)+'</div>'
    +'<div class="ps">Stats : '+period+' \u00b7 Planning : '+MNAMES[mon-1]+' '+year+'</div></div></div>'

    +'<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">'
    +'<select class="ic" style="max-width:240px" id="act-cid">'+co+'</select>'
    +'<div style="display:flex;align-items:center;gap:8px;margin-left:auto">'
    +'<button class="bg" data-act="act-prev" style="padding:6px 12px">\u2039</button>'
    +'<div style="font-weight:700;min-width:150px;text-align:center">'+MNAMES[mon-1]+' '+year+'</div>'
    +'<button class="bg" data-act="act-next" style="padding:6px 12px">\u203a</button>'
    +'<button class="bg" data-act="act-today" style="padding:6px 12px">Aujourd\u2019hui</button>'
    +'</div></div>'

    +statsGrid

    +'<div class="card" style="padding:16px">'
    +'<div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:10px">Planning \u2014 '+MNAMES[mon-1]+' '+year
    +'<span style="font-weight:400;color:#94a3b8;margin-left:10px">('+billed+'j facturés ce mois \u00b7 cliquez un jour pour le marquer)</span></div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">'+dows+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">'+cells+'</div>'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:11px;color:#64748b">'
    +lg('#eff6ff','#bfdbfe','Mission client')+lg('#fffbeb','#fde68a','Cong\u00e9/absence')+lg('#f0fdfa','#99f6e4','Interne (non factur\u00e9)')
    +'</div></div></div>';
}

function tRecrut(){
  /* Recruteur et Business Manager ont toujours accès ; les autres doivent avoir le module */
  /* Recruteur a toujours accès ; TOUS les autres (y compris Super Admin) ont besoin du module */
  if(S.role!=='recruteur'&&!(S.settings&&S.settings.hasRecrutementModule))return tRecrutementPaywall();
  if(S.recSel){
    var cand=S.cands.find(function(c){return c.id===S.recSel;});
    if(cand)return tCandDetail(cand);
    S.recSel=null;
  }

function recListBody(){
  var q=(S.recF.q||'').toLowerCase().trim();
  var stF=S.recF.status||'all';
  var locF=S.recF.loc||[];
  var recF=S.recF.rec||'all';
  /* Filtrage hiérarchique des candidats selon le rôle */
  var visibleCands=S.cands.filter(function(cd){
    if(S.role==='super_admin')return true; /* voit tout (si module payé) */
    if(S.role==='recruteur'){return !cd.recruiter||cd.recruiter===(S.profileFirstName+' '+(S.profileLastName||'')).trim()||cd.recruiter===S._userEmail;}
    if(S.role==='gestionnaire'){
      var myRecEmails=((S.recruteurInvites)||[]).map(function(r){return r.recruteur_name||r.email||'';});
      return !cd.recruiter||myRecEmails.indexOf(cd.recruiter)>=0||cd.recruiter===S.dirName;
    }
    return true; /* admin, sales, utilisateur voient tout si module payé */
  });
  var list=visibleCands.filter(function(c){
    if(stF!=='all'&&c.status!==stF)return false;
    if(locF.length&&!(c.locations||[]).some(function(l){return locF.indexOf(l)>=0;}))return false;
    if(recF!=='all'&&(c.recruiter||'')!==recF)return false;
    if(q){
      var hay=(c.name+' '+(c.expertise||[]).join(' ')+' '+(c.email||'')).toLowerCase();
      if(hay.indexOf(q)<0)return false;
    }
    return true;
  });

  var counts={};REC_STATUS.forEach(function(s){counts[s.id]=0;});
  S.cands.forEach(function(c){if(counts[c.status]!=null)counts[c.status]++;});

  function pill(id,label,count){
    var active=stF===id;
    return '<button data-act="recf-st" data-id="'+id+'" style="padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid '+(active?'#2563eb':'#e2e8f0')+';background:'+(active?'#2563eb':'#fff')+';color:'+(active?'#fff':'#475569')+';cursor:pointer;margin:0 6px 6px 0">'+esc(label)+' <span style="opacity:.65">'+count+'</span></button>';
  }
  var recList=(S.recruteurInvites||[]).filter(function(r){return r.recruteur_name||r.email;});
  function recPill(rec,label){
    var active=recF===rec;
    return '<button data-act="recf-rec" data-id="'+esc(rec)+'" style="padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid '+(active?'#84CC16':'#e2e8f0')+';background:'+(active?'#84CC16':'#fff')+';color:'+(active?'#1B2B3A':'#475569')+';cursor:pointer;margin:0 6px 6px 0">'+esc(label)+'</button>';
  }
  var recPills=recList.length?('<div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:10px 0 4px">Recruteur</div>'
    +recPill('all','Tous')
    +recList.map(function(r){return recPill(r.recruteur_name||r.email,r.recruteur_name||r.email);}).join('')):'';
  var pills='<div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:0 0 4px">Statut</div>'
    +pill('all','Tous',S.cands.length)+REC_STATUS.map(function(s){return pill(s.id,recStLbD(s.id),counts[s.id]);}).join('');

  var locCounts={};REC_LOCATIONS.forEach(function(l){locCounts[l]=0;});
  S.cands.forEach(function(c){(c.locations||[]).forEach(function(l){if(locCounts[l]!=null)locCounts[l]++;});});
  function locPill(loc){
    var active=locF.indexOf(loc)>=0;
    return '<button data-act="recf-loc" data-id="'+esc(loc)+'" style="padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid '+(active?'#7c3aed':'#e2e8f0')+';background:'+(active?'#7c3aed':'#fff')+';color:'+(active?'#fff':'#475569')+';cursor:pointer;margin:0 6px 6px 0">'+esc(loc)+' <span style="opacity:.65">'+locCounts[loc]+'</span></button>';
  }
  var locPills='<div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:10px 0 4px">Localisation'+(locF.length?' ('+locF.length+' sélectionnée'+(locF.length>1?'s':'')+')':'')+'</div>'
    +REC_LOCATIONS.map(locPill).join('');

  function tag(t){return '<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569;margin:0 4px 2px 0">'+esc(t)+'</span>';}

  var rows=list.map(function(c){
    var col=recStCol(c.status);
    var scr=recScr(c.reqSalary);
    var tjm=recTjm(c.reqSalary,c.marginPct);
    var exp=(c.expertise||[]);
    var expHtml=exp.slice(0,3).map(tag).join('')+(exp.length>3?'<span style="font-size:11px;color:#94a3b8">+'+(exp.length-3)+'</span>':'');
    var sec=(c.sectors||[]);
    var secHtml=sec.slice(0,2).map(tag).join('')+(sec.length>2?'<span style="font-size:11px;color:#94a3b8">+'+(sec.length-2)+'</span>':'');
    return '<tr data-act="recopen" data-id="'+c.id+'" style="cursor:pointer">'
      +'<td style="font-weight:700;color:#0f172a">'+esc(c.name)+'</td>'
      +'<td>'+(expHtml||'<span style="color:#cbd5e1">—</span>')+'</td>'
      +'<td>'+(secHtml||'<span style="color:#cbd5e1">—</span>')+'</td>'
      +'<td>'+esc((c.locations&&c.locations.length)?c.locations.join(', '):'—')+'</td>'
      +'<td>'+(c.availDate?fDt(c.availDate):'—')+'</td>'
      +'<td class="tr">'+(c.reqSalary?c.reqSalary.toLocaleString('fr-FR')+' €':'—')+'</td>'
      +'<td class="tr">'+(scr?scr.toFixed(0)+' €/j':'—')+'</td>'
      +'<td class="tr" style="font-weight:700;color:#2563eb">'+(tjm?tjm.toFixed(0)+' €/j':'—')+'</td>'
      +'<td><span style="padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:'+col[0]+';color:'+col[1]+'">'+esc(recStLbD(c.status))+'</span></td>'
      +'<td style="font-size:11px;color:#94a3b8">'+esc(c.createdBy?c.createdBy.split('@')[0]:'—')+'</td>'
      +'</tr>';
  }).join('');

  return '<div>'+pills+recPills+locPills+'</div>'
    +'<div class="card ov" style="margin-top:14px">'
    +'<table><thead><tr><th>Nom</th><th>Expertise</th><th>Secteurs</th><th>Localisation</th><th>Disponibilité</th><th class="tr">Rém. demandée</th><th class="tr">SCR/j</th><th class="tr">TJM revente</th><th>Statut</th><th>Ajouté par</th></tr></thead>'
    +'<tbody>'+rows+(rows?'':'<tr><td colspan="10" class="emp">Aucun candidat'+(q||stF!=='all'||locF.length?' ne correspond aux filtres.':' pour le moment. Cliquez « + Nouveau candidat » pour commencer.')+'</td></tr>')
    +'</tbody></table></div>';
}

/* ════════════════════════════════════════════════════════════
   WIDGET : sélection multiple (Expertises / Secteurs) + ajout libre
   Utilise la délégation d'événements (pas d'onclick inline avec
   valeurs dynamiques) pour éviter tout souci d'échappement de guillemets.
   ════════════════════════════════════════════════════════════ */
function expPickerHTML(){
  var sel=(S.modal&&S.modal.expSel)||[];
  var selSet=new Set(sel);
  var chips=sel.map(function(v){
    return '<span class="_tagchip" data-rm="'+esc(v)+'" style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;border-radius:99px;font-size:11px;font-weight:700;background:#dbeafe;color:#1e40af;margin:0 5px 5px 0;cursor:pointer">'+esc(v)+' <span style="font-weight:900;opacity:.65">\u00d7</span></span>';
  }).join('')||'<span style="font-size:12px;color:#94a3b8">Aucune expertise sélectionnée</span>';
  var checks=EXPERTISE_LIST.map(function(opt){
    var checked=selSet.has(opt);
    return '<label style="display:flex;align-items:center;gap:7px;padding:4px 6px;font-size:12px;color:#334155;cursor:pointer;border-radius:5px">'
      +'<input type="checkbox" class="_expck" data-v="'+esc(opt)+'"'+(checked?' checked':'')+' style="accent-color:#84CC16">'+esc(opt)+'</label>';
  }).join('');
  return '<div style="margin-bottom:8px">'+chips+'</div>'
    +'<div style="max-height:140px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:6px;background:#fff">'+checks+'</div>'
    +'<div style="display:flex;gap:6px;margin-top:8px">'
    +'<input class="ic" id="exp-custom" placeholder="Ajouter une expertise non listée..." style="flex:1">'
    +'<button type="button" class="bg" id="exp-addbtn">+ Ajouter</button></div>';
}
function expRefresh(){var w=document.getElementById('exp-wrap');if(w){w.innerHTML=expPickerHTML();bindExpWidget();}}
function bindExpWidget(){
  var wrap=document.getElementById('exp-wrap');
  if(!wrap)return;
  wrap.onclick=function(e){
    var chip=e.target.closest('._tagchip');
    if(chip){
      var v=chip.getAttribute('data-rm');
      S.modal.expSel=(S.modal.expSel||[]).filter(function(x){return x!==v;});
      expRefresh();
    }
  };
  wrap.onchange=function(e){
    if(e.target.classList.contains('_expck')){
      var v=e.target.getAttribute('data-v');
      var a=S.modal.expSel=S.modal.expSel||[];
      var i=a.indexOf(v);
      if(e.target.checked){if(i<0)a.push(v);}else if(i>=0)a.splice(i,1);
    }
  };
  var btn=document.getElementById('exp-addbtn');
  if(btn)btn.onclick=function(){
    var inp=document.getElementById('exp-custom');if(!inp)return;
    var v=inp.value.trim();if(!v)return;
    var a=S.modal.expSel=S.modal.expSel||[];
    if(a.indexOf(v)<0)a.push(v);
    inp.value='';expRefresh();
  };
}

function readMissTeam(){
  var wrap=document.getElementById('miss-team');
  if(!wrap)return null;
  var rows=wrap.querySelectorAll('.miss-team-row');
  var team=[];
  rows.forEach(function(row){
    var csel=row.querySelector('[data-team-cid]');
    var tinp=row.querySelector('[data-team-taux]');
    var cid=csel?csel.value:'';
    var taux=tinp?+tinp.value||100:100;
    if(cid)team.push({cid:cid,taux:taux});
  });
  return team;
}

  if(tp==='candidate'){
    title=it?'Modifier le candidat':'Nouveau candidat';wide=true;
    var stOpts=REC_STATUS.map(function(s){return '<option value="'+s.id+'"'+(it&&it.status===s.id?' selected':'')+'>'+esc(recStLbD(s.id))+'</option>';}).join('');
    var mar0=(it&&it.marginPct!=null)?it.marginPct:25;
    var sal0=it?(it.reqSalary||0):0;

  if(tp==='salary_detail'){

  if(tp==='leave'){
    title=it?"Modifier l'absence":"Nouvelle absence / cong\u00e9";
    var dt=(it&&it.type)||'Cong\u00e9 pay\u00e9';

    /* Admin / Gestionnaire : leur propre fiche remontée en tête + pré-sélectionnée */

    body='<div class="fd"><label class="fl">'+rLabel('utilisateur')+'</label><select class="ic" id="mlc">'+coLeave+'</select></div>'

  /* ── Modal code d’invitation consultant ── */

    body='<div style="text-align:center;padding:12px 0 8px">'

      +'<div id="inv-code-box" style="font-size:32px;font-weight:900;letter-spacing:6px;color:#2563eb;background:#eff6ff;padding:20px 28px;border-radius:12px;border:2px solid #bfdbfe;cursor:text;user-select:all">'+esc(m.code||'')+'</div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-top:10px">Cliquez sur le code pour le s\u00e9lectionner, puis Ctrl+C / Cmd+C pour copier.</div>'
      +'<div style="margin-top:16px;padding:12px 16px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#15803d;text-align:left">'
      +'\u2139\uFE0F Code \u00e0 usage unique. Le consultant le saisira sur la page de connexion pour cr\u00e9er son compte et \u00eatre rattach\u00e9 \u00e0 votre \u00e9quipe.'
      +'</div></div>'

      +'<button class="bp" onclick="var el=document.getElementById(\'inv-code-box\');if(el){var r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}">S\u00e9lectionner le code</button>'

  if(tp==='approval_sent'){

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RENDER
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function render(){
  var _scrollY=window.scrollY||0; /* sauvegarder position scroll */
  if(S._ks)S._ks._valid=false;
  if(!S.demo)saveLocal(); /* sauvegarde automatique — désactivée en mode démo */
  /* ═══ filtrage par rôle / directeur : on bascule sur la vue filtrée le temps du rendu ═══ */
  S._all={cons:S.cons,miss:S.miss,lvs:S.lvs};
  var _vis=visibleData();S.cons=_vis.cons;S.miss=_vis.miss;S.lvs=_vis.lvs;
  document.getElementById('sb').innerHTML=tSB();
  /* ── Contrôle d'accès central : chaque rôle a ses onglets autorisés ── */
  var _allowedTabs={
    super_admin:['kpis','dashboard','teams','recrutement','missions','planning','leaves','business','approvals','svp_acces','svp_settings','param','help','profile','kpis_dir'],
    admin:['kpis','dashboard','teams','recrutement','missions','planning','leaves','business','approvals','svp_acces','param','help','profile','kpis_dir'],
    gestionnaire:['kpis','dashboard','teams','recrutement','missions','planning','leaves','business','approvals','svp_acces','help','profile','kpis_dir'],
    utilisateur:['activite','missions','planning','leaves','approvals','business','help','profile'],
    recruteur:['recrutement','activite','leaves','help','profile'],
    sales:['business','activite','leaves','help','profile']
  };
  var _myTabs=_allowedTabs[S.role]||_allowedTabs.admin;
  if(_myTabs.indexOf(S.tab)<0){
    /* Onglet non autorisé pour ce rôle → rediriger vers son onglet d'accueil */
    S.tab=(S.role==='sales')?'business':(S.role==='recruteur')?'recrutement':(S.role==='utilisateur')?'activite':'kpis';
  }
  var v=S.tab==='dashboard'?tDash():S.tab==='teams'?tTeams():S.tab==='recrutement'?tRecrut():S.tab==='missions'?tMiss():S.tab==='planning'?tPlan():S.tab==='kpis'?tKPIs():S.tab==='leaves'?tLeaves():S.tab==='activite'?tActivite():S.tab==='directeurs'?tSVPAcces():S.tab==='approvals'?tApprovals():S.tab==='admin'?tAdmin():S.tab==='profile'?tProfile():S.tab==='kpis_dir'?tKPIsDirSection():S.tab==='svp_acces'?tSVPAcces():S.tab==='svp_settings'?tSettings():S.tab==='business'?tBusiness():S.tab==='help'?tHelp():tParam();
  var _ini=function(n){return n.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();};
  var _av=S._userEmail?_ini(S._userEmail.split('@')[0].replace(/[._]/g,' ')):'?';
  var _pfBtn=''; /* Profil déplacé dans la sidebar gauche */
  /* Bannière démo */
  var _demoBanner=S.demo
    ?'<div style="background:#7c3aed;color:#fff;text-align:center;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:16px;flex-shrink:0">'
    +'\uD83C\uDFAE MODE D\u00c9MO — donn\u00e9es fictives, aucune modification sauvegard\u00e9e'
    +'<a href="/login" style="color:#e9d5ff;font-size:12px;font-weight:600;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:6px;text-decoration:none">'
    +'Cr\u00e9er un compte \u2192</a></div>'
    :'';
  document.getElementById('mc').innerHTML=_demoBanner+'<div class="inn" style="position:relative">'+_pfBtn+v+'</div>';
  document.getElementById('md').innerHTML=tModal()+(S.bizModal?tBizModal():'');
  /* on restaure les données maîtres (les handlers de bind() mutent l'ensemble complet) */
  S.cons=S._all.cons;S.miss=S._all.miss;S.lvs=S._all.lvs;
  bind();
  window.scrollTo({top:_scrollY,behavior:'instant'}); /* restaurer scroll */
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   EVENT BINDING
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function bind(){
  var el=function(id){return document.getElementById(id);};
  var yr=el('yrs');if(yr)yr.onchange=function(){S.year=+this.value;H=fyHols(S.year);S.precs={};render();};
  /* nav */
  var nbs=document.querySelectorAll('[data-nav]');
  for(var i=0;i<nbs.length;i++){(function(b){b.onclick=function(){
    var nv=b.getAttribute('data-nav');
    if(nv==='recrutement'){S.recSel=null;S.recAddMeet=false;S.recAddCgi=false;S.recAddCv=false;S.recEditMeetId=null;S.recEditCgiId=null;}
    S.tab=nv;
    /* Rafraîchir les données en temps réel sur les onglets sensibles */
    if(nv==='admin'){loadConsInvites().then(function(){render();});}
    else if(nv==='svp_acces'){loadSVPInvites().then(function(){render();});}
    else if(nv==='dashboard'&&S.role==='gestionnaire'){loadApprovals().then(function(){render();});}
    else{render();}
  };})(nbs[i]);}
  /* filters */
  var fc=el('fmc');if(fc)fc.onchange=function(){S.fmc=this.value;render();};
  var fs=el('fms');if(fs)fs.onchange=function(){S.fms=this.value;render();};
  var ftf=el('fmt');if(ftf)ftf.onchange=function(){S.fmt=this.value;render();};
  var acc=el('act-cid');if(acc)acc.onchange=function(){S.actCid=this.value;render();};
  var lc=el('flc');if(lc)lc.onchange=function(){S.flc=this.value;render();};
  var rq=el('recq');
  if(rq){
    rq.oninput=function(){
      S.recF.q=this.value;
      recListRefresh(); /* met à jour uniquement la liste — l'input n\'est jamais recréé, le focus reste intact */
    };
  }
  /* délégation : les clics sur les pastilles de statut/localisation (recréées à chaque recListRefresh)
     sont capturés sur le conteneur stable, qui lui n\'est jamais détruit pendant la frappe */
  var rlw=el('rec-list-wrap');
  if(rlw){
    rlw.onclick=function(e){
      var t=e.target.closest('[data-act]');
      if(!t)return;
      var ra=t.getAttribute('data-act'),rid=t.getAttribute('data-id');
      if(ra==='recf-st'){S.recF.status=rid;recListRefresh();}
      else if(ra==='recf-rec'){S.recF.rec=rid;recListRefresh();}
      /* ── CRM Business handlers ── */
      else if(ra==='biz-new'){
        var types={pipeline:'opp',comptes:'acc',contacts:'ct',activites:'act'};
        var t=types[S.bizTab||'pipeline']||'opp';
        S.bizModal={type:t,item:null,btype:'at',consPickerSel:[],oppTeam:[{cid:'',taux:100,wdays:[1,2],tmar:25}]};render();
      }
      else if(ra==='biz-edit-acc'){var a=S.bizAccounts.find(function(x){return x.id===rid;});S.bizModal={type:'acc',item:a};render();}
      else if(ra==='biz-edit-ct'){var c=S.bizContacts.find(function(x){return x.id===rid;});S.bizModal={type:'ct',item:c};render();}
