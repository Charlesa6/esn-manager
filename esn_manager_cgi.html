  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   DATE UTILITIES
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function pD(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function fD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nxt(s){var d=pD(s);d.setDate(d.getDate()+1);return fD(d);}
function addD(s,n){var d=pD(s);d.setDate(d.getDate()+n);return fD(d);}
function isWE(s){var w=pD(s).getDay();return w===0||w===6;}
function isWD(s,H){return !isWE(s)&&!H.has(s);}
function wDays(a,b,H){var n=0,c=a;while(c<=b){if(isWD(c,H))n++;c=nxt(c);}return n;}
function lvSet(cid,lvs,H,ys,ye){
  var S=new Set();
  lvs.filter(function(l){return l.cid===cid;}).forEach(function(l){
    var c=l.s<ys?ys:l.s,e=l.e>ye?ye:l.e;
    while(c<=e){if(isWD(c,H))S.add(c);c=nxt(c);}
  });
  return S;
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   FRENCH HOLIDAYS (Easter - Meeus/Jones/Butcher)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function easter(y){
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4;
  var f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
  var h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
  var l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  var mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  return fD(new Date(y,mo-1,dy));
}
function frHols(y){
  var e=easter(y);
  return new Set([y+'-01-01',addD(e,1),y+'-05-01',y+'-05-08',addD(e,39),addD(e,50),y+'-07-14',y+'-08-15',y+'-11-01',y+'-11-11',y+'-12-25']);
}
var HOLS_N=['Jour de l\u2019An','Lundi de P\u00e2ques','F\u00eate du Travail','Victoire 1945','Ascension','Lundi de Pentec\u00f4te','F\u00eate Nationale','Assomption','Toussaint','Armistice','No\u00ebl'];

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   FISCAL YEAR  (1 oct \u2192 30 sept)
   FY26 = 1 oct 2025 \u2192 30 sept 2026
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function fyStart(fy){return (fy-1)+'-10-01';}
function fyEnd(fy){return fy+'-09-30';}
function fyHols(fy){
  var h1=frHols(fy-1),h2=frHols(fy),c=new Set();
  h1.forEach(function(d){c.add(d);});
  h2.forEach(function(d){c.add(d);});
  return c;
}
function currentFY(){var d=new Date(),m=d.getMonth();return m>=9?d.getFullYear()+1:d.getFullYear();}
var CFY=currentFY();
var TODAY=(function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}());
function fyLbl(fy){return 'FY'+String(fy).slice(2);}
function fyRange(fy){return 'oct. '+(fy-1)+' \u2192 sept. '+fy;}

/* \u2550\u2550\u2550 TRIMESTRES FISCAUX : Q1=Oct-D\u00e9c, Q2=Janv-Mars, Q3=Avr-Juin, Q4=Juil-Sept \u2550\u2550\u2550 */
var QUARTERS=[
  {id:1,lb:'T1',months:[10,11,12]},
  {id:2,lb:'T2',months:[1,2,3]},
  {id:3,lb:'T3',months:[4,5,6]},
  {id:4,lb:'T4',months:[7,8,9]}
];
var MOIS_ABR=['','Janv','F\u00e9vr','Mars','Avr','Mai','Juin','Juil','Ao\u00fbt','Sept','Oct','Nov','D\u00e9c'];
var LTYPES=['Cong\u00e9 pay\u00e9','RTT','Formation','Inter-contrat','Maladie','Cong\u00e9 maternit\u00e9','Cong\u00e9 sans solde','Mission interne','Autre'];
QUARTERS.forEach(function(q){q.lbFull=q.lb+' ('+MOIS_ABR[q.months[0]]+'-'+MOIS_ABR[q.months[2]]+')';});

/* Bornes ISO d'un trimestre donn\u00e9 \u00e0 l'int\u00e9rieur d'un exercice fiscal fy */
function qRange(fy,q){
  var qd=QUARTERS.find(function(x){return x.id===q;});
  if(!qd)return [fyStart(fy),fyEnd(fy)];
  var firstM=qd.months[0],lastM=qd.months[2];
  var firstY=firstM>=10?fy-1:fy;
  var lastY=lastM>=10?fy-1:fy;
  var lastDay=new Date(lastY,lastM,0).getDate();
  var s=firstY+'-'+String(firstM).padStart(2,'0')+'-01';
  var e=lastY+'-'+String(lastM).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');
  return [s,e];
}
/* P\u00e9riode actuellement s\u00e9lectionn\u00e9e dans la barre lat\u00e9rale : ann\u00e9e enti\u00e8re si S.quarter est null,
   sinon born\u00e9e au trimestre choisi. Utilis\u00e9e par Dashboard / KPIs / Absences. */
function curRange(fy){return S.quarter?qRange(fy,S.quarter):[fyStart(fy),fyEnd(fy)];}
function curRangeLbl(){return S.quarter?(QUARTERS.find(function(q){return q.id===S.quarter;})||{}).lbFull||'':'';}

/* Liste des mois \u00e0 afficher selon la s\u00e9lection courante (ann\u00e9e enti\u00e8re ou trimestre) */
function fEur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);}
function fDt(s){return s?pD(s).toLocaleDateString('fr-FR'):'Sans \u00e9ch\u00e9ance';}
function uid(){return Math.random().toString(36).slice(2,9);}
function fromT(n){var d=new Date();d.setDate(d.getDate()+n);return fD(d);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function dL(e){if(!e)return null;return Math.round((pD(e)-pD(TODAY))/86400000);}
function mSt(m){
  if(m.sd>TODAY)return'future';
  if(!m.ed)return'active';
  var d=dL(m.ed);
  if(d<0)return'ended';if(d<=14)return'critical';if(d<=30)return'soon';return'active';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   KPI - MARGE = (TJM \u2212 SCR) / TJM × 100
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function kpi(c,miss,lvs,y,H,rangeOverride){
  var ys,ye;
  if(rangeOverride){ys=rangeOverride[0];ye=rangeOverride[1];}
  else{ys=fyStart(y);ye=fyEnd(y);}
  /* Borner sur la période d'activité réelle du consultant dans le FY */
  var cs=(c.arrive&&c.arrive>ys)?c.arrive:ys;
  var ce=(c.depart&&c.depart<ye)?c.depart:ye;
  var tWD=cs<=ce?wDays(cs,ce,H):0;
  var lds=lvSet(c.id,lvs,H,cs,ce);
  var lvD=lds.size,avD=tWD-lvD,bill=0,rev=0;

  /* Toutes les absences comptent dans le staffing (sauf Inter-contrat) */
  var sickSet=new Set();
  lvs.filter(function(l){return l.cid===c.id&&l.type!=='Inter-contrat';}).forEach(function(l){
    var a=l.s<cs?cs:l.s,b=l.e>ce?ce:l.e;
    while(a<=b){if(isWD(a,H))sickSet.add(a);a=nxt(a);}
  });
  var sickD=sickSet.size;
  var pm=miss.filter(function(m){return m.cid===c.id;}).map(function(m){
    var mS=m.sd<cs?cs:m.sd,mE=(!m.ed||m.ed>ce)?ce:m.ed;
    if(mS>mE)return Object.assign({},m,{days:0,rev:0,mar:0});
    var d=0;
    if(m.wmode==='man'&&m.manualDays&&m.manualDays.length){
      /* Mode manuel : compter uniquement les jours explicitement sélectionnés */
      m.manualDays.forEach(function(day){
        if(day>=mS&&day<=mE&&!lds.has(day))d++;
      });
    }else{
      var wd=(m.wdays&&m.wdays.length)?m.wdays:[1,2,3,4,5];
      var cur=mS;
      while(cur<=mE){if(isWD(cur,H)&&!lds.has(cur)&&wd.indexOf(pD(cur).getDay())>=0)d++;cur=nxt(cur);}
    }
    var r,mar;
    if(m.btype==='forfait'){
      var deal=+m.deal||0;
      var totD=m.ed?missWD(m,m.sd,m.ed,lvs):0;          /* jours travaill\u00e9s sur toute la mission */
      r=(m.ed&&totD>0)?deal*(d/totD):(m.ed?0:deal);     /* CA au prorata des jours ; sans date de fin \u2192 deal entier */
      mar=r>0?(r-d*c.scr)/r*100:0;
    }else{
      r=d*m.tjm;
      mar=m.tjm>0?(m.tjm-c.scr)/m.tjm*100:0;
    }
    bill+=d;rev+=r;
    return Object.assign({},m,{days:d,rev:r,mar:mar});
  });
  var sr=tWD>0?(bill+sickD)/tWD*100:0,avgT=bill>0?rev/bill:0;
  var om=bill>0&&avgT>0?(avgT-c.scr)/avgT*100:null; /* \u2190 nouvelle formule */
  return{tWD:tWD,lvD:lvD,avD:avD,sickD:sickD,bill:bill,rev:rev,sr:sr,avgT:avgT,om:om,pm:pm,cs:cs,ce:ce};
}

/* \u2550\u2550\u2550 JOURS TRAVAILL\u00c9S sur une p\u00e9riode quelconque (jours coch\u00e9s, hors f\u00e9ri\u00e9s/cong\u00e9s) \u2550\u2550\u2550 */
function holRange(a,b){
  var sY=pD(a).getFullYear(),eY=pD(b).getFullYear(),HS=new Set();
  for(var y=sY-1;y<=eY;y++){frHols(y).forEach(function(d){HS.add(d);});}
  return HS;
}
function missWD(m,a,b,lvs){
  if(!a||!b||a>b)return 0;
  /* Mode manuel : compter uniquement les jours s\u00e9lectionn\u00e9s dans la plage a\u2192b */
  if(m.wmode==='man'&&m.manualDays&&m.manualDays.length){
    var HHm=holRange(a,b);
    var ldsm=lvSet(m.cid,lvs,HHm,a,b);
    return m.manualDays.filter(function(d){return d>=a&&d<=b&&!ldsm.has(d);}).length;
  }
  /* Mode r\u00e9current (d\u00e9faut) */
  var wd=(m.wdays&&m.wdays.length)?m.wdays:[1,2,3,4,5];
  var HH=holRange(a,b);
  var lds=lvSet(m.cid,lvs,HH,a,b);
  var n=0,c=a;
  while(c<=b){if(isWD(c,HH)&&!lds.has(c)&&wd.indexOf(pD(c).getDay())>=0)n++;c=nxt(c);}
  return n;
}
/* \u2550\u2550\u2550 FORFAIT : budget de jours (selon marge cible + SCR), jours travaill\u00e9s, jours restants \u2550\u2550\u2550 */
function forfaitInfo(m,scr,lvs){
  var deal=+m.deal||0,tmar=(m.tmar!=null&&m.tmar!=='')?+m.tmar:0;
  var budget=scr>0?deal*(1-tmar/100)/scr:0;
  var end=(m.ed&&m.ed<TODAY)?m.ed:TODAY;
  var worked=missWD(m,m.sd,end,lvs);
  var left=budget-worked;
  /* jours réellement disponibles d'ici la date de fin (capacité restante) */
  var startAvail=m.sd>TODAY?m.sd:TODAY;
  var avail=m.ed?missWD(m,startAvail,m.ed,lvs):null;
  var slack=(avail!=null)?avail-left:null;
  return{deal:deal,tmar:tmar,budget:budget,worked:worked,left:left,avail:avail,slack:slack};
}

/* ═══ ACTIVITÉ JOUR PAR JOUR ═══ */
function missOnDay(cid,day){
  return S.miss.find(function(m){
    if(m.cid!==cid||m.sd>day||(m.ed&&day>m.ed))return false;
    if(m.wmode==='man'&&m.manualDays&&m.manualDays.length)
      return m.manualDays.indexOf(day)>=0;
    var wd=(m.wdays&&m.wdays.length)?m.wdays:[1,2,3,4,5];
    return wd.indexOf(pD(day).getDay())>=0;
  });
}
function leaveOnDay(cid,day){
  return S.lvs.find(function(l){return l.cid===cid&&l.s<=day&&day<=l.e;});
}
function shiftMonth(ym,delta){
  var p=ym.split('-'),dd=new Date(+p[0],+p[1]-1+delta,1);
  return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0');
}

  var h=185,pad=32;
  var max=Math.max.apply(null,items.map(function(d){return d.v;}).concat([1]));
  var cw=100/n,bw=cw*0.55,trackH=h-pad-20;
  var bars=items.map(function(d,i){
    var bh=Math.max(2,d.v/max*trackH);
    var x=i*cw+cw*0.225,y=h-pad-bh;
    var fill=cfn?cfn(d.v):'#3b82f6';
    var lbl=unit==='%'?d.v.toFixed(0)+'%':unit==='k'?d.v.toFixed(1)+'k\u20ac':String(d.v);
    return '<rect x="'+x+'%" y="'+y+'" width="'+bw+'%" height="'+bh+'" fill="'+fill+'" rx="3"/>'
      +'<text x="'+(x+bw/2)+'%" y="'+(h-pad+13)+'" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui">'+esc(d.n)+'</text>'
      +'<text x="'+(x+bw/2)+'%" y="'+(y-4)+'" text-anchor="middle" font-size="10" fill="#374151" font-weight="600" font-family="system-ui">'+lbl+'</text>';
  }).join('');
  return '<svg width="100%" height="'+h+'" style="display:block;overflow:visible">'+bars+'</svg>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   HELPERS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function getAct(cid){
  return S.miss.find(function(m){var s=mSt(m);return m.cid===cid&&(s==='active'||s==='critical'||s==='soon');});
}
/* Consultant ayant quitté l'entreprise avant aujourd'hui */
function isGone(c){return !!(c.depart&&c.depart<TODAY);}
/* Absence active aujourd'hui (hors inter-contrat) */
function getActiveLv(cid){
  return S.lvs.find(function(l){
    return l.cid===cid&&l.type!=='Inter-contrat'&&l.s<=TODAY&&l.e>=TODAY;
  });
}
function buildKS(){var _rng=S.quarter?curRange(S.year):null;return S.cons.map(function(c){return{c:c,k:kpi(c,S.miss,S.lvs,S.year,H,_rng)};});}
function clientRev(ks){
  var map={};
  ks.forEach(function(x){x.k.pm.forEach(function(m){if(m.days>0){map[m.cli]=(map[m.cli]||0)+m.rev;}});});
  return Object.keys(map).map(function(k){return{name:k,rev:map[k]};}).sort(function(a,b){return b.rev-a.rev;});
}

/* ═══ PERMISSIONS / VUE FILTRÉE PAR DIRECTEUR ═══
   - role 'gestionnaire' : accès à tout, peut filtrer par un ou plusieurs directeurs (S.fdir)
   - role 'directeur'    : accès limité aux consultants de son équipe (c.dir === S.dirName)
   visibleData() renvoie le sous-ensemble cons/miss/lvs à afficher (les données maîtres
   restent dans S._all pour la sauvegarde et les mutations). */
function visibleConsIds(){
  var base=(S._all&&S._all.cons)||S.cons;
  if(S.role==='directeur'){base=base.filter(function(c){return (c.dir||'')===S.dirName;});}
  else if(S.role==='consultant'){base=base.filter(function(c){return c.id===S.consId;});}
  else if(S.fdir&&S.fdir.length){base=base.filter(function(c){return S.fdir.indexOf(c.dir||'')>=0;});}
  var s={};base.forEach(function(c){s[c.id]=1;});return s;
}
function visibleData(){
  var ids=visibleConsIds(),src=S._all||{cons:S.cons,miss:S.miss,lvs:S.lvs};
  return{
    cons:src.cons.filter(function(c){return ids[c.id];}),
    miss:src.miss.filter(function(m){return ids[m.cid];}),
    lvs:src.lvs.filter(function(l){return ids[l.cid];})
  };
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RECOMMENDATIONS ENGINE
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function genRecs(goal){
  var ks=buildKS();
  var totR=ks.reduce(function(s,x){return s+x.k.rev;},0);
  var totBill=ks.reduce(function(s,x){return s+x.k.bill;},0);
  var _aktWD=ks.reduce(function(s,x){return s+(x.k.tWD||0);},0);
  var avgSr=_aktWD>0?ks.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/_aktWD:0;
  var avgTJMv=totBill>0?totR/totBill:0;
  var cliArr=clientRev(ks);
  var recs=[];

  if(goal==='ca'){
    var noM=S.cons.filter(function(c){return !getAct(c.id)&&!isGone(c)&&!getActiveLv(c.id);});
    if(noM.length>0)recs.push({
      title:'Action urgente : staffer les consultants sans mission',
      detail:noM.map(function(c){return c.name;}).join(', ')+' ne sont pas en mission. Chaque jour factur\u00e9 g\u00e9n\u00e8re en moyenne '+fEur(Math.round(avgTJMv))+'. Lancez imm\u00e9diatement des appels d\u2019offres ou sollicitez vos clients existants pour un besoin compl\u00e9mentaire.'
    });
    var lowSr=ks.filter(function(x){return x.k.sr>0&&x.k.sr<75;}).sort(function(a,b){return a.k.sr-b.k.sr;});
    if(lowSr.length>0)recs.push({
      title:'R\u00e9duire les p\u00e9riodes inter-missions',
      detail:'Consultants sous 75\u00a0% de taux d\u2019utilisation\u00a0: '+lowSr.map(function(x){return x.c.name+' ('+x.k.sr.toFixed(0)+'%)';}).join(', ')+'. Chaque +10\u00a0% de staffing \u00e9quipe repr\u00e9sente environ '+fEur(Math.round(totBill*avgTJMv*0.10/Math.max(ks.length,1)))+' de CA suppl\u00e9mentaire par consultant.'
    });
    var lowTJM=ks.filter(function(x){return x.k.avgT>0&&x.k.avgT<avgTJMv*0.88;});
    if(lowTJM.length>0)recs.push({
      title:'Ren\u00e9gocier les TJM inf\u00e9rieurs \u00e0 la moyenne \u00e9quipe',
      detail:'TJM moyen \u00e9quipe\u00a0: '+fEur(Math.round(avgTJMv))+'/j. Consultants en dessous\u00a0: '+lowTJM.map(function(x){return x.c.name+' ('+fEur(Math.round(x.k.avgT))+'/j)';}).join(', ')+'. Une revalorisation de +50\u00a0\u20ac/j g\u00e9n\u00e8re '+fEur(Math.round(lowTJM.length*50*totBill/Math.max(ks.length,1)))+' de CA suppl\u00e9mentaire.'
    });
    if(cliArr.length>0&&cliArr[0].rev/Math.max(totR,1)>0.33)recs.push({
      title:'Diversifier le portefeuille\u00a0: trop de d\u00e9pendance sur '+cliArr[0].name,
      detail:cliArr[0].name+' repr\u00e9sente '+Math.round(cliArr[0].rev/Math.max(totR,1)*100)+'% du CA ('+fEur(cliArr[0].rev)+'). Au-dessus de 30\u00a0%, le risque est trop \u00e9lev\u00e9. Ciblez 2\u20133 nouvelles enseignes dans les secteurs Finance, \u00c9nergie ou Distribution.'
    });
    var end30=S.miss.filter(function(m){var s=mSt(m);return(s==='critical'||s==='soon')&&m.ed;});
    if(end30.length>0)recs.push({
      title:'S\u00e9curiser le renouvellement des missions en fin de vie',
      detail:end30.length+' mission(s) se terminent dans moins de 30\u00a0jours\u00a0: '+end30.map(function(m){return m.name+' chez '+m.cli+' (J\u2212'+dL(m.ed)+')';}).join(', ')+'. Engagez les discussions de prolongation maintenant - un renouvellement co\u00fbte 10\u00d7 moins cher qu\u2019un nouveau client.'
    });
    if(recs.length<5)recs.push({
      title:'Upsell\u00a0: \u00e9tendre le p\u00e9rim\u00e8tre chez vos clients actuels',
      detail:'Votre base de '+cliArr.length+' client(s) actif(s) est un levier sous-exploit\u00e9. Proposez des audits strat\u00e9giques, ateliers ou formations aux d\u00e9cideurs chez vos clients en mission. L\u2019upsell sur un client existant est 3\u00d7 plus rapide qu\u2019une vente \u00e0 un nouveau compte.'
    });
  }

  if(goal==='util'){
    var noM2=S.cons.filter(function(c){return !getAct(c.id)&&!isGone(c)&&!getActiveLv(c.id);});
    if(noM2.length>0)recs.push({
      title:'Priorit\u00e9 absolue\u00a0: '+noM2.length+' consultant(s) sans mission',
      detail:noM2.map(function(c){return c.name;}).join(', ')+' n\u2019ont aucune mission. Chaque semaine non factur\u00e9e repr\u00e9sente '+fEur(Math.round(avgTJMv*5))+' de CA perdu. D\u00e9clenchez des entretiens clients d\u00e8s cette semaine.'
    });
    var below80=ks.filter(function(x){return x.k.sr>0&&x.k.sr<80;}).sort(function(a,b){return a.k.sr-b.k.sr;});
    if(below80.length>0)recs.push({
      title:'Porter le taux d\u2019utilisation de tous au-dessus de 80\u00a0%',
      detail:'Consultants sous 80\u00a0%\u00a0: '+below80.map(function(x){return x.c.name+' ('+x.k.sr.toFixed(0)+'%)';}).join(', ')+'. 80\u00a0% est le seuil de rentabilit\u00e9 standard en ESN. Calculez les jours libres de chacun et positionnez-les en priorit\u00e9 sur vos comptes existants.'
    });
    var end30b=S.miss.filter(function(m){var s=mSt(m);return(s==='critical'||s==='soon')&&m.ed;});
    if(end30b.length>0)recs.push({
      title:'Lancer le staffing post-mission maintenant, pas \u00e0 J-0',
      detail:end30b.length+' mission(s) se terminent bient\u00f4t\u00a0: '+end30b.map(function(m){var c=S.cons.find(function(c){return c.id===m.cid;});return(c?c.name:'')+' chez '+m.cli+' (J\u2212'+dL(m.ed)+')';}).join(', ')+'. Objectif\u00a0: z\u00e9ro jour d\u2019inter-contrat. Le recasement doit \u00eatre confirm\u00e9 avant la fin de la mission en cours.'
    });
    var highLv=ks.filter(function(x){return x.k.lvD>15;});
    if(highLv.length>0)recs.push({
      title:'Anticiper les absences longues pour pr\u00e9server le staffing',
      detail:'Consultants avec plus de 15\u00a0jours d\u2019absence sur l\u2019exercice\u00a0: '+highLv.map(function(x){return x.c.name+' ('+x.k.lvD+'j)';}).join(', ')+'. N\u00e9gociez les dates de cong\u00e9s hors p\u00e9riodes de pic client et pr\u00e9venez les clients 4 semaines \u00e0 l\u2019avance.'
    });
    recs.push({
      title:'Instaurer un rituel hebdomadaire de revue du staffing',
      detail:'Mettez en place un point 30\u00a0min chaque semaine pour passer en revue la situation de chaque consultant\u00a0: mission en cours, date de fin, pipeline de renouvellement, CV envoy\u00e9s. La visibilit\u00e9 \u00e0 60\u00a0jours est la cl\u00e9 d\u2019un taux d\u2019utilisation \u00e9lev\u00e9.'
    });
  }

  if(goal==='tjm'){
    var srtTJM=ks.filter(function(x){return x.k.avgT>0;}).sort(function(a,b){return a.k.avgT-b.k.avgT;});
    if(srtTJM.length>0){
      var lo=srtTJM[0];
      recs.push({
        title:'Revaloriser en priorit\u00e9 le TJM de '+lo.c.name,
        detail:'TJM actuel\u00a0: '+fEur(Math.round(lo.k.avgT))+'/j contre '+fEur(Math.round(avgTJMv))+'/j en moyenne \u00e9quipe. Un alignement sur la moyenne apporterait '+fEur(Math.round((avgTJMv-lo.k.avgT)*lo.k.bill))+' de CA suppl\u00e9mentaire sur l\u2019exercice. Pr\u00e9parez un dossier de valeur ajout\u00e9e avant la prochaine rencontrac\u00adtualisation.'
      });
    }
    var seniors=ks.filter(function(x){var tl=x.c.title.toLowerCase();return x.k.avgT>0&&x.k.avgT<avgTJMv&&(tl.indexOf('senior')>=0||tl.indexOf('manager')>=0);});
    if(seniors.length>0)recs.push({
      title:'Les profils senior\u00a0/ manager m\u00e9ritent un TJM au-dessus de la moyenne',
      detail:seniors.map(function(x){return x.c.name+' ('+x.c.title+' \u2014 '+fEur(Math.round(x.k.avgT))+'/j)';}).join(', ')+' sont sous la moyenne \u00e9quipe. Ces profils devraient se n\u00e9gocier 15\u202630\u00a0% au-dessus, soit '+fEur(Math.round(avgTJMv*1.15))+'\u202d\u00e0\u202d'+fEur(Math.round(avgTJMv*1.30))+'/j.'
    });
    var lowMarM=[];
    ks.forEach(function(x){x.k.pm.forEach(function(m){if(m.days>0&&m.mar<25)lowMarM.push({n:m.name,cli:m.cli,mar:m.mar,tjm:m.tjm});});});
    if(lowMarM.length>0)recs.push({
      title:'Ren\u00e9gocier les missions \u00e0 marge inf\u00e9rieure \u00e0 25\u00a0%',
      detail:'Missions en dessous de 25\u00a0% de marge [(TJM\u2212SCR)/TJM]\u00a0: '+lowMarM.map(function(m){return m.n+' chez '+m.cli+' ('+m.mar.toFixed(0)+'%\u00a0\u2014\u00a0TJM\u00a0'+fEur(m.tjm)+')';}).join(', ')+'. Visez un minimum de 30\u00a0% pour couvrir vos frais de structure.'
    });
    recs.push({
      title:'Int\u00e9grer une clause de revalorisation annuelle dans tous les contrats',
      detail:'Syst\u00e9matisez une r\u00e9vision tarifaire annuelle de +3\u00a0\u00e0\u00a0+8\u00a0% (selon inflation\u00a0+ performance). Sur un TJM moyen de '+fEur(Math.round(avgTJMv))+' et '+totBill+' jours factur\u00e9s, une hausse de 5\u00a0% g\u00e9n\u00e8re '+fEur(Math.round(totBill*avgTJMv*0.05))+' de CA suppl\u00e9mentaire.'
    });
    recs.push({
      title:'D\u00e9velopper des expertises rares \u00e0 forte valeur march\u00e9',
      detail:'Les sp\u00e9cialit\u00e9s IA g\u00e9n\u00e9rative, Cyber\u00ads\u00e9curit\u00e9, SAP\u00a0S/4HANA et Cloud\u00a0Native permettent de facturer 30\u202650\u00a0% au-dessus des TJM g\u00e9n\u00e9ralistes. Ciblez 1\u20132 consultants \u00e0 fort potentiel et investissez dans leur certification pour viser des TJM\u00a0>\u00a0'+fEur(Math.round(avgTJMv*1.40))+'/j.'
    });
  }

  if(!S.precs)S.precs={};
  S.precs[goal]=recs;
  render();
}

\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */

  var _allC=(S._all&&S._all.cons)||S.cons;

        +'<input type="checkbox" data-dir="'+esc(r)+'"'+(on?' checked':'')+' style="accent-color:#84CC16;flex-shrink:0">'+esc(r)+'</label>';
    }).join('');
    dirBlock='<div class="syr"><div class="syr-lbl">Directeur'+(_none?'':' ('+S.fdir.length+')')+'</div>'
      +(_dirs.length?_items+(_none
          ?'<div style="font-size:10px;color:#475569;margin-top:3px">Tous affichés</div>'
          :'<div data-dir-clear style="font-size:10px;color:#60a5fa;margin-top:3px;cursor:pointer;text-decoration:underline">Tout afficher</div>')
        :'<div style="font-size:11px;color:#475569">Aucun directeur défini</div>')
      +'</div>';
  }
  return '<div class="sbl" style="display:flex;align-items:flex-start;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px">'+'<div style="display:flex;align-items:flex-end;gap:3px;height:28px">'+'<div style="width:5px;border-radius:2px;height:45%;background:#f8fafc"></div>'+'<div style="width:5px;border-radius:2px;height:68%;background:#f8fafc"></div>'+'<div style="width:5px;border-radius:2px;height:100%;background:#84CC16"></div>'+'</div>'+'<div><div class="sbn" style="font-family:\'Nunito\',sans-serif;letter-spacing:-0.3px">Konsilys</div><div class="sbs">CGI Business Conseil</div></div></div>'
    +'<button onclick="toggleSB()" style="background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:2px 0 0;line-height:1;flex-shrink:0" aria-label="R\u00e9duire">&#8592;</button></div>'
    +'<div class="syr"><div class="syr-lbl">Exercice fiscal</div><select id="yrs">'+fyOpts+'</select>'
    +'<div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">'
    +'<button data-act="qsel" data-id="" style="flex:1;min-width:54px;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid '+(!S.quarter?'#2563eb':'#334155')+';background:'+(!S.quarter?'#2563eb':'transparent')+';color:'+(!S.quarter?'#fff':'#94a3b8')+';cursor:pointer">Ann\u00e9e</button>'
    +QUARTERS.map(function(q){
      var active=S.quarter===q.id;
      return '<button data-act="qsel" data-id="'+q.id+'" title="'+esc(q.lbFull)+'" style="flex:1;min-width:38px;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid '+(active?'#2563eb':'#334155')+';background:'+(active?'#2563eb':'transparent')+';color:'+(active?'#fff':'#94a3b8')+';cursor:pointer">'+q.lb+'</button>';
    }).join('')
    +'</div></div>'
    +dirBlock
    +'<nav class="snv">'+nav+'</nav>'
    +'<div class="sft">'
    +'<div style="font-size:11px;color:#475569;margin-bottom:8px">'+S.cons.length+' consultants \u00b7 '+S.miss.length+' missions</div>'
    +'</div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - DASHBOARD
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tDash(){
  var Hy=fyHols(S.year);
  var dateStr=pD(TODAY).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  /* ── Helpers ── */
  function daysSince(d){return Math.round((pD(TODAY)-pD(d))/86400000);}
  function daysUntil(d){return Math.round((pD(d)-pD(TODAY))/86400000);}
  function urgentCol(j){return j<=7?'#b91c1c':j<=14?'#b45309':'#15803d';}
  function urgentBg(j){return j<=7?'#fff1f2':j<=14?'#fffbeb':'#f0fdf4';}
  function urgentBd(j){return j<=7?'#fecdd3':j<=14?'#fde68a':'#bbf7d0';}

  /* Carte rétractable (details/summary) — fermée par défaut */
  function card(title, icon, rows, emptyMsg, count){
    var cntBadge=count!==undefined?'<span style="margin-left:8px;background:#e2e8f0;color:#475569;font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px">'+count+'</span>':'';
    var hasAlert=count>0;
    return '<details style="background:#fff;border:1px solid '+(hasAlert?'#fde68a':'#e2e8f0')+';border-radius:12px;margin-bottom:10px;overflow:hidden">'
      +'<summary style="display:flex;align-items:center;gap:8px;padding:14px 18px;cursor:pointer;font-size:14px;font-weight:800;color:#0f172a;list-style:none;user-select:none"'
      +' onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'
      +'<span>'+icon+'</span><span style="flex:1">'+title+'</span>'+cntBadge
      +'<span style="font-size:11px;color:#94a3b8;margin-left:8px">&#x25be;</span>'
      +'</summary>'
      +'<div style="padding:0 18px 16px">'
      +(rows||'<div style="font-size:13px;color:#94a3b8;padding:8px 0">'+emptyMsg+'</div>')
      +'</div></details>';
  }

  /* ══ 1. EN INTER-CONTRAT ══
     Consultants actifs, sans mission aujourd'hui, sans congé aujourd'hui */
  var icRows='';
  var icCons=S.cons.filter(function(c){
    if(isGone(c))return false;
    if(leaveOnDay(c.id,TODAY))return false;
    if(missOnDay(c.id,TODAY))return false;
    return true;
  });
  if(icCons.length){
    icRows=icCons.map(function(c){
      /* Date d'entrée en IC = fin de la dernière mission, ou date d'arrivée */
      var pastMiss=S.miss.filter(function(m){return m.cid===c.id&&m.ed&&m.ed<TODAY;})
        .sort(function(a,b){return b.ed.localeCompare(a.ed);});
      var icSince=pastMiss.length?pastMiss[0].ed:c.arrive||TODAY;
      var jours=daysSince(icSince);
      var jCol=jours<=30?'#15803d':jours<=60?'#b45309':'#b91c1c';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;background:#fff1f2;border:1px solid #fecdd3;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'+av(c.name,32)
        +'<div><div style="font-weight:700;font-size:13px;color:#0f172a">'+esc(c.name)+'</div>'
        +'<div style="font-size:11px;color:#94a3b8">'+esc(c.title)+'</div></div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:18px;font-weight:900;color:'+jCol+'">'+jours+'j</div>'
        +'<div style="font-size:10px;color:#94a3b8">sans mission</div></div></div>';
    }).join('');
  }

  /* ══ 2. PROCHAINES MISSIONS QUI DÉMARRENT ══ */
  var startRows='';
  var startMiss=S.miss
    .filter(function(m){return m.sd>TODAY;})
    .map(function(m){
      var c=S.cons.find(function(c){return c.id===m.cid;})||{name:'?',title:''};
      return {m:m,c:c,j:daysUntil(m.sd)};
    })
    .sort(function(a,b){return a.j-b.j;})
    .slice(0,5);
  if(startMiss.length){
    startRows=startMiss.map(function(x){
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;background:'+urgentBg(x.j)+';border:1px solid '+urgentBd(x.j)+';margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'+av(x.c.name,32)
        +'<div><div style="font-weight:700;font-size:13px;color:#0f172a">'+esc(x.c.name)+'</div>'
        +'<div style="font-size:11px;color:#64748b">'+esc(x.m.client||x.m.cli||'')+' \u00b7 TJM '+fEur(x.m.tjm)+'</div></div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:18px;font-weight:900;color:'+urgentCol(x.j)+'">J\u2212'+x.j+'</div>'
        +'<div style="font-size:10px;color:#94a3b8">'+fDt(x.m.sd)+'</div></div></div>';
    }).join('');
  }

  /* ══ 3. PROCHAINES MISSIONS QUI SE TERMINENT ══ */
  var endRows='';
  var endMiss=S.miss
    .filter(function(m){return m.sd<=TODAY&&m.ed&&m.ed>=TODAY;})
    .map(function(m){
      var c=S.cons.find(function(c){return c.id===m.cid;})||{name:'?',title:''};
      return {m:m,c:c,j:daysUntil(m.ed)};
    })
    .sort(function(a,b){return a.j-b.j;})
    .slice(0,5);
  if(endMiss.length){
    endRows=endMiss.map(function(x){
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;background:'+urgentBg(x.j)+';border:1px solid '+urgentBd(x.j)+';margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'+av(x.c.name,32)
        +'<div><div style="font-weight:700;font-size:13px;color:#0f172a">'+esc(x.c.name)+'</div>'
        +'<div style="font-size:11px;color:#64748b">'+esc(x.m.client||x.m.cli||'')+'</div></div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:18px;font-weight:900;color:'+urgentCol(x.j)+'">J\u2212'+x.j+'</div>'
        +'<div style="font-size:10px;color:#94a3b8">'+fDt(x.m.ed)+'</div></div></div>';
    }).join('');
  }

  /* ══ 4. PROCHAINS RETOURS DE CONGÉS / MALADIE ══
     Personnes actuellement en congé (aujourd'hui compris), retour à venir */
  var retourRows='';
  var retours=[];
  S.cons.filter(function(c){return !isGone(c);}).forEach(function(c){
    var lvNow=leaveOnDay(c.id,TODAY);
    if(lvNow&&lvNow.type!=='Inter-contrat'&&lvNow.type!=='Mission interne'){
      var retDate=nxt(lvNow.e); /* lendemain de fin = jour de retour */
      retours.push({c:c,lv:lvNow,ret:retDate,j:daysUntil(lvNow.e)});
    }
  });
  retours.sort(function(a,b){return a.j-b.j;});
  if(retours.length){
    retourRows=retours.map(function(x){
      var typeCol={'Maladie':'#b91c1c','Congé maternité':'#9d174d','Congé sans solde':'#475569'}[x.lv.type]||'#b45309';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;background:#fffbeb;border:1px solid #fde68a;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;gap:10px">'+av(x.c.name,32)
        +'<div><div style="font-weight:700;font-size:13px;color:#0f172a">'+esc(x.c.name)+'</div>'
        +'<div style="display:flex;align-items:center;gap:6px;margin-top:2px">'
        +'<span style="font-size:11px;font-weight:700;color:'+typeCol+';background:#ffe4e6;padding:1px 8px;border-radius:99px">'+esc(x.lv.type)+'</span>'
        +'<span style="font-size:11px;color:#94a3b8">retour le '+fDt(x.ret)+'</span></div></div></div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:18px;font-weight:900;color:#b45309">J\u2212'+x.j+'</div>'
        +'<div style="font-size:10px;color:#94a3b8">fin d\'absence</div></div></div>';
    }).join('');
  }

  /* ── Compteur IC et approbations ── */
  var icCount=icCons.length;
  var pendingAppr=(S.approvals||[]).filter(function(r){
    return r.status==='pending'&&(S.role!=='directeur'||r.dirName===S.dirName);
  });
  var approvedAppr=(S.approvals||[]).filter(function(r){
    return r.status==='approved'&&(S.role!=='directeur'||r.dirName===S.dirName);
  });
  var rejectedAppr=(S.approvals||[]).filter(function(r){
    return r.status==='rejected'&&(S.role!=='directeur'||r.dirName===S.dirName);
  });
  var pCount=pendingAppr.length;

  /* ── Section approbations complète (bas de page) ── */
  function apprRow(r,showReject){
    var dt=r.createdAt?new Date(r.createdAt).toLocaleDateString('fr-FR'):'';
    var isP=r.status==='pending',isA=r.status==='approved',isR=r.status==='rejected';
    var bg=isA?'#f0fdf4':isR?'#fff1f2':'#fffbeb';
    var bd=isA?'#bbf7d0':isR?'#fecdd3':'#fde68a';
    return '<div style="background:'+bg+';border:1px solid '+bd+';border-radius:10px;padding:12px 16px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:700;color:#0f172a">'+esc(r.consName||'')+' \u2014 '+esc(APPROVAL_LABELS[r.type]||r.type)+'</div>'
      +'<div style="font-size:12px;color:#64748b;margin-top:2px">'+esc(r.applyDesc||'')+'</div>'
      +'<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+dt+'</div>'
      +(isR&&r.rejectionReason?'<div style="margin-top:6px;font-size:12px;color:#b91c1c;font-style:italic">\u26a0 Motif\u00a0: '+esc(r.rejectionReason)+'</div>':'')
      +'</div>'
      +(isP&&showReject
        ?'<div style="display:flex;gap:8px;flex-shrink:0">'
          +'<button class="bp" style="padding:5px 12px;font-size:12px" data-act="appr-ok" data-id="'+r.id+'">Approuver</button>'
          +'<button class="bg" style="padding:5px 12px;font-size:12px;color:#b91c1c;border-color:#fecdd3" data-act="appr-ko" data-id="'+r.id+'">Refuser</button>'
          +'</div>'
        :'<div style="font-size:18px">'+(isA?'\u2705':isR?'\u274c':'\u23f3')+'</div>')
      +'</div></div>';
  }

  var apprSection='<details style="background:#fff;border:1px solid '+(pCount>0?'#fbbf24':'#e2e8f0')+';border-radius:12px;margin-bottom:10px;overflow:hidden" id="approvals-section"'+(pCount>0?' open':'')+'>'  
    +'<summary style="display:flex;align-items:center;gap:8px;padding:14px 18px;cursor:pointer;font-size:14px;font-weight:800;color:#0f172a;list-style:none;user-select:none"'
    +' onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'  
    +'\uD83D\uDD14<span style="flex:1;margin-left:8px">Demandes d\u2019approbation</span>'
    +'<span style="background:'+(pCount>0?'#fef3c7':'#e2e8f0')+';color:'+(pCount>0?'#92400e':'#475569')+';font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px;margin-right:6px">'+pCount+' en attente</span>'
    +'<span style="font-size:11px;color:#94a3b8">&#x25be;</span>'
    +'</summary>'
    +'<div style="padding:0 18px 16px">'
    +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#92400e;margin:10px 0 8px">\u23f3 En attente ('+pCount+')</div>'
    +(pendingAppr.length
      ?pendingAppr.map(function(r){return apprRow(r,S.role==='directeur');}).join('')
      :'<div style="font-size:13px;color:#94a3b8;padding:6px 0 12px">Aucune demande en attente.</div>')
    +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#15803d;margin:12px 0 8px">\u2705 Approuv\u00e9es ('+approvedAppr.length+')</div>'
    +(approvedAppr.length
      ?approvedAppr.map(function(r){return apprRow(r,false);}).join('')
      :'<div style="font-size:13px;color:#94a3b8;padding:6px 0 12px">Aucune.</div>')
    +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#b91c1c;margin:12px 0 8px">\u274c Refus\u00e9es ('+rejectedAppr.length+')</div>'
    +(rejectedAppr.length
      ?rejectedAppr.map(function(r){return apprRow(r,false);}).join('')
      :'<div style="font-size:13px;color:#94a3b8;padding:6px 0">Aucune.</div>')
    +'</div></details>';

  return '<div class="vw">'
    +'<div style="margin-bottom:20px">'
    +'<h1 style="font-size:22px;font-weight:700;color:#0f172a">Tableau de bord</h1>'
    +'<p style="font-size:13px;color:#64748b;margin-top:4px">'+dateStr+'</p></div>'

    /* Cartes résumé — Approbations EN PREMIER, cliquable */
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">'

    +'<a href="#approvals-section" style="background:'+(pCount>0?'#fef3c7':'#f8fafc')+';border:1px solid '+(pCount>0?'#fbbf24':'#e2e8f0')+';border-radius:12px;padding:16px 18px;text-decoration:none;cursor:pointer;display:block;transition:box-shadow .15s" '
    +'onmouseover="this.style.boxShadow=\'0 4px 12px rgba(0,0,0,.1)\'" onmouseout="this.style.boxShadow=\'\'">'
    +'<div style="font-size:28px;font-weight:900;color:'+(pCount>0?'#b45309':'#64748b')+'">'+pCount+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:4px">Approbations</div>'
    +'<div style="font-size:11px;color:#94a3b8">en attente \u2193</div></a>'

    +'<div style="background:'+(icCount>0?'#fff1f2':'#f0fdf4')+';border:1px solid '+(icCount>0?'#fecdd3':'#bbf7d0')+';border-radius:12px;padding:16px 18px">'
    +'<div style="font-size:28px;font-weight:900;color:'+(icCount>0?'#b91c1c':'#15803d')+'">'+icCount+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:4px">En inter-contrat</div>'
    +'<div style="font-size:11px;color:#94a3b8">aujourd\'hui</div></div>'

    +'<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:16px 18px">'
    +'<div style="font-size:28px;font-weight:900;color:#1e40af">'+startMiss.length+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:4px">Prochains d\u00e9marrages</div>'
    +'<div style="font-size:11px;color:#94a3b8">missions \u00e0 venir</div></div>'

    +'<div style="background:'+(endMiss.filter(function(x){return x.j<=30;}).length>0?'#fffbeb':'#f8fafc')+';border:1px solid '+(endMiss.filter(function(x){return x.j<=30;}).length>0?'#fde68a':'#e2e8f0')+';border-radius:12px;padding:16px 18px">'
    +'<div style="font-size:28px;font-weight:900;color:#b45309">'+endMiss.length+'</div>'
    +'<div style="font-size:12px;font-weight:700;color:#374151;margin-top:4px">Fins de mission</div>'
    +'<div style="font-size:11px;color:#94a3b8">missions en cours</div></div>'
    +'</div>'

    /* ── Layout 2 colonnes ── */
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">'
    /* Colonne gauche */
    +'<div>'
    +card('En inter-contrat aujourd\'hui','\uD83D\uDD34',icRows||null,'Toute l\'\u00e9quipe est en mission. \uD83C\uDF89',icCount)
    +card('Prochaines missions qui d\u00e9marrent','\uD83D\uDE80',startRows||null,'Aucune mission \u00e0 venir planifi\u00e9e.',startMiss.length)
    +'</div>'
    /* Colonne droite */
    +'<div>'
    +card('Prochaines missions qui se terminent','\uD83D\uDCC5',endRows||null,'Aucune mission active en cours.',endMiss.length)
    +card('Retours de cong\u00e9s / maladie','\uD83C\uDFD6\uFE0F',retourRows||null,'Personne en cong\u00e9 ou arr\u00eat en ce moment.',retours.length)
    +'</div>'
    +'</div>'
    +apprSection
    +'</div>';
}
function tTeams(){
  var fyS=fyStart(S.year),fyE=fyEnd(S.year);

  /* Filtrer sur le FY : arrive <= fyE ET (depart >= fyS OU pas de depart) */
  var inFY=S.cons.filter(function(c){
    if(c.arrive&&c.arrive>fyE)return false;
    if(c.depart&&c.depart<fyS)return false;
    return true;
  });

  var actifs=inFY.filter(function(c){return !isGone(c);});
  var partis=inFY.filter(function(c){return isGone(c);});

  function makeRow(c,gone){
    var am=getAct(c.id);var st=am?mSt(am):'none';
    var rs=gone?'opacity:.4;background:#f8fafc;':'';
    var ns=gone?'text-decoration:line-through;':'';
    var tag=gone?'<span style="font-size:10px;background:#f1f5f9;color:#94a3b8;padding:2px 6px;border-radius:4px;margin-left:6px">Parti'+(c.depart?' '+fDt(c.depart):'')+'</span>':'';
    return '<tr style="'+rs+'"><td><div style="display:flex;align-items:center;gap:10px">'+av(c.name,32)

  }

  var sep=partis.length&&actifs.length?'<tr><td colspan="6" style="padding:4px 12px;background:#f8fafc;border-top:1px solid #e2e8f0"><span style="font-size:11px;color:#94a3b8;font-weight:600">Partis ce FY ('+partis.length+')</span></td></tr>':'';
  var rows=actifs.map(function(c){return makeRow(c,false);}).join('')
    +sep+partis.map(function(c){return makeRow(c,true);}).join('');

  var sub=actifs.length+' actif'+(actifs.length!==1?'s':'')+' \u00b7 '+fyLbl(S.year)
    +(partis.length?' \u00b7 '+partis.length+' parti'+(partis.length!==1?'s':'')+' ce FY':'');

  return '<div><div class="ph"><div><div class="pt">\u00c9quipe</div><div class="ps">'+sub+'</div></div>'
    +'<button class="bp" data-act="ac">+ Ajouter un consultant</button></div>'
    +'<div class="card ov"><table style="min-width:640px">'
    +'<thead><tr><th>Consultant</th><th>Poste</th><th>SCR/j</th><th>Mission actuelle</th><th>Statut</th><th class="tr">Actions</th></tr></thead>'
    +'<tbody>'+rows+(inFY.length?'':'<tr><td colspan="6" class="emp">Aucun consultant sur ce FY.</td></tr>')
    +'</tbody></table></div></div>';

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - MISSIONS
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tMiss(){
  var ORD=['critical','soon','active','future','ended'];
  var fil=S.miss.filter(function(m){return(S.fmc==='all'||m.cid===S.fmc)&&(S.fms==='all'||mSt(m)===S.fms)&&(S.fmt==='all'||(m.btype||'at')===S.fmt);}).sort(function(a,b){return ORD.indexOf(mSt(a))-ORD.indexOf(mSt(b));});
  var co='<option value="all">Tous les consultants</option>'+S.cons.map(function(c){return '<option value="'+c.id+'"'+(c.id===S.fmc?' selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  var cards=fil.map(function(m){
    var c=S.cons.find(function(c){return c.id===m.cid;});
    var st=mSt(m);var dl=m.ed?dL(m.ed):null;
    var isFf=m.btype==='forfait';
    var WJ=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    var wdLbl=(m.wdays&&m.wdays.length&&m.wdays.length<5)?m.wdays.slice().sort().map(function(x){return WJ[x];}).join(' '):'Tous (L\u2192V)';
    var flds=[['Client',m.cli],['Consultant',c?c.name:'\u2014'],['Type',isFf?'Forfait':'Assistance technique']];
    if(isFf){flds.push(['CA deal',fEur((+m.deal)||0)]);flds.push(['Marge cible',(m.tmar!=null?m.tmar:0)+'%']);}
    else if(S.role!=='consultant'){flds.push(['TJM',fEur(m.tjm)]);}  /* TJM masqué pour les consultants */
    flds.push(['D\u00e9but',fDt(m.sd)]);flds.push(['Fin',fDt(m.ed)]);flds.push(['Jours/sem.',wdLbl]);
    flds.push(['Lieu',m.loc||'\u2014']);flds.push(['Resp. mission',m.mgr||'\u2014']);flds.push(['Contact client',m.ccn||'\u2014']);flds.push(['Poste contact',m.ccr||'\u2014']);
    var ffBlock='';
    if(isFf){
      var fi=forfaitInfo(m,c?c.scr:0,S.lvs);
      var leftCol=fi.left<0?'#b91c1c':fi.left<=5?'#b45309':'#15803d';
      var feas='';
      if(st!=='ended'){
        if(!m.ed){feas='<div style="color:#b45309;font-weight:600">\u26a0 date de fin manquante \u2014 faisabilit\u00e9 non \u00e9valuable</div>';}
        else{var okF=fi.slack>=0;
          feas='<div><span style="color:#94a3b8">Jours dispo d\'ici la fin : </span><strong>'+fi.avail+'</strong></div>'
            +'<div style="font-weight:700;color:'+(okF?'#15803d':'#b91c1c')+'">'+(okF?'\u2713 Faisable \u2014 marge '+fi.slack.toFixed(1)+' j':'\u2717 D\u00e9lai insuffisant \u2014 manque '+Math.abs(fi.slack).toFixed(1)+' j')+'</div>';}
      }
      ffBlock='<div style="margin-top:10px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;display:flex;gap:18px;flex-wrap:wrap;font-size:12px">'
        +'<div><span style="color:#94a3b8">Budget jours : </span><strong>'+fi.budget.toFixed(1)+'</strong></div>'
        +'<div><span style="color:#94a3b8">Travaill\u00e9s \u00e0 ce jour : </span><strong>'+fi.worked+'</strong></div>'
        +'<div><span style="color:#94a3b8">Jours restants : </span><strong style="color:'+leftCol+'">'+fi.left.toFixed(1)+'</strong></div>'
        +feas
        +(fi.left<0?'<div style="color:#b91c1c;font-weight:600">\u26a0 budget d\u00e9pass\u00e9 \u2014 marge sous la cible</div>':'')
        +'</div>';
    }
    return '<div class="card" style="padding:18px"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">'
      +'<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
      +'<span style="font-weight:700;font-size:14px;color:#0f172a">'+esc(m.name)+'</span>'+badge(st,dl!=null&&dl>=0?dl:null)
      +'<span class="badge '+(isFf?'bblu':'bgry')+'">'+(isFf?'Forfait':'AT')+'</span>'
      +(!m.ed?'<span style="font-size:11px;color:#94a3b8;font-style:italic">sans date de fin</span>':'')+'</div>'
      +'<div class="gc3">'+flds.map(function(f){return '<div><span style="color:#94a3b8">'+esc(f[0])+' : </span><span style="font-weight:600;color:#243447">'+esc(f[1]||'\u2014')+'</span></div>';}).join('')+'</div>'+ffBlock+'</div>'
      +'<div style="display:flex;gap:10px;flex-shrink:0"><button class="lb" data-act="em" data-id="'+m.id+'">Modifier</button>'
      +'<button class="lr" data-act="dm" data-id="'+m.id+'">Suppr.</button></div></div></div>';
  }).join('');
  if(S.missImp!==null){
    var mi=S.missImp;
    if(!mi.headers){
      return '<div class="vw"><div class="ph"><div><div class="pt">Import de missions en masse</div>'
        +'<div class="ps">Utilisez le template Excel fourni — les consultants doivent exister dans l\'app</div></div>'
        +'<button class="bg" onclick="S.missImp=null;render()">← Retour</button></div>'
        +'<div class="card" style="padding:60px 32px;text-align:center;border:2px dashed #e2e8f0;background:#fff;border-radius:16px" id="miss-imp-dz">'
        +'<div style="font-size:15px;font-weight:700;color:#0f172a;margin-bottom:8px">Glissez votre fichier Excel ici</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:24px">Une ligne = une mission — utilisez le template fourni</div>'
        +'<label style="display:inline-block;background:#84CC16;color:#1B2B3A;padding:11px 28px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer">'
        +'Choisir un fichier<input type="file" id="miss-imp-fi" accept=".xlsx,.xls,.csv" style="display:none"></label>'
        +'</div></div>';
    }
    var MFLDS=[['cons','Consultant *','Doit correspondre \u00e0 un consultant existant'],['name','Nom de la mission *','Libell\u00e9 de la mission'],['pcode','Code projet','Code PSA/SAP'],['cli','Client *','Soci\u00e9t\u00e9 cliente'],['tjm','TJM','TJM en \u20ac \u2014 vide si Forfait'],['sd','Date d\u00e9but *','AAAA-MM-JJ'],['ed','Date fin','Vide si mission ouverte'],['btype','Type facturation *','Valeur : AT ou Forfait'],['deal','Budget forfait (\u20ac)','Montant total \u2014 vide si AT'],['wdays','Jours/sem. *','5=L-V, 4=L-J, 3=L-Me ou codes L,M,Me,J,V'],['loc','Lieu','Ex : Paris'],['mgr','Responsable','Manager de mission'],['ccn','Contact client (Nom)','Nom du contact'],['ccr','Contact client (R\u00f4le)','Poste du contact']];
    var opts2='<option value="">-- Ignorer --</option>'+mi.headers.map(function(h,i){return '<option value="'+i+'">'+(i+1)+'. '+esc(h)+'</option>';}).join('');
    var form2=MFLDS.map(function(f){var s2='<select class="ic" id="mim-'+f[0]+'">'+opts2.replace(new RegExp('value="'+mi.map[f[0]]+'"'),'value="'+mi.map[f[0]]+'" selected')+'</select>';return '<div class="fd" style="margin-bottom:9px"><label class="fl">'+f[1]+'</label>'+s2+'<p style="font-size:11px;color:#94a3b8;margin-top:3px">'+f[2]+'</p></div>';}).join('');
    var prev2=mi.raw.slice(0,3).map(function(row){return '<tr>'+mi.headers.map(function(h,i){return '<td style="padding:4px 8px;font-size:11px;border-bottom:1px solid #f1f5f9;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(String(row[i]||''))+'</td>';}).join('')+'</tr>';}).join('');
    return '<div class="vw"><div class="ph"><div><div class="pt">Import missions \u2014 Mapping</div>'
      +'<div class="ps">'+esc(mi.file)+' \u00b7 '+mi.raw.length+' ligne(s)</div></div>'
      +'<button class="bg" onclick="S.missImp=null;render()">Annuler</button></div>'
      +'<div style="display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start">'
      +'<div class="card" style="padding:20px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:14px">Association des colonnes</div>'+form2
      +'<button class="bp" style="width:100%;margin-top:8px" onclick="applyMissImp()">Importer les missions</button></div>'
      +'<div class="card" style="padding:20px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:10px">Aper\u00e7u (3 lignes)</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>'+mi.headers.map(function(h){return '<th style="padding:4px 8px;font-size:11px;font-weight:700;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0;text-align:left">'+esc(h)+'</th>';}).join('')+'</tr></thead><tbody>'+prev2+'</tbody></table></div></div>'
      +'</div></div>';
  }

  return '<div><div class="ph"><div><div class="pt">Missions</div><div class="ps">'+fil.length+' r\u00e9sultat'+(fil.length!==1?'s':'')+'</div></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="bp" data-act="am">+ Ajouter une mission</button>'
    +'<button class="bg" onclick="S.missImp={};render()">↑ Importer en masse</button>'
    +'</div></div>'
    +'<div style="display:flex;gap:10px;margin-bottom:16px">'
    +'<select class="ic" style="max-width:220px" id="fmc">'+co+'</select>'
    +'<select class="ic" style="max-width:180px" id="fms">'
    +'<option value="all"'+(S.fms==='all'?' selected':'')+'>Tous statuts</option>'
    +'<option value="critical"'+(S.fms==='critical'?' selected':'')+'>Fin &lt;14j</option>'
    +'<option value="soon"'+(S.fms==='soon'?' selected':'')+'>Fin &lt;30j</option>'
    +'<option value="active"'+(S.fms==='active'?' selected':'')+'>En mission</option>'
    +'<option value="future"'+(S.fms==='future'?' selected':'')+'>À venir</option>'
    +'<option value="ended"'+(S.fms==='ended'?' selected':'')+'>Termin\u00e9es</option></select>'
    +'<select class="ic" style="max-width:170px" id="fmt">'
    +'<option value="all"'+(S.fmt==='all'?' selected':'')+'>Tous types</option>'
    +'<option value="at"'+(S.fmt==='at'?' selected':'')+'>Assistance technique</option>'
    +'<option value="forfait"'+(S.fmt==='forfait'?' selected':'')+'>Forfait</option></select></div>'
    +'<div style="display:flex;flex-direction:column;gap:12px">'+(cards||'<div class="card" style="padding:48px;text-align:center;color:#94a3b8;font-size:13px">Aucune mission pour cette s\u00e9lection</div>')+'</div></div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - PLANNING (Gantt)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tPlan(){
  var fyS=pD(fyStart(S.year)),fyE=pD(fyEnd(S.year));
  var ysT=fyS.getTime(),yeT=fyE.getTime(),dur=yeT-ysT;
  var nowP=((new Date().getTime()-ysT)/dur)*100;
  var fyMonths=['Oct','Nov','D\u00e9c','Jan','F\u00e9v','Mar','Avr','Mai','Jun','Jul','Ao\u00fb','Sep'];
  var COL={active:'#22c55e',critical:'#ef4444',soon:'#f59e0b',future:'#22c55e',ended:'#d1d5db'};
  var LVC={'Maladie':'#1d4ed8','Cong\u00e9 maternit\u00e9':'#1d4ed8','Cong\u00e9 pay\u00e9':'#fbbf24','RTT':'#a78bfa','Formation':'#34d399','Cong\u00e9 sans solde':'#cbd5e1','Mission interne':'#60a5fa','Autre':'#d1d5db'};

  var activeCons=S.cons.filter(function(c){return !isGone(c);});

  var rows=activeCons.map(function(c,ci){
    var cm=S.miss.filter(function(m){return m.cid===c.id;});
    var cl=S.lvs.filter(function(l){return l.cid===c.id&&l.type!=='Inter-contrat';});
    var grid='';for(var i=0;i<11;i++)grid+='<div style="position:absolute;top:0;bottom:0;width:1px;background:#f1f5f9;left:'+((i+1)/12*100)+'%"></div>';
    var todayLine=nowP>=0&&nowP<=100?'<div style="position:absolute;top:0;bottom:0;width:2px;background:#3b82f6;z-index:10;left:'+nowP+'%"></div>':'';

    var bars=cm.map(function(m){
      var s=Math.max(pD(m.sd).getTime(),ysT);
      var e=Math.min(m.ed?pD(m.ed).getTime():yeT,yeT);
      if(s>yeT||e<ysT)return '';
      var left=Math.max(0,(s-ysT)/dur*100);
      var wid=Math.max(0.6,Math.min(100-left,(e-s)/dur*100));
      var st=mSt(m);var dl=m.ed?dL(m.ed):null;
      var tip=esc(m.name+'\n'+m.cli+'\nTJM : '+fEur(m.tjm)+'\nDu '+fDt(m.sd)+' au '+fDt(m.ed)+(dl!=null&&dl>=0?'\n\u26a0 J\u2212'+dl:''));
      return '<div class="gbar" style="left:'+left+'%;width:'+wid+'%;background:'+(COL[st]||'#22c55e')+'" title="'+tip+'"><span>'+esc(m.cli)+'</span></div>';
    }).join('');

    var lvBars=cl.map(function(l){
      /* Ne pas afficher visuellement les absences de moins de 3 jours ouvrés */
      if(wDays(l.s,l.e,H)<3)return '';
      var ls=Math.max(pD(l.s).getTime(),ysT);
      var le=Math.min(pD(l.e).getTime(),yeT);
      if(ls>yeT||le<ysT)return '';
      var left=Math.max(0,(ls-ysT)/dur*100);
      var wid=Math.max(0.4,Math.min(100-left,(le-ls)/dur*100));
      var col=LVC[l.type]||'#d1d5db';
      var tip=esc(l.type+' : du '+fDt(l.s)+' au '+fDt(l.e));
      return '<div class="gbar" style="left:'+left+'%;width:'+wid+'%;background:'+col+';opacity:.88;z-index:5;" title="'+tip+'"><span>'+esc(l.type)+'</span></div>';
    }).join('');

    /* ── Périodes inter-contrat : ni mission ni absence ── */
    function tsToISO(ts){var d=new Date(ts);return fD(d);}

    /* Borne de d\u00e9but IC = max(fyS, date d'arriv\u00e9e du consultant) */
    var arriveTs=c.arrive&&c.arrive>=fyStart(S.year)?pD(c.arrive).getTime():ysT;

    var covered=[];
    cm.forEach(function(m){
      var ms=Math.max(pD(m.sd).getTime(),arriveTs);
      var me=Math.min(m.ed?pD(m.ed).getTime():yeT,yeT);
      if(ms<=me)covered.push([ms,me]);
    });
    cl.forEach(function(l){
      var ls2=Math.max(pD(l.s).getTime(),arriveTs);
      var le2=Math.min(pD(l.e).getTime(),yeT);
      if(ls2<=le2)covered.push([ls2,le2]);
    });
    covered.sort(function(a,b){return a[0]-b[0];});
    var merged=[];
    covered.forEach(function(iv){
      if(!merged.length||iv[0]>merged[merged.length-1][1]+86400001)
        merged.push([iv[0],iv[1]]);
      else merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],iv[1]);
    });
    /* Les IC ne commencent qu'à partir de la date d'arrivée */
    var icGaps=[],cur=arriveTs;
    merged.forEach(function(iv){
      if(iv[0]>cur+86400001)icGaps.push([cur,iv[0]-86400000]);
      if(iv[1]+86400000>cur)cur=iv[1]+86400000;
    });
    if(cur<yeT)icGaps.push([cur,yeT]);
    var icBars=icGaps.map(function(g){
      var wd=wDays(tsToISO(g[0]),tsToISO(g[1]),H);
      if(wd<=0)return '';
      var left=Math.max(0,(g[0]-ysT)/dur*100);
      var wid=Math.max(0.4,Math.min(100-left,(g[1]-g[0])/dur*100));
      return '<div class="gbar" style="left:'+left+'%;width:'+wid+'%;background:#fca5a5;opacity:.55;z-index:1;" title="Inter-contrat : '+wd+' j ouvr\u00e9s">'
        +(wid>2.5?'<span style="color:#7f1d1d;font-weight:700;font-size:10px">IC '+wd+'j</span>':'')+'</div>';
    }).join('');

    /* ── Marqueur d'arrivée (si dans le FY) ── */
    var arriveMarker='';
    if(c.arrive&&c.arrive>fyStart(S.year)&&c.arrive<=fyEnd(S.year)){
      var arrLeft=(pD(c.arrive).getTime()-ysT)/dur*100;
      if(arrLeft>=0&&arrLeft<=100){
        arriveMarker='<div style="position:absolute;top:0;bottom:0;width:2px;background:#f59e0b;z-index:12;left:'+arrLeft+'%">'
          +'<div style="position:absolute;top:1px;left:3px;background:#f59e0b;color:#fff;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;white-space:nowrap">'
          +'\u25B6 '+fDt(c.arrive)+'</div></div>';
      }
    }

    return '<div class="grw" style="background:'+(ci%2===0?'#fff':'#f8fafc')+'">'
      +'<div class="glb">'+av(c.name,28)+'<div style="min-width:0">'
      +'<div style="font-size:12px;font-weight:600;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name.split(' ')[0])+'</div>'
      +'<div style="font-size:10px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.title.split(' ')[0])+'</div>'
      +'</div></div><div class="gtr">'+grid+todayLine+arriveMarker+icBars+bars+lvBars+'</div></div>';
  }).join('');

  var mths=fyMonths.map(function(m){return '<div class="gm">'+m+'</div>';}).join('');
  var lgd=[
    ['#22c55e','En mission'],['#ef4444','Fin &lt;14j'],['#f59e0b','Fin &lt;30j'],['#d1d5db','Termin\u00e9e'],['#fbbf24','Cong\u00e9s pay\u00e9s'],['#1d4ed8','Arr\u00eat / Maternit\u00e9'],['#a78bfa','RTT'],['#34d399','Formation'],['#60a5fa','Mission interne'],['#fca5a5','Inter-contrat'],['#f59e0b','▶ Date d\'arrivée']].map(function(x){return '<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b"><div style="width:12px;height:12px;border-radius:3px;background:'+x[0]+'"></div>'+x[1]+'</div>';}).join('');

  return '<div><div class="ph"><div><div class="pt">Planning '+fyLbl(S.year)+'</div>'
    +'<div class="ps">'+fyRange(S.year)+' \u00b7 ligne bleue = aujourd\'hui</div></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap">'+lgd+'</div></div>'
    +'<div class="card gwp"><div class="gin"><div class="ghd"><div class="glh">Consultant</div><div class="gms">'+mths+'</div></div>'
    +rows+(activeCons.length?'':'<div class="emp">Aucun consultant</div>')+'</div></div></div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - KPIs (with top clients, avg TJM, net contribution)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tKPIs(){
  var ks=buildKS();
  var totR=ks.reduce(function(s,x){return s+x.k.rev;},0);
  var totBill=ks.reduce(function(s,x){return s+x.k.bill;},0);
  var _aktWD=ks.reduce(function(s,x){return s+(x.k.tWD||0);},0);
  var avgSr=_aktWD>0?ks.reduce(function(s,x){return s+x.k.sr*(x.k.tWD||0);},0)/_aktWD:0;
  var mArr=ks.filter(function(x){return x.k.om!=null;});
  var avgM=mArr.length?mArr.reduce(function(s,x){return s+x.k.om;},0)/mArr.length:null;
  var avgTJMv=totBill>0?totR/totBill:0;
  /* Coût salaire = SCR × SCR_FACTOR × (jours présents dans la période / jours ouvrés totaux du FY)
     Cela prend en compte : dates d'arrivée/départ (tWD=0 si absent), et proratise
     automatiquement pour les trimestres ou les consultants arrivés/partis en cours d'année */
  var fyTotalWD=wDays(fyStart(S.year),fyEnd(S.year),H);
  var totSalary=fyTotalWD>0
    ?ks.reduce(function(s,x){return s+x.c.scr*SCR_FACTOR*(x.k.tWD/fyTotalWD);},0)
    :0;
  var netC=totR-totSalary;
  var top3=clientRev(ks).slice(0,3);
  var totRevP=Math.max(totR,1);
  var srBars=svgBars(ks.map(function(x){return{n:x.c.name.split(' ')[0],v:parseFloat(x.k.sr.toFixed(1))};}),function(v){return v>=80?'#16a34a':v>=50?'#d97706':'#dc2626';},'%');

  function srCol(v){return v>=80?'#16a34a':v>=50?'#d97706':'#dc2626';}
  function srBg(v){return v>=80?'#f0fdf4':v>=50?'#fffbeb':'#fff1f2';}
  function ini(n){return n.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();}

  var srLabel=avgSr>=80?'Excellent':avgSr>=60?'Correct':'A surveiller';
  var hero='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#243447;border-radius:16px;overflow:hidden;margin-bottom:24px">'
    +'<div style="background:#0c1424;padding:28px 24px">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:8px">Staffing moyen</div>'
    +'<div style="font-size:40px;font-weight:900;color:#f1f5f9;letter-spacing:-.03em;line-height:1">'+avgSr.toFixed(1)+'<span style="font-size:20px;font-weight:600">%</span></div>'
    +'<div style="font-size:12px;font-weight:700;color:'+srCol(avgSr)+';margin-top:8px">'+srLabel+'</div>'
    +'<div style="margin-top:10px;height:3px;background:#243447;border-radius:2px;overflow:hidden"><div style="height:100%;width:'+Math.min(avgSr,100).toFixed(0)+'%;background:'+srCol(avgSr)+';border-radius:2px"></div></div>'
    +'</div>'
    +'<div style="background:#0c1424;padding:28px 24px">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:8px">CA Total</div>'
    +'<div style="font-size:40px;font-weight:900;color:#60a5fa;letter-spacing:-.03em;line-height:1">'+fEur(totR)+'</div>'
    +'<div style="font-size:12px;color:#475569;margin-top:8px">'+ks.length+' consultants &middot; '+fyLbl(S.year)+'</div>'
    +'</div>'
    +'<div style="background:#0c1424;padding:28px 24px">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:8px">TJM moyen</div>'
    +'<div style="font-size:40px;font-weight:900;color:#a78bfa;letter-spacing:-.03em;line-height:1">'+(avgTJMv>0?fEur(Math.round(avgTJMv)):'&mdash;')+'</div>'
    +'<div style="font-size:12px;color:#475569;margin-top:8px">'+(avgM!=null?'Marge moyenne : '+avgM.toFixed(1)+'%':'Calcul en cours')+'</div>'
    +'</div>'
    +'<div style="background:#0c1424;padding:28px 24px">'
    +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:8px">Contribution nette</div>'
    +'<div style="font-size:40px;font-weight:900;color:'+(netC>=0?'#34d399':'#f87171')+';letter-spacing:-.03em;line-height:1">'+fEur(netC)+'</div>'
    +'<div style="font-size:12px;color:#475569;margin-top:8px">CA &minus; co\u00fbts salaires p\u00e9riode ('+fEur(totSalary)+')</div>'
    +'</div></div>';

  var clientHtml='<div style="display:flex;flex-direction:column;gap:16px">'
    +(top3.length?top3.map(function(cl,i){
      var pct=Math.round(cl.rev/totRevP*100);
      var rc=['#f59e0b','#94a3b8','#b45309'][i];
      var rk=['1er','2eme','3eme'][i];
      return '<div style="display:flex;align-items:center;gap:14px">'
        +'<div style="width:32px;height:32px;border-radius:8px;background:'+rc+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">'+rk+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'
        +'<span style="font-weight:700;font-size:13px;color:#0f172a">'+esc(cl.name)+'</span>'
        +'<span style="font-weight:800;font-size:13px;color:#0f172a">'+fEur(cl.rev)+'</span>'
        +'</div>'
        +'<div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden">'
        +'<div style="height:100%;width:'+pct+'%;background:'+rc+';border-radius:3px"></div>'
        +'</div>'
        +'<div style="font-size:11px;color:#94a3b8;margin-top:4px">'+pct+'% du CA total</div>'
        +'</div></div>';
    }).join(''):'<div style="font-size:13px;color:#94a3b8;text-align:center;padding:20px">Aucune donn\u00e9e</div>')
    +'</div>';

  var cards='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px">'
    +ks.map(function(x){
      var k=x.k,c=x.c;
      var col=srCol(k.sr),bg=srBg(k.sr);
      var ms=k.pm.filter(function(m){return m.days>0;});
      var msStr=ms.length?ms.map(function(m){return m.cli+' \u2014 '+m.name;}).join(' / '):'Inter-contrat';
      var marCol=k.om!=null?(k.om>=30?'#16a34a':k.om>=15?'#d97706':'#dc2626'):'#94a3b8';
      return '<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 12px rgba(0,0,0,.07);border-top:3px solid '+col+'">'
        +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
        +'<div style="width:42px;height:42px;border-radius:10px;background:'+bg+';color:'+col+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">'+ini(c.name)+'</div>'
        +'<div style="min-width:0;flex:1">'
        +'<div style="font-weight:700;font-size:13px;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.name)+'</div>'
        +'<div style="font-size:11px;color:#94a3b8;margin-top:1px">'+esc(c.title)+'</div>'
        +'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +'<div style="font-size:20px;font-weight:900;color:'+col+'">'+k.sr.toFixed(0)+'%</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8">staffing</div>'
        +(k.cs&&k.cs>fyStart(S.year)?'<div style="font-size:9px;color:#f59e0b;font-weight:600;margin-top:2px">\u25B6 depuis '+fDt(k.cs)+'</div>':'')
        +'</div></div>'
        +'<div style="height:4px;background:#f1f5f9;border-radius:2px;margin-bottom:12px;overflow:hidden">'
        +'<div style="height:100%;width:'+Math.min(k.sr,100).toFixed(0)+'%;background:'+col+'"></div></div>'
        +'<div style="font-size:11px;color:#64748b;margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(msStr)+'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:#0f172a">'+fEur(k.rev)+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">CA</div></div>'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:'+marCol+'">'+(k.om!=null?k.om.toFixed(1)+'%':'&mdash;')+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">Marge</div></div>'
        +'<div style="text-align:center;padding:8px 4px;background:#f8fafc;border-radius:8px">'
        +'<div style="font-size:13px;font-weight:800;color:#374151">'+(k.avgT>0?fEur(k.avgT):'&mdash;')+'</div>'
        +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:2px">TJM</div></div>'
        +'</div></div>';
    }).join('')+'</div>';

  var pmR=ks.map(function(x){
    var pm=x.k.pm.filter(function(m){return m.days>0;});
    if(!pm.length)return '';
    return '<div style="border-bottom:1px solid #f1f5f9">'
      +'<div style="padding:10px 20px;background:#f8fafc;display:flex;align-items:center;gap:10px">'
      +'<div style="width:24px;height:24px;border-radius:6px;background:'+srBg(x.k.sr)+';color:'+srCol(x.k.sr)+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0">'+ini(x.c.name)+'</div>'
      +'<span style="font-size:12px;font-weight:700;color:#374151">'+esc(x.c.name)+'</span>'
      +'<span style="font-size:11px;color:#94a3b8">'+pm.length+' mission'+(pm.length>1?'s':'')+'</span></div>'
      +pm.map(function(m){
        var mc=m.mar>=30?'#16a34a':m.mar>=0?'#d97706':'#dc2626';
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 20px;border-top:1px solid #f1f5f9;font-size:12px">'
          +'<div style="flex:1;min-width:0"><span style="font-weight:600;color:#0f172a">'+esc(m.cli)+'</span> <span style="color:#94a3b8">&mdash; '+esc(m.name)+'</span></div>'
          +'<span style="color:#64748b;flex-shrink:0">'+m.days+'j</span>'
          +'<span style="color:#374151;flex-shrink:0">'+fEur(m.tjm)+'/j</span>'
          +'<span style="font-weight:700;color:#0f172a;flex-shrink:0">'+fEur(m.rev)+'</span>'
          +'<span style="font-weight:800;color:'+mc+';flex-shrink:0">'+m.mar.toFixed(1)+'%</span></div>';
      }).join('')+'</div>';
  }).join('');

  return '<div class="vw">'
    +'<div style="margin-bottom:24px"><div class="pt">KPIs &mdash; '+fyLbl(S.year)+(S.quarter?' \u00b7 '+curRangeLbl():'')+'</div></div>'
    +hero
    +'<div style="display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:24px">'
    +'<div class="card" style="padding:20px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:16px">Staffing par consultant (%)</div>'+srBars+'</div>'
    +'<div class="card" style="padding:20px"><div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:16px">Top clients &mdash; CA</div>'+clientHtml+'</div>'
    +'</div>'
    +cards
    +'<div class="card ov">'
    +'<div style="padding:14px 20px;border-bottom:1px solid #f1f5f9"><div style="font-size:13px;font-weight:700;color:#0f172a">D\u00e9tail des missions factur\u00e9es</div></div>'
    +pmR+'</div></div>';
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   TEMPLATE - LEAVES
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
function tLeaves(){
  var H=fyHols(S.year);
  var _r=curRange(S.year);var fyS=_r[0],fyE=_r[1];

  var fil=S.lvs.filter(function(l){
    if(S.flc!=='all'&&l.cid!==S.flc)return false;
    return l.e>=fyS&&l.s<=fyE;
  }).sort(function(a,b){return a.s.localeCompare(b.s);});

  var co='<option value="all">Tous les consultants</option>'+S.cons.map(function(c){
    return '<option value="'+c.id+'"'+(c.id===S.flc?' selected':'')+'>'+esc(c.name)+'</option>';
  }).join('');

  var TCC={
    'Cong\u00e9 pay\u00e9':'#dbeafe|#1e40af','RTT':'#ede9fe|#5b21b6',
    'Formation':'#dcfce7|#15803d','Inter-contrat':'#ffedd5|#c2410c',
    'Maladie':'#fee2e2|#b91c1c','Cong\u00e9 maternit\u00e9':'#fce7f3|#9d174d',
    'Cong\u00e9 sans solde':'#f1f5f9|#475569','Mission interne':'#ccfbf1|#0f766e','Autre':'#f1f5f9|#475569'
  };
  function isArret(t){return t==='Maladie'||t==='Cong\u00e9 maternit\u00e9'||t==='Cong\u00e9 sans solde';}

  var bodyHtml='';

  if(S.flc==='all'){
    /* ── Vue synth\u00e8se : indicateur par consultant ── */
    var sumRows=S.cons.map(function(c){
      var clvs=S.lvs.filter(function(l){return l.cid===c.id&&l.e>=fyS&&l.s<=fyE;});
      if(!clvs.length)return '';
      var cpJ=0,arJ=0;
      clvs.forEach(function(l){
        /* Clamp à la période sélectionnée */
        var effS=l.s>fyS?l.s:fyS;
        var effE=l.e<fyE?l.e:fyE;
        var wd=wDays(effS,effE,H);
        if(isArret(l.type))arJ+=wd;
        else if(l.type!=='Inter-contrat')cpJ+=wd;
      });
      if(!cpJ&&!arJ)return '';
      var tot=cpJ+arJ;
      return '<tr>'
        +'<td style="font-weight:600;color:#0f172a">'+esc(c.name)+'</td>'
        +'<td class="tc"><span style="background:#dbeafe;color:#1e40af;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+cpJ+'j</span></td>'
        +'<td class="tc"><span style="background:#fee2e2;color:#b91c1c;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700">'+arJ+'j</span></td>'
        +'<td class="tc" style="font-weight:800;color:#0f172a;font-size:14px">'+tot+'j</td>'
        +'<td class="tr"><button class="lb" data-act="lvc" data-id="'+c.id+'">\u2192 D\u00e9tail</button></td>'
        +'</tr>';
    }).filter(Boolean).join('');
    bodyHtml='<table><thead><tr><th>Consultant</th><th class="tc">Cong\u00e9s &amp; RTT</th>'
      +'<th class="tc">Arr\u00eats / Mat.</th><th class="tc">Total '+curLbl()+'</th><th></th></tr></thead>'
      +'<tbody>'+sumRows+(sumRows?'':'<tr><td colspan="5" class="emp">Aucune absence enregistr\u00e9e sur le '+curLbl()+'</td></tr>')
      +'</tbody></table>';
  } else {
    /* ── Vue d\u00e9tail consultant ── */
    var detRows=fil.map(function(l){
      /* Clamp à la période pour n'afficher que les jours dans la fenêtre */
      var effS=l.s>fyS?l.s:fyS;
      var effE=l.e<fyE?l.e:fyE;
      var wd=wDays(effS,effE,H);
      var tc=(TCC[l.type]||'#f1f5f9|#475569').split('|');
      return '<tr>'
        +'<td><span style="display:inline-flex;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;background:'+tc[0]+';color:'+tc[1]+'">'+esc(l.type)+'</span></td>'
        +'<td>'+fDt(l.s)+'</td><td>'+fDt(l.e)+'</td>'
        +'<td class="tc" style="font-weight:700">'+wd+'j</td>'
        +'<td class="tr"><button class="lb" style="margin-right:10px" data-act="el" data-id="'+l.id+'">Modifier</button>'
        +'<button class="lr" data-act="dl" data-id="'+l.id+'">Suppr.</button></td>'
        +'</tr>';
    }).join('');
    var totCP=0,totAr=0;
    fil.forEach(function(l){
      var effS=l.s>fyS?l.s:fyS;
      var effE=l.e<fyE?l.e:fyE;
      var wd=wDays(effS,effE,H);
      if(isArret(l.type))totAr+=wd;
      else if(l.type!=='Inter-contrat')totCP+=wd;
    });
    var tot=totCP+totAr;
    var totRow=fil.length
      ?'<tr style="background:#f8fafc;border-top:2px solid #e2e8f0">'
