<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Konsilys</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:#f1f5f9;color:#334155;font-size:14px}
input,select,button{font-family:inherit;font-size:inherit}
button{cursor:pointer}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:210px;background:#1B2B3A;display:flex;flex-direction:column;flex-shrink:0;transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden}
#mc{flex:1;overflow-y:auto;background:#f1f5f9}
/* Sidebar collapsible */
body.sb-col #sb{width:0}
#sb-open{position:fixed;top:12px;left:12px;z-index:300;width:36px;height:36px;background:#1B2B3A;border:none;border-radius:9px;cursor:pointer;color:#f8fafc;font-size:18px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.3)}
body.sb-col #sb-open{display:flex}
/* Mobile : sidebar en overlay */
@media(max-width:767px){
  #sb{position:fixed;top:0;left:0;bottom:0;z-index:200;width:0}
  body:not(.sb-col) #sb{width:210px;box-shadow:4px 0 24px rgba(0,0,0,.45)}
  #sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
  body:not(.sb-col) #sb-backdrop{display:block}
  #mc{overflow-y:auto}
}
.inn{padding:24px;max-width:1200px;margin:0 auto}
/* sidebar */
.sbl{padding:20px 20px 14px}
.sbn{color:#f8fafc;font-weight:800;font-size:13px}
.sbs{color:#475569;font-size:11px;margin-top:3px}
.syr{padding:0 12px 12px;border-bottom:1px solid #243447}
.syr-lbl{color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.syr select{width:100%;background:#243447;color:#f8fafc;border:1px solid #334155;border-radius:8px;padding:6px 10px;font-size:12px;outline:none}
.snv{flex:1;padding:2px 4px;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.nb{width:100%;display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;border:none;background:transparent;color:#64748b;font-size:11px;font-weight:600;text-align:left;transition:all .12s}
.nb:hover{background:#243447;color:#f8fafc}
.nb.act{background:#84CC16;color:#1B2B3A;font-size:12.5px;font-weight:800}
.nbi{font-size:12px;flex-shrink:0;width:16px}
.nbb{margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:1px 7px}
.sft{padding:12px 16px;border-top:1px solid #243447;font-size:11px;color:#334155}
/* cards */
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.kc{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px}
/* forms */
.ic{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;background:#fff;color:#0f172a;transition:border-color .15s}
.ic:focus{border-color:#84CC16;box-shadow:0 0 0 3px rgba(132,204,22,.15)}
.fl{display:block;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fh{font-size:11px;color:#94a3b8;margin-top:4px}
.fd{margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.cs2{grid-column:1/-1}
/* buttons */
.bp{background:#84CC16;color:#1B2B3A;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;transition:background .12s}
.bp:hover{background:#6DAB0A}
.bg{background:#fff;color:#374151;border:1px solid #cbd5e1;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500}
.bg:hover{background:#f8fafc}
.br{display:flex;gap:10px;margin-top:20px}
.br .bp,.br .bg{flex:1}
.lb{background:none;border:none;font-size:12px;font-weight:500;color:#2D6A0E;text-decoration:underline;padding:0;cursor:pointer}
.lr{background:none;border:none;font-size:12px;font-weight:500;color:#dc2626;text-decoration:underline;padding:0;cursor:pointer}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.bgrn{background:#dcfce7;color:#15803d}
.bamb{background:#fef3c7;color:#b45309}
.bred{background:#fee2e2;color:#b91c1c}
.bblu{background:#dbeafe;color:#1d4ed8}
.bgry{background:#f1f5f9;color:#64748b}
/* avatar */
.av{border-radius:50%;background:#84CC16;color:#1B2B3A;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
/* tables */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:10px 16px;text-align:left;background:#f8fafc;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;color:#374151;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}
/* modal */
.mov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.mob{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.25);width:100%;max-height:90vh;overflow-y:auto}
.moh{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.mot{font-size:16px;font-weight:700;color:#0f172a}
.moc{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer;padding:4px;line-height:1}
.mody{padding:20px;overflow-y:auto}
.bsec{background:#f1f5f9;color:#374151;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.mbox{background:#fff;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.25);width:100%;max-height:90vh;overflow-y:auto}
.mn{max-width:460px}
.mw{max-width:680px}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff;z-index:2}
.mhd h3{font-weight:700;font-size:15px;color:#0f172a}
.mcl{background:none;border:none;font-size:22px;color:#94a3b8;line-height:1;padding:4px;border-radius:6px;cursor:pointer}
.mcl:hover{background:#f1f5f9}
.mbd{padding:24px}
/* gantt */
.gwp{overflow-x:auto}
.gin{min-width:720px}
.ghd{display:flex;border-bottom:1px solid #f1f5f9}
.glh{width:172px;flex-shrink:0;padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;background:#f8fafc}
.gms{flex:1;display:flex}
.gm{flex:1;text-align:center;padding:8px 0;font-size:11px;font-weight:600;color:#64748b;border-left:1px solid #f1f5f9}
.grw{display:flex;align-items:center;border-bottom:1px solid #f8fafc;height:52px}
.glb{width:172px;flex-shrink:0;padding:0 14px;display:flex;align-items:center;gap:8px}
.gtr{flex:1;position:relative;height:100%}
.gbar{position:absolute;top:8px;height:36px;border-radius:6px;display:flex;align-items:center;overflow:hidden;z-index:5;opacity:.88}
.gbar span{color:#fff;font-size:11px;font-weight:600;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* layout */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.pt{font-size:18px;font-weight:800;color:#0f172a;font-family:'Nunito',sans-serif}
.ps{font-size:12px;color:#64748b;margin-top:2px}
.vw{display:flex;flex-direction:column;gap:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gc{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gc3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 16px}
.ov{overflow-x:auto}
.emp{text-align:center;color:#94a3b8;padding:40px 0;font-size:13px}
.tr{text-align:right}
.tc{text-align:center}
.ski{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
details summary{cursor:pointer;font-size:12px;color:#64748b;list-style:none;user-select:none}
details[open] summary{margin-bottom:8px}
details summary::-webkit-details-marker{display:none}
.ac{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:10px}
.acr{background:#fff1f2;border:1px solid #fecdd3}
.acs{background:#fffbeb;border:1px solid #fde68a}
/* param */
.rec-card{background:#f8fafc;border-left:3px solid #84CC16;padding:14px 16px;border-radius:0 8px 8px 0;margin-bottom:10px}
.rec-title{font-weight:700;font-size:13px;color:#0f172a;margin-bottom:5px}
.rec-detail{font-size:12px;color:#475569;line-height:1.65}
.goal-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;margin-bottom:16px}
.goal-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.goal-icon{font-size:28px;flex-shrink:0}
.goal-title{font-weight:700;font-size:15px;color:#0f172a}
.goal-sub{font-size:12px;color:#64748b;margin-top:2px}
/* top clients */
.cli-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #f1f5f9}
.cli-row:last-child{border-bottom:none}
.cli-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.cli-bar{height:6px;border-radius:3px;margin-top:4px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<button id="sb-open" onclick="toggleSB()" aria-label="Ouvrir le menu">&#9776;</button>
<div id="sb-backdrop" onclick="toggleSB()"></div>
<div id="app">
  <div id="sb"></div>
  <div id="mc"></div>
  <div id="md"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/01-core.js"></script>
  <script src="js/02-recommendations.js"></script>
  <script src="js/03-sidebar.js"></script>
  <script src="js/04-dashboard.js"></script>
  <script src="js/05-missions-planning.js"></script>
  <script src="js/06-kpis.js"></script>
  <script src="js/07-leaves.js"></script>
  <script src="js/08-access-admin.js"></script>
  <script src="js/09-business.js"></script>
  <script src="js/10-help-tutorials.js"></script>
  <script src="js/11-directeurs-modal.js"></script>
  <script src="js/12-recrutement.js"></script>
  <script src="js/13-render-events.js"></script>
  <script src="js/14-data-boot.js"></script>
</body>
</html>
