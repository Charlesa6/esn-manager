name: CI

# Barrière qualité : vérifie chaque PR et chaque push sur main.
# Le produit reste sans build ni dépendance npm — Playwright n'est installé QUE
# sur le runner (jamais commité), le temps de faire tourner l'e2e.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérification syntaxe (node --check)
        run: |
          set -e
          for f in js/*.js; do node --check "$f"; done

      - name: Vérification syntaxe des <script> inline (index/login)
        run: |
          node -e '
            const fs=require("fs"),vm=require("vm");
            const JS=new Set(["","text/javascript","application/javascript","module"]);
            let bad=0;
            for(const file of ["index.html","esn_login.html"]){
              const h=fs.readFileSync(file,"utf8");
              let m,re=/<script\b([^>]*)>([\s\S]*?)<\/script>/gi;
              while((m=re.exec(h))){
                const attrs=m[1]||"";
                if(/\bsrc\s*=/i.test(attrs)) continue;                 // script externe
                const tm=attrs.match(/\btype\s*=\s*["\x27]?([^"\x27\s>]+)/i);
                if(tm && !JS.has(tm[1].toLowerCase())) continue;        // JSON-LD etc. : pas du JS
                try{ new vm.Script(m[2]); }catch(e){ bad++; console.error(file+": "+e.message); }
              }
            }
            if(bad){ console.error("Scripts inline invalides: "+bad); process.exit(1); }
            console.log("Scripts inline OK");
          '

      - name: Tests unitaires (logique pure)
        run: node tests/unit.cjs

      - name: Installer Playwright + Chromium (runner uniquement)
        run: |
          npm init -y >/dev/null
          npm install playwright >/dev/null
          npx playwright install --with-deps chromium

      - name: Tests E2E (Playwright)
        run: node tests/e2e.cjs
